    const vname = VEHICLES[vehicleKey].name.replace(/^DMVSOS\s+/, '');
    const cname = c.key;
    const dot = ' · ';
    const tw1 = ctx.measureText(vname).width;
    const tw2 = ctx.measureText(dot).width;
    const tw3 = ctx.measureText(cname).width;
    const totalW = tw1 + tw2 + tw3;
    ctx.textAlign = 'left';
    let cx = (W - totalW) / 2;
    ctx.fillStyle = VEHICLES[vehicleKey].color;
    ctx.fillText(vname, cx, HUD_H / 2 - 1);
    cx += tw1;
    ctx.fillStyle = '#7a8aa8';
    ctx.fillText(dot, cx, HUD_H / 2 - 1);
    cx += tw2;
    ctx.fillStyle = c.accent;
    ctx.fillText(cname, cx, HUD_H / 2 - 1);
    ctx.textBaseline = 'alphabetic';
  }

  let __lastFrameErr = null;
  function frame(t) {
    if (!lastT) lastT = t;
    const dt = Math.min(0.05, (t - lastT) / 1000);
    lastT = t;
    // game-over animation timer — runs even after update() short-circuits
    if (!alive) gameOverT += dt;
    // SHARE flash timer — runs while win screen shows "COPIED!" feedback
    if (shareFlashT > 0) shareFlashT = Math.max(0, shareFlashT - dt);
    // start-screen animation timer — runs while start screen is up
    if (startScreenActive) startScreenT += dt;
    // tutorial animation timer — runs while tutorial is up
    if (tutorialActive) tutorialT += dt;
    try {
      update(dt);
      draw();
    } catch (err) {
      console.error('[chill-game] frame error:', err);
      __lastFrameErr = err;
      // Paint a visible error overlay so user sees the message without opening console
      try {
        ctx.fillStyle = '#7f1d1d';
        ctx.fillRect(0, 0, W, H);
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 14px monospace';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('FRAME ERROR', W / 2, 40);
        ctx.font = '9px monospace';
        const msg = String(err && err.message ? err.message : err);
        // wrap to fit width — split into 28-char chunks
        let y = 70;
        for (let i = 0; i < msg.length; i += 28) {
          ctx.fillText(msg.slice(i, i + 28), W / 2, y);
          y += 12;
          if (y > H - 20) break;
        }
        if (err && err.stack) {
          ctx.font = '7px monospace';
          ctx.fillStyle = '#facc15';
          const stack = String(err.stack).split('\n');
          for (let i = 0; i < Math.min(stack.length, 10); i++) {
            ctx.fillText(stack[i].slice(0, 50), W / 2, y);
            y += 10;
            if (y > H - 20) break;
          }
        }
        ctx.textBaseline = 'alphabetic';
      } catch (_) {}
    }
    requestAnimationFrame(frame);
  }

  function move(dir) {
    if (!alive) return;
    const prev = carLane;
    carLane = Math.max(0, Math.min(LANES - 1, carLane + dir));
    if (carLane !== prev) {
      blip(520 + dir * 80, 0.04, 'triangle', 0.06);
      vibe(8);
    }
  }

  // REPAIR — call when player taps repair prompt or hits the R key.
  // Returns true if a tap was consumed (so the caller can suppress lane-change).
  function tryRepair() {
    if (!alive || !repairPrompt) return false;
    repairPrompt.taps++;
    blip(880 + repairPrompt.taps * 80, 0.06, 'square', 0.07);
    vibe(12);
    if (repairPrompt.taps >= repairPrompt.needed) {
      // SUCCESS — restore HP, celebrate
      playerHP = Math.min(PLAYER_MAX_HP, playerHP + repairPrompt.hpToRestore);
      blip(1200, 0.10, 'triangle', 0.10);
      setTimeout(() => blip(1500, 0.10, 'triangle', 0.10), 70);
      setTimeout(() => blip(1800, 0.12, 'triangle', 0.10), 140);
      vibe([20, 30, 30]);
      popups.push({
        x: carXSmooth,
        y: H - CELL - 40,
        vy: -55,
        text: '+1 HP  REPAIRED!',
        color: '#5ee08b',
        big: true,
        life: 1.4, max: 1.4,
      });
      spawnConfetti(carXSmooth, H - CELL - 20, 14,
        ['#5ee08b', '#22c55e', '#fff', '#86efac']);
      repairPrompt = null;
    }
    return true;
  }

  function cycleVehicle() {
    // skip locked vehicles in the rotation
    for (let tries = 0; tries < VKEYS.length; tries++) {
      const i = VKEYS.indexOf(vehicleKey);
      vehicleKey = VKEYS[(i + 1) % VKEYS.length];
      if (isVehicleUnlocked(vehicleKey)) break;
    }
    try { localStorage.setItem('chill.vehicle', vehicleKey); } catch (_) {}
  }

  window.addEventListener('keydown', e => {
    // Tutorial — any key dismisses
    if (tutorialActive) { ensureAudio(); dismissTutorial(); e.preventDefault(); return; }
    if (startScreenActive) { ensureAudio(); dismissStartScreen(); e.preventDefault(); return; }
    // Brake — set on first keydown, stays until keyup (ignores e.repeat)
    if (e.key === 'ArrowDown' || e.key === 's' || e.key === 'S' || e.key === 'Shift') {
      if (alive && !braking) { ensureAudio(); setBrake(true); }
      e.preventDefault();
      return;
    }
    if (e.repeat) return;
    ensureAudio();
    if (e.key === 'ArrowLeft'  || e.key === 'a' || e.key === 'A') { move(-1); e.preventDefault(); }
    else if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') { move(1); e.preventDefault(); }
    else if (e.key === ' ' || e.key === 'Enter') { if (!alive) reset(); e.preventDefault(); }
    else if (e.key === 'v' || e.key === 'V') { cycleVehicle(); e.preventDefault(); }
    else if (e.key === 'p' || e.key === 'P') { togglePause(); e.preventDefault(); }
    else if (e.key === 'm' || e.key === 'M') { toggleMusic(); e.preventDefault(); }
    else if (e.key === 'r' || e.key === 'R') { tryRepair(); e.preventDefault(); }
  }, { passive: false });

  window.addEventListener('keyup', e => {
    if (e.key === 'ArrowDown' || e.key === 's' || e.key === 'S' || e.key === 'Shift') {
      setBrake(false);
    }
  });

  function canvasLocal(e) {
    const rect = canvas.getBoundingClientRect();
    return {
      x: (e.clientX - rect.left) * (W / rect.width),
      y: (e.clientY - rect.top) * (H / rect.height),
    };
  }
  function hit(r, p) {
    return p.x >= r.x && p.x <= r.x + r.w && p.y >= r.y && p.y <= r.y + r.h;
  }

  // Gesture state: defer tap to pointerup, fire swipe on threshold.
  // This avoids the bug where a tap-then-swipe-back fires two moves in
  // opposite directions (e.g. swipe-left starting from the right half).
  let gesture = null;   // { x, y, px, threshold, swiped }

  canvas.addEventListener('pointerdown', e => {
    canvas.focus({ preventScroll: true });
    ensureAudio();
    // Tutorial — first tap anywhere dismisses
    if (tutorialActive) {
      dismissTutorial();
      e.preventDefault();
      return;
    }
    if (startScreenActive) {
      dismissStartScreen();
      e.preventDefault();
      return;
    }
    const p = canvasLocal(e);
    // Game Over: hits resolve on press for instant feedback.
    if (!alive) {
      for (const r of pickerRects) {
        if (hit(r, p)) {
          if (r.locked) {
            // negative sound — can't pick this
            blip(220, 0.10, 'sawtooth', 0.06);
            vibe(40);
            e.preventDefault();
            return;
          }
          vehicleKey = r.key;
          try { localStorage.setItem('chill.vehicle', vehicleKey); } catch (_) {}
          blip(660, 0.05, 'triangle', 0.08);
          vibe(8);
          e.preventDefault();
          return;
        }
      }
      if (retryRect && hit(retryRect, p)) {
        reset();
        blip(740, 0.1, 'square', 0.1);
        vibe(15);
        e.preventDefault();
        return;
      }
      // BACK TO DMVSOS TESTS — exit the game and return to practice tests.
      // Works in both standalone (/break.html) and iframe (BreakButton overlay)
      // modes since exitToTests() navigates the top-level window.
      if (backRect && hit(backRect, p)) {
        blip(440, 0.08, 'square', 0.08);
        vibe(10);
        e.preventDefault();
        exitToTests();
        return;
      }
      // SHARE button (only on WIN screen)
      if (gameWon && shareRect && hit(shareRect, p)) {
        const shareText = `🏆 I won EXAM SKIPPER 3000 with ${score} points! 5/5 DMV licenses collected. Try it: dmvsos.com`;
        try {
          navigator.clipboard?.writeText(shareText);
        } catch (_) {}
        shareFlashT = 1.2;
        blip(880, 0.08, 'triangle', 0.1);
        setTimeout(() => blip(1320, 0.10, 'triangle', 0.1), 70);
        vibe(20);
        e.preventDefault();
        return;
      }
      e.preventDefault();
      return;
    }
    // Alive: arm gesture, don't move yet — pointerup or threshold decides.
    // Capture pointer so pointerup fires on canvas even if finger drifts off.
    try { canvas.setPointerCapture(e.pointerId); } catch (_) {}
    const rect = canvas.getBoundingClientRect();
    gesture = {
      x: e.clientX,
      y: e.clientY,
      px: p.x,
      py: p.y,
      threshold: Math.max(18, rect.width * 0.08),
      swiped: false,
    };
    e.preventDefault();
  });

  canvas.addEventListener('pointermove', e => {
    if (!gesture || gesture.swiped || !alive) return;
    const dx = e.clientX - gesture.x;
    if (Math.abs(dx) >= gesture.threshold) {
      move(dx > 0 ? 1 : -1);
      gesture.swiped = true;
    }
  });

  function endGesture(commit) {
    if (gesture && commit && !gesture.swiped && alive) {
      // If repair prompt is active, ANY tap counts as a repair tap (during a
      // panic moment the player will mash anywhere on the screen — don't force
      // them to hit a tiny pill). Lane change is suppressed during repair.
      if (repairPrompt) {
        tryRepair();
      } else {
        move(gesture.px < W / 2 ? -1 : 1);
      }
    }
    gesture = null;
  }
  canvas.addEventListener('pointerup',     () => endGesture(true));
  canvas.addEventListener('pointercancel', () => endGesture(false));

  setTimeout(() => canvas.focus({ preventScroll: true }), 0);

  // DEBUG boot — wrap everything so any error before the frame loop logs to console
  try {
    console.log('[chill-game] boot start');
    updateStreak();
    console.log('[chill-game] updateStreak OK');
    reset();
    console.log('[chill-game] reset OK; alive=', alive, 'cityIdx=', cityIdx, 'best=', best);
    requestAnimationFrame(frame);
    console.log('[chill-game] requestAnimationFrame queued');
  } catch (err) {
    console.error('[chill-game] BOOT CRASH:', err);
    // Try to draw a visible "error" rect so user sees something other than black
    try {
      const ctx2 = document.getElementById('c').getContext('2d');
      ctx2.fillStyle = '#DC2626';
      ctx2.fillRect(0, 0, 320, 480);
      ctx2.fillStyle = '#fff';
      ctx2.font = 'bold 14px monospace';
      ctx2.textAlign = 'center';
      ctx2.fillText('BOOT ERROR', 160, 240);
      ctx2.font = '10px monospace';
      ctx2.fillText('check Console', 160, 260);
    } catch (_) {}
  }
})();
</script>
</body>
</html>
