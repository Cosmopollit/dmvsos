      ctx.fillRect(px,               py,                  slotW, bw);
      ctx.fillRect(px,               py + slotH - bw,     slotW, bw);
      ctx.fillRect(px,               py,                  bw,    slotH);
      ctx.fillRect(px + slotW - bw,  py,                  bw,    slotH);

      // ===== SELECTED HALO + INNER GLOW =====
      if (selected) {
        // outer accent glow (pulses slowly)
        const glowPulse = 0.5 + Math.sin(elapsed * 3) * 0.3;
        ctx.fillStyle = `rgba(57,211,83,${glowPulse * 0.25})`;
        ctx.fillRect(px - 2, py - 2, slotW + 4, 1);
        ctx.fillRect(px - 2, py + slotH + 1, slotW + 4, 1);
        ctx.fillRect(px - 2, py - 1, 1, slotH + 2);
        ctx.fillRect(px + slotW + 1, py - 1, 1, slotH + 2);
        // inner top-edge highlight
        ctx.fillStyle = 'rgba(255,255,255,0.25)';
        ctx.fillRect(px + bw, py + bw, slotW - bw * 2, 1);
      }

      // ===== TILE-CORNER STAR ACCENTS (unlocked only) =====
      if (!locked) {
        ctx.fillStyle = selected ? COL_PICK : '#3a4868';
        ctx.fillRect(px + 3,         py + 3,         1, 1);
        ctx.fillRect(px + slotW - 4, py + 3,         1, 1);
        ctx.fillRect(px + 3,         py + slotH - 4, 1, 1);
        ctx.fillRect(px + slotW - 4, py + slotH - 4, 1, 1);
      }
      // distinct vehicle preview — dimmed if locked
      const previewScale = 0.55;
      const previewW = v.w * CELL * previewScale;
      const previewH = v.h * CELL * previewScale;
      const mx = px + (slotW - previewW) / 2;
      const my = py + (slotH - previewH) / 2 - 5;
      if (locked) ctx.globalAlpha = 0.30;
      drawVehicle(mx, my, v, previewScale);
      if (locked) {
        ctx.globalAlpha = 1;
        // lock sprite over preview center
        const lcx = px + slotW / 2;
        const lcy = py + slotH / 2 - 4;
        // shackle
        ctx.fillStyle = '#9ca3af';
        ctx.fillRect(lcx - 4, lcy - 8, 8, 1);
        ctx.fillRect(lcx - 4, lcy - 7, 1, 4);
        ctx.fillRect(lcx + 3, lcy - 7, 1, 4);
        // body
        ctx.fillStyle = '#cfd8e8';
        ctx.fillRect(lcx - 6, lcy - 3, 12, 9);
        // keyhole
        ctx.fillStyle = '#1a1410';
        ctx.fillRect(lcx - 1, lcy, 2, 2);
        ctx.fillRect(lcx,     lcy + 2, 1, 2);
      }
      // label / unlock text
      ctx.font = 'bold 9px ui-monospace, monospace';
      if (locked) {
        ctx.fillStyle = '#7a8aa8';
        ctx.font = '7px ui-monospace, monospace';
        ctx.fillText('UNLOCK AT', px + slotW / 2, py + slotH - 14);
        ctx.fillStyle = '#facc15';
        ctx.font = 'bold 9px ui-monospace, monospace';
        ctx.fillText(String(v.unlock), px + slotW / 2, py + slotH - 5);
      } else {
        ctx.fillStyle = selected ? COL_PICK : '#9ca3af';
        // shrink font + auto-wrap to 2 lines for longer vehicle names
        if (v.name.length > 8) {
          ctx.font = 'bold 7px ui-monospace, monospace';
          const parts = v.name.split(' ');
          if (parts.length >= 2) {
            ctx.fillText(parts[0], px + slotW / 2, py + slotH - 12);
            ctx.fillText(parts.slice(1).join(' '), px + slotW / 2, py + slotH - 4);
          } else {
            ctx.fillText(v.name, px + slotW / 2, py + slotH - 6);
          }
        } else {
          ctx.fillText(v.name, px + slotW / 2, py + slotH - 6);
        }
      }
      pickerRects.push({ x: px, y: py, w: slotW, h: slotH, key: k, locked });
      px += slotW + gap;
    });

    // PUNCH LINE — "you were X away from Y" — drives one-more-try psychology
    {
      const punch = getPunchLine();
      if (punch) {
        const punchDelay = 0.7;
        const punchT = Math.max(0, Math.min(1, (gameOverT - punchDelay) / 0.35));
        if (punchT > 0) {
          ctx.save();
          ctx.globalAlpha = punchT;
          ctx.font = 'italic bold 9px ui-monospace, monospace';
          ctx.fillStyle = '#facc15';
          ctx.textAlign = 'center';
          ctx.fillText(punch, W / 2, py + slotH + 18);
          ctx.restore();
        }
      }
    }

    // RETRY button — embossed feel + idle pulse + sheen sweep
    const rbw = 200, rbh = 50;
    const rbx = (W - rbw) / 2;
    const rby = py + slotH + 30;
    // ===== idle pulse — only after the picker has settled in (≥1.5s after game-over) =====
    const retryPulse = gameOverT > 1.5
      ? 1 + Math.sin(elapsed * 4) * 0.025
      : 1;
    ctx.save();
    ctx.translate(W / 2, rby + rbh / 2);
    ctx.scale(retryPulse, retryPulse);
    ctx.translate(-W / 2, -(rby + rbh / 2));

    // ===== HALO behind button — soft accent green glow (pulses) =====
    if (gameOverT > 1.5) {
      const haloA = (Math.sin(elapsed * 4) * 0.4 + 0.6) * 0.18;
      ctx.fillStyle = `rgba(57,211,83,${haloA})`;
      ctx.fillRect(rbx - 6, rby - 2, rbw + 12, rbh + 4);
      ctx.fillRect(rbx - 3, rby - 5, rbw + 6,  rbh + 10);
    }
    // ===== SHADOW under button =====
    ctx.fillStyle = 'rgba(0,0,0,0.55)';
    ctx.fillRect(rbx, rby + 3, rbw, rbh);
    // ===== FACE — solid accent green =====
    ctx.fillStyle = COL_PICK;
    ctx.fillRect(rbx, rby, rbw, rbh);
    // top highlight + bottom shade for embossed look
    ctx.fillStyle = '#5ee08b';
    ctx.fillRect(rbx, rby, rbw, 2);
    ctx.fillStyle = '#1f7a30';
    ctx.fillRect(rbx, rby + rbh - 3, rbw, 3);
    // ===== SHEEN SWEEP — diagonal white band sweeps across after 2s =====
    if (gameOverT > 2.0) {
      const sweep = ((gameOverT - 2.0) * 0.5) % 1;   // sweeps once every 2s after activation
      const sx = rbx + sweep * (rbw + 30) - 30;
      ctx.save();
      ctx.beginPath();
      ctx.rect(rbx, rby, rbw, rbh);
      ctx.clip();
      ctx.fillStyle = 'rgba(255,255,255,0.18)';
      ctx.fillRect(sx,     rby + 2, 16, rbh - 4);
      ctx.fillStyle = 'rgba(255,255,255,0.08)';
      ctx.fillRect(sx - 6, rby + 2, 6,  rbh - 4);
      ctx.fillRect(sx + 16, rby + 2, 6,  rbh - 4);
      ctx.restore();
    }
    // ===== LABEL with subtle shadow for legibility =====
    ctx.fillStyle = 'rgba(0,0,0,0.4)';
    ctx.font = 'bold 15px ui-monospace, monospace';
    ctx.fillText('TAP TO RETRY', W / 2 + 1, rby + 32);
    ctx.fillStyle = '#031a08';
    ctx.fillText('TAP TO RETRY', W / 2, rby + 31);
    ctx.restore();
    retryRect = { x: rbx, y: rby, w: rbw, h: rbh };

    // keyboard hint — fade in after RETRY button settles (so it doesn't compete)
    const hintT = Math.max(0, Math.min(1, (gameOverT - 2.0) / 0.5));
    if (hintT > 0) {
      ctx.save();
      ctx.globalAlpha = hintT;
      ctx.font = '8px ui-monospace, monospace';
      ctx.fillStyle = '#3a4a6a';
      ctx.fillText('SPACE = RESTART  ·  V = CYCLE  ·  ←/→ MOVE',
                   W / 2, rby + rbh + 18);
      ctx.restore();
    }

    // BACK TO TESTS — anchored to the canvas bottom so it replaces the old
    // brand footer ("DMVSOS · STUDY, THEN CHILL"). It serves both purposes:
    // it carries the brand name AND is the functional exit. Fades in with the
    // keyboard hint so it doesn't fight RETRY for attention initially.
    const backW = 168, backH = 20;
    const backX = W / 2 - backW / 2;
    const backY = H - backH - 4;
    if (hintT > 0) {
      ctx.save();
      ctx.globalAlpha = hintT;
      ctx.fillStyle = '#0f1d3a';
      ctx.fillRect(backX, backY, backW, backH);
      ctx.fillStyle = '#fde047';
      ctx.fillRect(backX, backY, backW, 1);
      ctx.fillRect(backX, backY + backH - 1, backW, 1);
      ctx.fillRect(backX, backY, 1, backH);
      ctx.fillRect(backX + backW - 1, backY, 1, backH);
      ctx.fillStyle = '#fde047';
      ctx.font = 'bold 10px ui-monospace, monospace';
      ctx.fillText('← BACK TO DMVSOS TESTS', W / 2, backY + 14);
      ctx.restore();
      backRect = { x: backX, y: backY, w: backW, h: backH };
    } else {
      backRect = null;
    }
  }

  function draw() {
    // shoulders — color from current city
    const cur = currentCity();
    ctx.fillStyle = cur.shoulder;
    ctx.fillRect(0, 0, W, H);
    // ===== SHOULDER TEXTURE — small grass/sand tufts scattered on left + right =====
    // (stable per-cell hash, scrolls with the world so they feel grounded)
    ctx.fillStyle = 'rgba(0,0,0,0.18)';
    const tufts = 18;
    for (let i = 0; i < tufts; i++) {
      const hashed = (i * 73 + 17) & 0xff;
      // left shoulder column position (0..ROAD_X)
      const lx = (hashed * 3) % (ROAD_X - 4);
      // y-position scrolls with scrollY so tufts feel like ground
      const ly = ((i * 37 + scrollY) % H + H) % H;
      ctx.fillRect(lx, ly | 0, 1, 1);
      // right shoulder
      const rx = ROAD_X + ROAD_W + ((hashed * 5 + 11) % (W - ROAD_X - ROAD_W - 4));
      const ry = ((i * 41 + scrollY * 0.9) % H + H) % H;
      ctx.fillRect(rx, ry | 0, 1, 1);
    }
    // road
    ctx.fillStyle = COL_ROAD;
    ctx.fillRect(ROAD_X, 0, ROAD_W, H);
    // road crown — slightly lighter strip down the middle (suggests pavement crown / wear)
    ctx.fillStyle = '#0e0e0e';
    ctx.fillRect(ROAD_X + ROAD_W / 2 - 30, 0, 60, H);
    // inner road edge shading — 1px darker rim along the shoulders (asphalt-meets-grass)
    ctx.fillStyle = '#000';
    ctx.fillRect(ROAD_X + 1, 0, 1, H);
    ctx.fillRect(ROAD_X + ROAD_W - 2, 0, 1, H);
    // road edges (yellow-ish line typical of highways)
    ctx.fillStyle = COL_EDGE;
    ctx.fillRect(ROAD_X - 1, 0, 2, H);
    ctx.fillRect(ROAD_X + ROAD_W - 1, 0, 2, H);
    // dashed lane dividers — with a brighter top edge (fresh paint highlight)
    for (let i = 1; i < LANES; i++) {
      const x = ROAD_X + i * LANE_W;
      for (let y = -40 + scrollY; y < H; y += 40) {
        ctx.fillStyle = COL_DASH;
        ctx.fillRect(x - 2, y, 4, 20);
        // bright top edge (newly painted look)
        ctx.fillStyle = '#5a5a5a';
        ctx.fillRect(x - 2, y, 4, 1);
        // worn bottom edge (slightly darker)
        ctx.fillStyle = '#202020';
        ctx.fillRect(x - 2, y + 19, 4, 1);
      }
    }

    // roadside landmarks (city skyline / palm / needle / bridge) — behind signs
    for (const l of landmarks) drawLandmark(l);
    // roadside signs (on shoulders)
    for (const s of signs) drawSign(s);

    // dust + MOTO exhaust puffs + Vegas neon glow
    for (const d of dust) {
      const a = Math.max(0, d.life / d.max);
      if (a <= 0) continue;
      if (d.kind === 'exhaust') {
        // grey-blue exhaust — billowy cloud: dark body + lighter top fluff
        const sz = d.w + Math.round((1 - a) * 2);
        const ix = (d.x - sz / 2) | 0;
        const iy = d.y | 0;
        // soft outer halo (cloud diffusion)
        ctx.fillStyle = `rgba(110,120,130,${a * 0.3})`;
        ctx.fillRect(ix - 1, iy - 1, sz + 2, sz + 2);
        // body
        ctx.fillStyle = `rgba(90,100,110,${a * 0.65})`;
        ctx.fillRect(ix, iy, sz, sz);
        // top highlight (cloud lit from above)
        if (sz >= 2) {
          ctx.fillStyle = `rgba(160,170,180,${a * 0.4})`;
          ctx.fillRect(ix, iy, sz, 1);
        }
      } else if (d.kind === 'rainbow') {
        // boost rainbow trail — color cycles by particle age + position
        const hue = ((d.x * 7 + d.y * 3 + elapsed * 200) | 0) % 360;
        const sz = d.w + Math.round((1 - a) * 2);
        const ix = (d.x - sz / 2) | 0;
        // glow halo (matching hue, faint)
        ctx.fillStyle = `hsla(${hue}, 100%, 60%, ${a * 0.35})`;
        ctx.fillRect(ix - 1, d.y - 1, sz + 2, sz + 2);
        // body
        ctx.fillStyle = `hsla(${hue}, 100%, 55%, ${a * 0.8})`;
        ctx.fillRect(ix, d.y | 0, sz, sz);
        // bright white core
        ctx.fillStyle = `rgba(255,255,255,${a * 0.6})`;
        ctx.fillRect((d.x - 1) | 0, d.y | 0, 1, 1);
      } else if (d.kind === 'neon') {
        // golden afterimage — soft glow, expands as it dims, with double-halo bloom
        const sz = d.w + Math.round((1 - a) * 3);
        // outer halo (wide, very faint)
        ctx.fillStyle = `rgba(252,204,21,${a * 0.15})`;
        ctx.fillRect((d.x - sz / 2 - 2) | 0, (d.y - 2) | 0, sz + 4, sz + 4);
        // inner halo
        ctx.fillStyle = `rgba(252,204,21,${a * 0.32})`;
        ctx.fillRect((d.x - sz / 2 - 1) | 0, (d.y - 1) | 0, sz + 2, sz + 2);
        // bright core
        ctx.fillStyle = `rgba(255,235,120,${a * 0.65})`;
        ctx.fillRect((d.x - sz / 2) | 0, d.y | 0, sz, sz);
        // white-hot center pixel
        if (sz >= 2) {
          ctx.fillStyle = `rgba(255,255,240,${a * 0.5})`;
          ctx.fillRect(d.x | 0, (d.y + 1) | 0, 1, 1);
        }
      } else {
        // default dust — irregular silhouette (asymmetric pixel pattern)
        const ix = d.x | 0;
        const iy = d.y | 0;
        ctx.fillStyle = `rgba(120,120,120,${a * 0.55})`;
        ctx.fillRect(ix, iy, d.w, d.w);
        // small offset pixel for non-rectangular cloud shape
        if (d.w >= 2) {
          ctx.fillStyle = `rgba(100,100,100,${a * 0.35})`;
          ctx.fillRect(ix - 1, iy + 1, 1, 1);
          ctx.fillRect(ix + d.w, iy + d.w - 1, 1, 1);
        }
      }
    }

    // coins
    for (const c of coins) {
      const lcx = laneX(c.lane);
      if (c.mystery) {
        // mystery gold jackpot coin — pulsing size + halo + sparkles
        const pulse = 1 + Math.sin(elapsed * 7 + c.y * 0.03) * 0.18;
        const sz = (12 * pulse) | 0;
        const hx = lcx - sz / 2;
        // golden halo
        ctx.fillStyle = 'rgba(252,204,21,0.28)';
        ctx.fillRect((hx - 3) | 0, (c.y - 3) | 0, sz + 6, sz + 6);
        // amber core
        ctx.fillStyle = '#f59e0b';
        ctx.fillRect(hx | 0, c.y | 0, sz, sz);
        // bright top band
        ctx.fillStyle = '#fde047';
        ctx.fillRect((hx + 1) | 0, (c.y + 1) | 0, sz - 2, 2);
        // white glint (flashing)
        if (Math.floor(elapsed * 6) % 2 === 0) {
          ctx.fillStyle = '#fff';
          ctx.fillRect((hx + 2) | 0, (c.y + 3) | 0, 2, 2);
        }
        // 4-pointed sparkle dots floating around
        ctx.fillStyle = 'rgba(255,235,120,' + (0.5 + Math.sin(elapsed * 4) * 0.4) + ')';
        ctx.fillRect((lcx - 9) | 0, (c.y - 4 + Math.sin(elapsed * 3) * 2) | 0, 1, 1);
        ctx.fillRect((lcx + 8) | 0, (c.y + 6 + Math.cos(elapsed * 3.5) * 2) | 0, 1, 1);
        ctx.fillRect((lcx + 6) | 0, (c.y - 5 + Math.sin(elapsed * 2.5) * 2) | 0, 1, 1);
        ctx.fillStyle = 'rgba(255,255,255,0.6)';
        ctx.fillRect((lcx) | 0, (c.y - 6) | 0, 1, 1);
      } else if (c.boost) {
        // BOOST STAR — gold 5-point star with orbiting sparkle dots
        const sz = 12;
        const hx = lcx - sz / 2;
        const cy = c.y;
        // halo
        ctx.fillStyle = 'rgba(252,204,21,0.35)';
        ctx.fillRect(hx - 3, cy - 3, sz + 6, sz + 6);
        // 5-point pixel star
        ctx.fillStyle = '#facc15';
        ctx.fillRect(hx + 5, cy,     2, 2);    // top point
        ctx.fillRect(hx + 3, cy + 2, 6, 2);    // upper bar
        ctx.fillRect(hx + 1, cy + 4, 10, 2);   // wide middle
        ctx.fillRect(hx + 2, cy + 6, 8, 2);    // narrow upper-body
        ctx.fillRect(hx + 2, cy + 8, 3, 2);    // lower-left leg
        ctx.fillRect(hx + 7, cy + 8, 3, 2);    // lower-right leg
        ctx.fillRect(hx + 1, cy + 10, 2, 1);   // outer left foot
        ctx.fillRect(hx + 9, cy + 10, 2, 1);   // outer right foot
        // bright center
        ctx.fillStyle = '#fff';
        ctx.fillRect(hx + 5, cy + 5, 2, 2);
        ctx.fillStyle = '#fffbeb';
        ctx.fillRect(hx + 4, cy + 4, 1, 1);
        // 4 orbiting sparkle dots
        ctx.fillStyle = '#fde047';
        const ang = elapsed * 4;
        for (let i = 0; i < 4; i++) {
          const a = ang + i * Math.PI / 2;
          const sx = lcx + Math.cos(a) * 9;
          const sy = cy + 6 + Math.sin(a) * 9;
          ctx.fillRect(sx | 0, sy | 0, 1, 1);
        }
      } else if (c.cash) {
        // CASH STACK — green stack of bills with $ on top
        const sz = 14;
        const hx = lcx - sz / 2;
        const cy = c.y;
        // green halo
        ctx.fillStyle = 'rgba(34,197,94,0.3)';
        ctx.fillRect(hx - 2, cy - 2, sz + 4, sz + 4);
        // 3 stacked bill layers
        ctx.fillStyle = '#15803d';
        ctx.fillRect(hx,     cy + 6, sz,     3);
        ctx.fillStyle = '#16a34a';
        ctx.fillRect(hx,     cy + 3, sz,     3);
        ctx.fillStyle = '#22c55e';
        ctx.fillRect(hx,     cy,     sz,     3);
        // bill edge highlights (white tops)
        ctx.fillStyle = '#86efac';
        ctx.fillRect(hx, cy,     sz, 1);
        ctx.fillRect(hx, cy + 3, sz, 1);
        ctx.fillRect(hx, cy + 6, sz, 1);
        // big $ in the middle (white)
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 8px ui-monospace, monospace';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('$', lcx, cy + 4);
        ctx.textBaseline = 'alphabetic';
        // pulse sparkle
        if (Math.floor(elapsed * 5) % 2 === 0) {
          ctx.fillStyle = '#fde047';
          ctx.fillRect(hx + sz - 2, cy - 1, 1, 1);
        }
      } else if (c.license) {
        // DMV LICENSE CARD — blue plastic card with portrait silhouette + text
        const sz = 16, ch = 11;
        const hx = lcx - sz / 2;
        const cy = c.y;
        // bright blue halo (pulses)
        const pulse = 0.4 + Math.sin(elapsed * 6) * 0.2;
        ctx.fillStyle = `rgba(59,130,246,${pulse * 0.6})`;
        ctx.fillRect(hx - 3, cy - 2, sz + 6, ch + 4);
        // white border
        ctx.fillStyle = '#fff';
        ctx.fillRect(hx - 1, cy - 1, sz + 2, ch + 2);
        // blue card body
        ctx.fillStyle = '#1e40af';
        ctx.fillRect(hx, cy, sz, ch);
        // top blue band
        ctx.fillStyle = '#3b82f6';
        ctx.fillRect(hx, cy, sz, 3);
        // bottom white field (text area)
        ctx.fillStyle = '#f4ead8';
        ctx.fillRect(hx, cy + 6, sz, ch - 6);
        // tiny portrait silhouette (head + shoulders) on left
        ctx.fillStyle = '#0a0a0a';
        ctx.fillRect(hx + 2, cy + 4, 2, 2);     // head
        ctx.fillRect(hx + 1, cy + 6, 4, 1);     // shoulders
        // "DMV" text in blue band
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 4px ui-monospace, monospace';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('DMV', hx + sz - 5, cy + 1.5);
        // "LIC" text in lower band
        ctx.fillStyle = '#1e40af';
        ctx.fillText('LIC', hx + sz - 5, cy + 8);
        ctx.textBaseline = 'alphabetic';
        // sparkle
        if (Math.floor(elapsed * 5) % 2 === 0) {
          ctx.fillStyle = '#fff';
          ctx.fillRect(hx + sz - 2, cy + 1, 1, 1);
        }
      } else {
        // Regular gold coin — round-ish with 3D shading, star in center, shimmer
        const sz = 10;
        const hx = lcx - sz / 2;
        const cy = c.y;
        // Outer dark-gold rim (rounded silhouette via 2 stacked rects)
        ctx.fillStyle = '#a87510';
        ctx.fillRect(hx + 1, cy,     sz - 2, sz);
        ctx.fillRect(hx,     cy + 1, sz,     sz - 2);
        // Inner bright-gold face
        ctx.fillStyle = '#facc15';
        ctx.fillRect(hx + 2, cy + 1, sz - 4, sz - 2);
        ctx.fillRect(hx + 1, cy + 2, sz - 2, sz - 4);
        // Top-left light highlight
        ctx.fillStyle = '#fde68a';
        ctx.fillRect(hx + 2, cy + 1, sz - 4, 1);
        ctx.fillRect(hx + 1, cy + 2, 1, sz - 4);
        // Bottom-right shadow (3D pop)
        ctx.fillStyle = '#7a5208';
        ctx.fillRect(hx + sz - 2, cy + 2, 1, sz - 4);
        ctx.fillRect(hx + 2, cy + sz - 2, sz - 4, 1);
        // STAR symbol in center (5-point pixel star)
        ctx.fillStyle = '#7a5208';
        ctx.fillRect(hx + 4, cy + 3, 2, 1);
        ctx.fillRect(hx + 3, cy + 4, 4, 1);
        ctx.fillRect(hx + 4, cy + 5, 2, 1);
        ctx.fillRect(hx + 3, cy + 6, 1, 1);
        ctx.fillRect(hx + 6, cy + 6, 1, 1);
        // Sharp white glint top-left
        ctx.fillStyle = '#fffbeb';
        ctx.fillRect(hx + 2, cy + 2, 2, 1);
        // Subtle shimmer dot — alternates between two positions
        ctx.fillStyle = '#fff5e0';
        if (Math.floor(elapsed * 3 + c.y * 0.03) % 2 === 0) {
          ctx.fillRect(hx + sz - 3, cy + 3, 1, 1);
        } else {
          ctx.fillRect(hx + sz - 4, cy + 4, 1, 1);
        }
      }
    }

    // obstacles
    for (const o of obstacles) {
      const ox = o.x !== undefined ? o.x : laneX(o.lane) - o.w / 2;
      switch (o.type) {
        case 'gator': drawGator(ox, o.y, o.w, o.h); break;
        case 'tree':  drawTree(ox, o.y, o.w, o.h); break;
        case 'construction': drawConstruction(ox, o.y, o.w, o.h); break;
        case 'deer':    drawDeer(ox, o.y, o.w, o.h); break;
        case 'pothole': drawPothole(ox, o.y, o.w, o.h); break;
        case 'oilslick': drawOilSlick(ox, o.y, o.w, o.h); break;
        case 'police':  drawPolice(ox, o.y, o.w, o.h); break;
        case 'ice':     drawICE(ox, o.y, o.w, o.h); break;
        case 'cones':   drawCones(ox, o.y, o.w, o.h); break;
        case 'drifter': drawDrifter(ox, o.y, o.w, o.h); break;
        case 'prius':   drawPrius(ox, o.y, o.w, o.h); break;
        case 'tesla':   drawTesla(ox, o.y, o.w, o.h); break;
        case 'momsuv':  drawMomSUV(ox, o.y, o.w, o.h); break;
        case 'movingtruck': drawMovingTruck(ox, o.y, o.w, o.h); break;
        case 'bmw': drawBMW(ox, o.y, o.w, o.h, o.signalSide); break;
        case 'van': {
          // stoned-driver wobble — lazy lateral drift + tiny vertical bob.
          // Phase offset by o.y so multiple vans don't sway in sync.
          const bobX = Math.sin(elapsed * 2.8 + o.y * 0.06) * 1.8;
          const bobY = Math.sin(elapsed * 1.7 + o.y * 0.04) * 0.8;
          drawVan(ox + bobX, o.y + bobY, o.w, o.h);
          break;
        }
        case 'truck':   drawTruck(ox, o.y, o.w, o.h); break;
        case 'cone':    drawCone(ox, o.y, o.w, o.h); break;
        case 'crazytrailer': {
          // wobbly tow rig — body sways side-to-side as it scrolls
          const wob = Math.sin(elapsed * 5 + (o.wobblePhase ?? 0)) * 3;
          drawCrazyTrailer(ox + wob, o.y, o.w, o.h);
          break;
        }
        case 'uhaul':   drawUHaul(ox, o.y, o.w, o.h); break;
        default: {
          // any unknown type — fall back to red block (shouldn't happen)
          ctx.fillStyle = COL_OBST;
          ctx.fillRect(ox, o.y, o.w, o.h);
        }
      }
    }

    // player vehicle — flash during invulnerability so player sees they're protected
    const v = VEHICLES[vehicleKey];
    const carW = v.w * CELL, carH = v.h * CELL;
    const carPX = carXSmooth - carW / 2;
    const carPY = H - carH - CELL;
    const flashHide = invulnT > 0 && Math.floor(elapsed * 16) % 2 === 0;

    // ===== SHIELD HALO during invulnerability (when NOT boosting — boost has its own vignette) =====
    if (invulnT > 0 && boostT <= 0) {
      const haloPulse = 0.4 + Math.sin(elapsed * 14) * 0.3;
      // outer cyan halo
      ctx.fillStyle = `rgba(56,189,248,${haloPulse * 0.35})`;
      ctx.fillRect(carPX - 4, carPY - 4, carW + 8, carH + 8);
      // inner brighter halo
      ctx.fillStyle = `rgba(125,211,252,${haloPulse * 0.45})`;
      ctx.fillRect(carPX - 2, carPY - 2, carW + 4, carH + 4);
    }

    if (!flashHide) drawVehicle(carPX, carPY, v, 1);

    // arch signs — drawn AFTER the car so you appear to drive UNDER them
    for (const a of archSigns) drawArchSign(a);

    // ambient weather — fog/drizzle/sun/steam per state
    drawWeather();

    // PNW leaves drifting (active in SEA / PDX)
    drawLeaves();

    // Austin tumbleweeds rolling across the road
    drawTumbleweeds();

    // NYC blowing trash scraps
    drawTrash();

    // confetti coin shower — gold burst on achievements / mult upgrades
    drawConfetti();

    // floating score "+N ×M" popups — slot-style number pops
    drawScorePopups();

    // floating "this is a gator" / "STONED DRIVER" tags above new hazards
    drawLabels();

    // BOOST screen tint — golden vignette + speed-line motion blur
    if (boostT > 0) {
      const a = Math.min(1, boostT / BOOST_DUR);
      const pulse = 0.5 + Math.sin(elapsed * 8) * 0.15;
      ctx.fillStyle = `rgba(252,204,21,${0.6 * a * pulse})`;
      ctx.fillRect(0, 0, W, 3);
      ctx.fillRect(0, H - 3, W, 3);
      ctx.fillRect(0, 0, 3, H);
      ctx.fillRect(W - 3, 0, 3, H);

      // Speed-line motion blur — vertical streaks scrolling fast downward.
      // Deterministic columns + phase so they don't flicker between frames.
      const streakSpeed = 1400;                      // px/s — faster than world
      const intensity = Math.min(1, boostT * 4);     // ramp-up in first 0.25s
      // Side streaks on grass — denser, brighter (suggests speed without obscuring play)
      const sideCols = [4, 10, 16, 22, 28, 34, 286, 292, 298, 304, 310, 316];
      ctx.fillStyle = `rgba(255,255,255,${0.55 * intensity})`;
      for (let i = 0; i < sideCols.length; i++) {
        const x = sideCols[i];
        const segLen = 40 + (i % 3) * 12;
        const gap = 16 + (i % 4) * 4;
        const period = segLen + gap;
        // each column phase = stable per-i seed + scrolling offset
        const phase = (i * 37 + elapsed * streakSpeed) % period;
        for (let y = -period + phase; y < H; y += period) {
          ctx.fillRect(x, y, 1, segLen);
        }
      }
      // Road streaks — sparser, subtler so they don't hide hazards
      ctx.fillStyle = `rgba(255,255,255,${0.18 * intensity})`;
      const roadCols = [60, 120, 180, 220];
      for (let i = 0; i < roadCols.length; i++) {
        const x = roadCols[i];
        const segLen = 28;
        const period = 96;
        const phase = (i * 53 + elapsed * streakSpeed) % period;
        for (let y = -period + phase; y < H; y += period) {
          ctx.fillRect(x, y, 1, segLen);
        }
      }
    }

    drawHUD();
    drawHPHearts();
    drawLicenseTracker();
    drawComboBadge();
    drawBrakeOverlay();
    drawBanner();
    drawStateBestFlash();
    drawAchievementBanner();
    drawRepairPrompt();
    drawRestBeat();

    if (paused && alive) drawPausedOverlay();
    if (tutorialActive && alive) drawTutorialOverlay();
    if (startScreenActive && alive) drawStartScreen();
    if (!alive) drawGameOver();
  }

  // Start screen — title + stats card for returning players.
  // Shows TOP-5 + streak + daily challenge + current rank before player dives in.
  function drawStartScreen() {
    // ===== ARCADE MARQUEE BACKGROUND — dark sepia gradient (warm, like a CRT) =====
    ctx.fillStyle = '#1a0d08';
    ctx.fillRect(0, 0, W, H);
    // top warm glow
    ctx.fillStyle = 'rgba(139,29,29,0.35)';
    ctx.fillRect(0, 0, W, 120);
    ctx.fillStyle = 'rgba(120,30,15,0.25)';
    ctx.fillRect(0, 0, W, 60);
    // bottom dark vignette
    ctx.fillStyle = 'rgba(0,0,0,0.45)';
    ctx.fillRect(0, H - 100, W, 100);
    // CRT scanlines — subtle horizontal stripes
    ctx.fillStyle = 'rgba(0,0,0,0.15)';
    for (let sy = 0; sy < H; sy += 3) {
      ctx.fillRect(0, sy, W, 1);
    }
    ctx.textAlign = 'center';

    // Title — slam-in: scale from 2.5× → 1.0× over 0.45s (ease-out-quart)
    const titleT = Math.min(1, startScreenT / 0.45);
    const titleEase = 1 - Math.pow(1 - titleT, 4);
    const titleScale = 2.5 - 1.5 * titleEase;
    const titleAlpha = titleEase;
    ctx.save();
    ctx.globalAlpha = titleAlpha;
    ctx.translate(W / 2, 56);
    ctx.scale(titleScale, titleScale);
    ctx.translate(-W / 2, -56);
    // ===== STREETS-OF-RAGE STYLE LOGO — fat layered letters with yellow stroke =====
    // Stack of 5 layers: thick black outline → yellow border → dark red shadow
    // → orange-red main → bright yellow top highlight. Slight italic skew.
    ctx.font = 'italic bold 30px ui-monospace, monospace';
    const tx = W / 2;
    const ty = 56;
    // 1) Thick BLACK outline (8-direction offset for chunky stroke)
    ctx.fillStyle = '#0a0000';
    [[-2,0],[2,0],[0,-2],[0,2],[-2,-2],[2,-2],[-2,2],[2,2]].forEach(([dx,dy]) => {
      ctx.fillText('EXAM SKIPPER', tx + dx, ty + dy);
    });
    // 2) YELLOW border (4-direction tighter offset)
    ctx.fillStyle = '#fde047';
    [[-1,0],[1,0],[0,-1],[0,1]].forEach(([dx,dy]) => {
      ctx.fillText('EXAM SKIPPER', tx + dx, ty + dy);
    });
    // 3) DARK RED shadow under letters (creates 3D depth)
    ctx.fillStyle = '#7f1d1d';
    ctx.fillText('EXAM SKIPPER', tx, ty + 1);
    // 4) ORANGE-RED main body
    ctx.fillStyle = '#dc2626';
    ctx.fillText('EXAM SKIPPER', tx, ty);
    // 5) BRIGHT YELLOW top highlight (catches "light from above")
    ctx.fillStyle = '#fde047';
    ctx.save();
    ctx.beginPath();
    ctx.rect(0, ty - 22, W, 8);
    ctx.clip();
    ctx.fillText('EXAM SKIPPER', tx, ty);
    ctx.restore();
    ctx.restore();

    // ===== Subtitle "3000" — chunky red badge under the title =====
    const subT = Math.max(0, Math.min(1, (startScreenT - 0.40) / 0.30));
    ctx.save();
    ctx.globalAlpha = subT;
    ctx.textAlign = 'center';
    // Red round-rect badge backing
    const badgeW = 70, badgeH = 26;
    const badgeX = (W - badgeW) / 2;
    const badgeY = 78;
    // badge drop shadow
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(badgeX + 2, badgeY + 3, badgeW, badgeH);
    // outer black border
    ctx.fillStyle = '#0a0000';
    ctx.fillRect(badgeX - 1, badgeY - 1, badgeW + 2, badgeH + 2);
    // yellow border
    ctx.fillStyle = '#fde047';
    ctx.fillRect(badgeX, badgeY, badgeW, badgeH);
    // red main panel
    ctx.fillStyle = '#dc2626';
    ctx.fillRect(badgeX + 2, badgeY + 2, badgeW - 4, badgeH - 4);
    // top highlight
    ctx.fillStyle = '#ef4444';
    ctx.fillRect(badgeX + 2, badgeY + 2, badgeW - 4, 3);
    // "3000" text — chunky white with black shadow
    ctx.font = 'italic bold 22px ui-monospace, monospace';
    ctx.fillStyle = '#0a0000';
    ctx.fillText('3000', W / 2 + 2, badgeY + 19);
    ctx.fillStyle = '#fff';
    ctx.fillText('3000', W / 2, badgeY + 18);
    // yellow top-strip highlight on the 3000 (caught light)
    ctx.fillStyle = '#fde047';
    ctx.save();
    ctx.beginPath();
    ctx.rect(0, badgeY + 8, W, 3);
    ctx.clip();
    ctx.fillText('3000', W / 2, badgeY + 18);
    ctx.restore();
    ctx.restore();

    // SLOGAN — small italic tagline under the badge
    const sloT = Math.max(0, Math.min(1, (startScreenT - 0.55) / 0.30));
    if (sloT > 0) {
      ctx.save();
      ctx.globalAlpha = sloT;
      ctx.font = 'italic bold 9px ui-monospace, monospace';
      ctx.textAlign = 'center';
      ctx.fillStyle = 'rgba(0,0,0,0.6)';
      ctx.fillText("IT'S NOT A GAME · IT'S LIFE", W / 2 + 1, badgeY + 38);
      ctx.fillStyle = '#fde047';
      ctx.fillText("IT'S NOT A GAME · IT'S LIFE", W / 2, badgeY + 37);
      ctx.restore();
    }

    // STREAK badge (left of center)
    const streak = getStreak();
    if (streak.count >= 2) {
      ctx.font = 'bold 8px ui-monospace, monospace';
      ctx.textAlign = 'right';
      const stText = '🔥 ' + streak.count + '-DAY';
      const stTW = ctx.measureText(stText).width;
      const stPW = Math.ceil(stTW) + 10;
      const stPH = 13;
      const stPX = W / 2 - stPW / 2 - 30;
      const stPY = 112;
      ctx.fillStyle = '#7f1d1d';
      ctx.fillRect(stPX, stPY, stPW, stPH);
      ctx.fillStyle = '#dc2626';
      ctx.fillRect(stPX, stPY, stPW, 1);
      ctx.fillRect(stPX, stPY + stPH - 1, stPW, 1);
      ctx.fillStyle = '#fff';
      ctx.textBaseline = 'middle';
      ctx.fillText(stText, stPX + stPW - 6, stPY + stPH / 2 + 0.5);
      ctx.textBaseline = 'alphabetic';
    }

    // RANK pill (right of center)
    const ri = rankIndexFor(best);
    const rank = RANKS[ri];
    ctx.font = 'bold 8px ui-monospace, monospace';
    ctx.textAlign = 'left';
    const rkText = '★ ' + rank.name;
    const rkTW = ctx.measureText(rkText).width;
    const rkPW = Math.ceil(rkTW) + 10;
    const rkPH = 13;
    const rkPX = W / 2 + 4;
    const rkPY = 112;
    ctx.fillStyle = '#0c2856';
    ctx.fillRect(rkPX, rkPY, rkPW, rkPH);
    ctx.fillStyle = rank.color;
    ctx.fillRect(rkPX, rkPY, rkPW, 1);
    ctx.fillRect(rkPX, rkPY + rkPH - 1, rkPW, 1);
    ctx.fillStyle = rank.color;
    ctx.textBaseline = 'middle';
    ctx.fillText(rkText, rkPX + 6, rkPY + rkPH / 2 + 0.5);
    ctx.textBaseline = 'alphabetic';

    // TROPHIES pill — inline with rank pill (right side, smaller), no overlap
    let myWins = 0;
    try { myWins = +(localStorage.getItem('chill.winsCount') || 0); } catch (_) {}
    if (myWins > 0) {
      ctx.font = 'bold 7px ui-monospace, monospace';
      ctx.textAlign = 'left';
      const twText = '🏆' + myWins;
      const twTW = ctx.measureText(twText).width;
      const twPW = Math.ceil(twTW) + 8;
      const twPH = 11;
      const twPX = rkPX + rkPW + 3;
      const twPY = 113;
      // gold backing
      ctx.fillStyle = '#7c2d12';
      ctx.fillRect(twPX, twPY, twPW, twPH);
      ctx.fillStyle = '#fde047';
      ctx.fillRect(twPX, twPY,             twPW, 1);
      ctx.fillRect(twPX, twPY + twPH - 1,  twPW, 1);
      ctx.fillStyle = '#fde047';
      ctx.textBaseline = 'middle';
      ctx.fillText(twText, twPX + 4, twPY + twPH / 2 + 0.5);
      ctx.textBaseline = 'alphabetic';
    }
    ctx.textAlign = 'center';

    // ===== STATS panel — raised card with drop shadow, edge highlights, and section dividers =====
    const panelY = 134;
    const panelH = 220;
    const panelX = 20;
    const panelW = W - 40;
    // drop shadow under the panel
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(panelX + 2, panelY + 3, panelW, panelH);
    // panel body — slightly denser
    ctx.fillStyle = 'rgba(12,40,86,0.65)';
    ctx.fillRect(panelX, panelY, panelW, panelH);
    // top + bottom borders
    ctx.fillStyle = '#3a4868';
    ctx.fillRect(panelX, panelY,                 panelW, 1);
    ctx.fillRect(panelX, panelY + panelH - 1,    panelW, 1);
    // left edge highlight (raised feel)
    ctx.fillStyle = 'rgba(255,255,255,0.08)';
    ctx.fillRect(panelX, panelY, 1, panelH);
    // bottom edge shadow
    ctx.fillStyle = 'rgba(0,0,0,0.4)';
    ctx.fillRect(panelX, panelY + panelH - 1, panelW, 1);
    // section dividers (after BEST at +54, after DAILY at +94, after TOP5 at +130)
    ctx.fillStyle = 'rgba(58,72,104,0.5)';
    ctx.fillRect(panelX + 8, panelY + 54,  panelW - 16, 1);
    ctx.fillRect(panelX + 8, panelY + 94,  panelW - 16, 1);
    ctx.fillRect(panelX + 8, panelY + 130, panelW - 16, 1);
    // tiny corner star pixel accents
    ctx.fillStyle = COL_PICK;
    ctx.fillRect(panelX + 3,           panelY + 3,           1, 1);
    ctx.fillRect(panelX + panelW - 4,  panelY + 3,           1, 1);
    ctx.fillRect(panelX + 3,           panelY + panelH - 4,  1, 1);
    ctx.fillRect(panelX + panelW - 4,  panelY + panelH - 4,  1, 1);

    // YOUR BEST
    ctx.font = '8px ui-monospace, monospace';
    ctx.fillStyle = '#7a8aa8';
    ctx.fillText('YOUR BEST', W / 2, panelY + 14);
    ctx.font = 'bold 28px ui-monospace, monospace';
    ctx.fillStyle = COL_PICK;
    ctx.fillText(String(best || 0), W / 2, panelY + 42);

    // DAILY
    const daily = getDailyChallenge();
    ctx.font = '8px ui-monospace, monospace';
    ctx.fillStyle = '#7a8aa8';
    ctx.fillText('TODAY\'S CHALLENGE', W / 2, panelY + 64);
    ctx.font = 'bold 12px ui-monospace, monospace';
    ctx.fillStyle = daily.achieved ? '#5ee08b' : '#facc15';
    ctx.fillText((daily.achieved ? '✓ ' : 'BEAT ') + daily.target, W / 2, panelY + 82);

    // TOP-5 mini line
    const top5 = getTop5();
    if (top5.length > 0) {
      ctx.font = '8px ui-monospace, monospace';
      ctx.fillStyle = '#7a8aa8';
      ctx.fillText('TOP 5', W / 2, panelY + 104);
      ctx.font = 'bold 9px ui-monospace, monospace';
      const ew = (W - 60) / 5;
      for (let i = 0; i < 5; i++) {
        const e = top5[i];
        const cx = 30 + ew * (i + 0.5);
        if (e) {
          ctx.fillStyle = '#cfd8e8';
          ctx.fillText(String(e.score), cx, panelY + 118);
        } else {
          ctx.fillStyle = '#3a4a6a';
          ctx.fillText('—', cx, panelY + 118);
        }
      }
    }

    // Next rank progress
    if (ri < RANKS.length - 1) {
      const nextRank = RANKS[ri + 1];
      const remaining = Math.max(0, nextRank.threshold - best);
      ctx.font = '7px ui-monospace, monospace';
      ctx.fillStyle = '#7a8aa8';
      ctx.fillText(remaining + ' POINTS TO ' + nextRank.name, W / 2, panelY + 138);
      // mini progress bar
      const barW = W - 60;
      const barX = 30;
      const barY = panelY + 148;
      const prog = (best - rank.threshold) / (nextRank.threshold - rank.threshold);
      ctx.fillStyle = '#1a2030';
      ctx.fillRect(barX, barY, barW, 4);
      ctx.fillStyle = nextRank.color;
      ctx.fillRect(barX, barY, Math.min(barW, barW * prog), 4);
    }

    // ===== TOP WINNERS teaser (Hall of Fame from past WINS) =====
    let winners = [];
    try { winners = JSON.parse(localStorage.getItem('chill.winners') || '[]'); } catch (_) {}
    const wty = panelY + 162;
    ctx.font = 'bold 7px ui-monospace, monospace';
    ctx.fillStyle = '#fde047';
    ctx.textAlign = 'center';
    ctx.fillText('★ TOP WINNERS ★', W / 2, wty);
    if (winners.length === 0) {
      ctx.font = '7px ui-monospace, monospace';
      ctx.fillStyle = '#7a8aa8';
      ctx.fillText('BE THE FIRST WINNER · COLLECT 5 LIC', W / 2, wty + 12);
      // show personal best license progress as motivation
      let bestLicRun = 0;
      try { bestLicRun = +(localStorage.getItem('chill.bestLicensesRun') || 0); } catch (_) {}
      if (bestLicRun > 0) {
        ctx.fillStyle = '#3b82f6';
        ctx.fillText('YOUR BEST: ' + bestLicRun + '/5 LICENSES', W / 2, wty + 22);
      }
    } else {
      ctx.font = 'bold 7px ui-monospace, monospace';
      ctx.textAlign = 'left';
      for (let i = 0; i < Math.min(3, winners.length); i++) {
        const w = winners[i];
        const ny = wty + 10 + i * 8;
        ctx.fillStyle = i === 0 ? '#facc15' : '#cfd8e8';
        ctx.fillText('#' + (i + 1) + ' ' + (w.name || 'ANON').slice(0, 14), 30, ny);
        ctx.textAlign = 'right';
        ctx.fillText(String(w.score), W - 30, ny);
        ctx.textAlign = 'left';
      }
      ctx.textAlign = 'center';
      // BEST WIN time — fastest time-to-win across all wins
      let bestTime = Infinity;
      for (const w of winners) {
        if (w.time && w.time > 0 && w.time < bestTime) bestTime = w.time;
      }
      if (bestTime < Infinity) {
        const bm = (bestTime / 60) | 0, bs = bestTime % 60;
        const bestStr = bm + ':' + String(bs).padStart(2, '0');
        ctx.font = 'italic 6px ui-monospace, monospace';
        ctx.fillStyle = '#fde047';
        ctx.fillText('BEST WIN: ' + bestStr, W / 2, wty + 38);
      }
    }

    // PLAY button (pulsing) — halo + sheen sweep mirroring RETRY treatment
    const pulse = 1 + Math.sin(elapsed * 4) * 0.04;
    const bw = 220, bh = 50;
    const bx = (W - bw) / 2;
    const by = H - 90;
    ctx.save();
    ctx.translate(W / 2, by + bh / 2);
    ctx.scale(pulse, pulse);
    ctx.translate(-W / 2, -(by + bh / 2));

    // Halo pulse (only after start screen has settled)
    if (startScreenT > 0.8) {
      const haloA = (Math.sin(elapsed * 4) * 0.4 + 0.6) * 0.20;
      ctx.fillStyle = `rgba(57,211,83,${haloA})`;
      ctx.fillRect(bx - 6, by - 2, bw + 12, bh + 4);
      ctx.fillRect(bx - 3, by - 5, bw + 6,  bh + 10);
    }
    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.55)';
    ctx.fillRect(bx, by + 3, bw, bh);
    // Face
    ctx.fillStyle = COL_PICK;
    ctx.fillRect(bx, by, bw, bh);
    // Top highlight + bottom shade for embossed look
    ctx.fillStyle = '#5ee08b';
    ctx.fillRect(bx, by, bw, 2);
    ctx.fillStyle = '#1f7a30';
    ctx.fillRect(bx, by + bh - 3, bw, 3);
    // Sheen sweep (after 1s of start screen)
    if (startScreenT > 1.0) {
      const sweep = ((startScreenT - 1.0) * 0.5) % 1;
      const sx = bx + sweep * (bw + 30) - 30;
      ctx.save();
      ctx.beginPath();
      ctx.rect(bx, by, bw, bh);
      ctx.clip();
      ctx.fillStyle = 'rgba(255,255,255,0.18)';
      ctx.fillRect(sx,     by + 2, 16, bh - 4);
      ctx.fillStyle = 'rgba(255,255,255,0.08)';
      ctx.fillRect(sx - 6, by + 2, 6,  bh - 4);
      ctx.fillRect(sx + 16, by + 2, 6,  bh - 4);
      ctx.restore();
    }
    // Label with subtle shadow
    ctx.fillStyle = 'rgba(0,0,0,0.4)';
    ctx.font = 'bold 16px ui-monospace, monospace';
    ctx.fillText('TAP TO PLAY', W / 2 + 1, by + 32);
    ctx.fillStyle = '#031a08';
    ctx.fillText('TAP TO PLAY', W / 2, by + 31);
    ctx.restore();

    // Brand + version footer
    ctx.font = '6px ui-monospace, monospace';
    ctx.fillStyle = '#7a8aa8';
    ctx.textAlign = 'center';
    ctx.fillText('DMVSOS.COM · v1.0', W / 2, H - 6);
  }

  // First-session tutorial card — explains controls + meta-loops.
  // Game is frozen until player taps/keys anywhere.
  function drawTutorialOverlay() {
    // dim backdrop
    ctx.fillStyle = 'rgba(5,9,19,0.92)';
    ctx.fillRect(0, 0, W, H);
    ctx.textAlign = 'center';

    // ===== TITLE — slam-in scale animation =====
    const titleT = Math.min(1, tutorialT / 0.45);
    const titleEase = 1 - Math.pow(1 - titleT, 4);
    const titleScale = 2.0 - 1.0 * titleEase;
    const titleAlpha = titleEase;
    ctx.save();
    ctx.globalAlpha = titleAlpha;
    ctx.translate(W / 2, 70);
    ctx.scale(titleScale, titleScale);
    ctx.translate(-W / 2, -70);
    // drop shadow under the title
    ctx.fillStyle = 'rgba(0,0,0,0.7)';
    ctx.font = 'bold 22px ui-monospace, monospace';
    ctx.fillText('HOW TO PLAY', W / 2 + 2, 71);
    ctx.fillStyle = '#fff';
    ctx.fillText('HOW TO PLAY', W / 2, 70);
    ctx.restore();

    // Title underline (accent line)
    const ulT = Math.max(0, Math.min(1, (tutorialT - 0.35) / 0.25));
    if (ulT > 0) {
      ctx.save();
      ctx.globalAlpha = ulT;
      ctx.fillStyle = COL_PICK;
      const ulW = 100 * ulT;
      ctx.fillRect(W / 2 - ulW / 2, 79, ulW, 2);
      ctx.restore();
    }

    // Subtitle — fade-in after title
    const subT = Math.max(0, Math.min(1, (tutorialT - 0.50) / 0.30));
    ctx.save();
    ctx.globalAlpha = subT;
    ctx.font = '9px ui-monospace, monospace';
    ctx.fillStyle = '#7a8aa8';
    ctx.fillText('DODGE THE ROAD · COLLECT COINS · BEAT YOUR RANK',
                 W / 2, 92);
    ctx.restore();

    // ===== INSTRUCTIONS CARD =====
    // Card backing (subtle dark panel)
    const cardX = 16;
    const cardY = 110;
    const cardW = W - 32;
    const cardH = 7 * 18 + 16;   // 7 rows + padding
    const cardT = Math.max(0, Math.min(1, (tutorialT - 0.55) / 0.30));
    ctx.save();
    ctx.globalAlpha = cardT;
    ctx.fillStyle = 'rgba(12,40,86,0.45)';
    ctx.fillRect(cardX, cardY, cardW, cardH);
    // card border
    ctx.fillStyle = '#2a3550';
    ctx.fillRect(cardX, cardY, cardW, 1);
    ctx.fillRect(cardX, cardY + cardH - 1, cardW, 1);

    // Instructions list — each row fades in with stagger
    const lines = [
      { c: COL_PICK,  label: 'TAP / SWIPE',   desc: 'CHANGE LANE' },
      { c: COL_PICK,  label: 'HOLD SLOW',     desc: 'SLOW WORLD' },
      { c: '#facc15', label: 'PASS HAZARDS',  desc: 'COMBO + BONUS' },
      { c: '#facc15', label: 'GOLD COINS',    desc: '+50 PTS' },
      { c: '#f59e0b', label: 'JACKPOT GOLD',  desc: '+200 PTS · RARE' },
      { c: '#5ee08b', label: 'CLOSE DODGE',   desc: 'EXTRA BONUS' },
      { c: '#ef4444', label: 'HIT ANYTHING',  desc: 'GAME OVER' },
    ];
    ctx.textBaseline = 'middle';
    let ly = cardY + 16;
    for (let i = 0; i < lines.length; i++) {
      const ln = lines[i];
      // per-row stagger fade-in (50ms apart starting at 0.7s)
      const rowDelay = 0.7 + i * 0.05;
      const rowT = Math.max(0, Math.min(1, (tutorialT - rowDelay) / 0.25));
      if (rowT <= 0) { ly += 18; continue; }
      const rowOff = (1 - rowT) * 8;
      ctx.globalAlpha = rowT * cardT;

      // Row alternating subtle stripe
      if (i % 2 === 0) {
        ctx.fillStyle = 'rgba(255,255,255,0.025)';
        ctx.fillRect(cardX + 1, ly - 8, cardW - 2, 16);
      }

      // Leading colored dot/chip (instead of arrow)
      ctx.fillStyle = ln.c;
      ctx.fillRect(cardX + 14, ly - 2, 4, 4);
      // dot highlight
      ctx.fillStyle = 'rgba(255,255,255,0.4)';
      ctx.fillRect(cardX + 14, ly - 2, 1, 1);

      // Label (left)
      ctx.font = 'bold 10px ui-monospace, monospace';
      ctx.fillStyle = ln.c;
      ctx.textAlign = 'left';
      ctx.fillText(ln.label, cardX + 24, ly + rowOff * 0.5);

      // Description (right)
      ctx.textAlign = 'right';
      ctx.fillStyle = '#cfd8e8';
      ctx.font = '9px ui-monospace, monospace';
      ctx.fillText(ln.desc, cardX + cardW - 14, ly + rowOff * 0.5);

      ly += 18;
    }
    ctx.restore();
    ctx.globalAlpha = 1;
    ctx.textBaseline = 'alphabetic';
    ctx.textAlign = 'center';

    // 12 STATES line — fun teaser, fades in last
    const teaserT = Math.max(0, Math.min(1, (tutorialT - 1.10) / 0.30));
    if (teaserT > 0) {
      ctx.save();
      ctx.globalAlpha = teaserT;
      ctx.font = 'bold 9px ui-monospace, monospace';
      ctx.fillStyle = '#a78bfa';
      ctx.fillText('12 STATES · SHUFFLED EVERY GAME',
                   W / 2, ly + 8);
      ctx.restore();
    }

    // Big TAP TO START button (pulse)
    const bw = 220, bh = 50;
    const bx = (W - bw) / 2;
    const by = H - 100;
    const pulse = 1 + Math.sin(elapsed * 4) * 0.04;
    ctx.save();
    ctx.translate(W / 2, by + bh / 2);
    ctx.scale(pulse, pulse);
    ctx.translate(-W / 2, -(by + bh / 2));
    // shadow
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(bx, by + 3, bw, bh);
    // face green
    ctx.fillStyle = COL_PICK;
    ctx.fillRect(bx, by, bw, bh);
    // top highlight
    ctx.fillStyle = '#5ee08b';
    ctx.fillRect(bx, by, bw, 2);
    ctx.fillStyle = '#1f7a30';
    ctx.fillRect(bx, by + bh - 3, bw, 3);
    // text
    ctx.fillStyle = '#031a08';
    ctx.font = 'bold 16px ui-monospace, monospace';
    ctx.fillText('TAP ANYWHERE TO START', W / 2, by + 31);
    ctx.restore();

    // hint
    ctx.font = '8px ui-monospace, monospace';
    ctx.fillStyle = '#3a4a6a';
    ctx.fillText('DMVSOS · STUDY, THEN CHILL', W / 2, H - 14);
  }

  // Confetti coin shower — golden particles bursting upward with gravity + spin
  function drawConfetti() {
    if (!confetti.length) return;
    ctx.save();
    for (const cf of confetti) {
      const a = Math.min(1, cf.life / cf.max * 1.5);
      if (a <= 0) continue;
      ctx.globalAlpha = Math.max(0, a);

      // Spin simulated by aspect ratio: cos for width, sin for height
      const cosS = Math.cos(cf.spin);
      const sinS = Math.sin(cf.spin);
      const w = Math.max(1, Math.abs(cosS) * cf.size + 1);
      const h = Math.max(1, Math.abs(sinS) * cf.size + 1);
      const ix = (cf.x - w / 2) | 0;
      const iy = (cf.y - h / 2) | 0;
      const iw = w | 0;
      const ih = h | 0;

      // ===== TRAIL — short fading streak behind the particle =====
      // (suggests motion; trail length scales with size so heavier confetti has longer trails)
      if (cf.vx !== undefined && cf.vy !== undefined && cf.size >= 2) {
        const trailLen = 3;
        // normalize-ish velocity direction (no division by zero if both 0)
        const sp = Math.hypot(cf.vx, cf.vy);
        if (sp > 4) {
          const ndx = -cf.vx / sp;
          const ndy = -cf.vy / sp;
          ctx.fillStyle = cf.shade;
          for (let t = 1; t <= trailLen; t++) {
            ctx.globalAlpha = Math.max(0, a) * (1 - t / (trailLen + 1)) * 0.55;
            const tx = (cf.x + ndx * t * 2 - w / 2) | 0;
            const ty = (cf.y + ndy * t * 2 - h / 2) | 0;
            ctx.fillRect(tx, ty, iw, ih);
          }
          ctx.globalAlpha = Math.max(0, a);
        }
      }

      // ===== MAIN PIECE =====
      ctx.fillStyle = cf.shade;
      ctx.fillRect(ix, iy, iw, ih);

      // ===== EDGE HIGHLIGHT — bright pixel on the "lit" edge depending on spin =====
      // (gives the confetti a 3D twist feel as it spins)
      if (cf.size >= 2 && iw >= 2 && ih >= 2) {
        ctx.fillStyle = 'rgba(255,255,255,0.55)';
        if (Math.abs(cosS) > Math.abs(sinS)) {
          // wider than tall — highlight on left edge
          ctx.fillRect(ix, iy, 1, ih);
        } else {
          // taller than wide — highlight on top edge
          ctx.fillRect(ix, iy, iw, 1);
        }
        // matching shadow on opposite edge
        ctx.fillStyle = 'rgba(0,0,0,0.25)';
        if (Math.abs(cosS) > Math.abs(sinS)) {
          ctx.fillRect(ix + iw - 1, iy, 1, ih);
        } else {
          ctx.fillRect(ix, iy + ih - 1, iw, 1);
        }
      }
    }
    ctx.restore();
  }

  // Floating score "+N ×M" popups — slot-machine style feedback
  function drawScorePopups() {
    if (!popups.length) return;
    ctx.save();
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    for (const p of popups) {
      const t = p.life / p.max;
      const a = t > 0.82 ? (1 - t) / 0.18 : t < 0.10 ? t / 0.10 : 1;
      const alpha = Math.max(0, a);
      if (alpha <= 0) continue;
      // ===== POP-IN scale: starts at 1.25× and settles to 1.0× over first 15% =====
      const popT = Math.min(1, t * 6.67);   // 0..1 over first ~15% of life
      const scale = popT < 1 ? 1.25 - 0.25 * popT : 1;

      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.translate(p.x, p.y);
      if (scale !== 1) ctx.scale(scale, scale);
      ctx.font = 'bold ' + (p.big ? 12 : 10) + 'px ui-monospace, monospace';

      // ===== CHIP BACKING — small dark pill for legibility on bright sprites =====
      // Measure text and draw a pill behind it; only for big popups (less noise on tiny +N)
      if (p.big) {
        const tw = ctx.measureText(p.text).width;
        const pw = Math.ceil(tw) + 6;
        const ph = 14;
        // dark pill
        ctx.fillStyle = 'rgba(5,9,19,0.7)';
        ctx.fillRect(-pw / 2, -ph / 2, pw, ph);
        // accent top + bottom borders
        ctx.fillStyle = p.color;
        ctx.fillRect(-pw / 2, -ph / 2,        pw, 1);
        ctx.fillRect(-pw / 2,  ph / 2 - 1,    pw, 1);
      }

      // ===== TEXT — drop shadow then colored fill =====
      ctx.fillStyle = 'rgba(0,0,0,0.75)';
      ctx.fillText(p.text, 1, 1);
      ctx.fillStyle = p.color;
      ctx.fillText(p.text, 0, 0);
      ctx.restore();
    }
    ctx.textBaseline = 'alphabetic';
    ctx.restore();
  }

  // Per-state best flash — small pill under HUD when entering a city
  function drawStateBestFlash() {
    if (!stateBestFlash) return;
    const t = stateBestFlash.life / stateBestFlash.max;
    const a = t > 0.85 ? (1 - t) / 0.15 : t < 0.18 ? t / 0.18 : 1;
    if (a <= 0) return;
    ctx.save();
    ctx.globalAlpha = Math.max(0, a);
    ctx.font = 'bold 8px ui-monospace, monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    const text = stateBestFlash.text;
    const tw = ctx.measureText(text).width;
    const pw = Math.ceil(tw) + 28;   // wider — room for sparkle icons
    const ph = 14;
    const px = (W - pw) / 2;
    const py = H * 0.40;
    const accent = stateBestFlash.color;

    // ===== SOFT GLOW HALO behind the pill =====
    ctx.fillStyle = accent;
    ctx.globalAlpha = Math.max(0, a) * 0.18;
    ctx.fillRect(px - 4, py + 2,        pw + 8, ph - 4);
    ctx.fillRect(px - 2, py - 1,        pw + 4, ph + 2);
    ctx.globalAlpha = Math.max(0, a);

    // ===== DROP SHADOW =====
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(px + 1, py + 2, pw, ph);

    // ===== DARK PILL BACKING =====
    ctx.fillStyle = 'rgba(5,9,19,0.92)';
    ctx.fillRect(px, py, pw, ph);
    // accent top + bottom borders (thicker than before — 2px)
    ctx.fillStyle = accent;
    ctx.fillRect(px, py,             pw, 2);
    ctx.fillRect(px, py + ph - 2,    pw, 2);
    // border highlight
    ctx.fillStyle = 'rgba(255,255,255,0.35)';
    ctx.fillRect(px, py,             pw, 1);

    // ===== SPARKLE STAR ICONS — bookending the text, twinkle on/off =====
    const tw2 = Math.floor(elapsed * 5) % 2;
    const lit = (i) => (i + tw2) % 2 === 0;
    // left star (3px cross)
    ctx.fillStyle = lit(0) ? '#fff' : accent;
    ctx.fillRect(px + 4, py + 5, 3, 1);
    ctx.fillRect(px + 5, py + 4, 1, 3);
    ctx.fillRect(px + 5, py + 5, 1, 1);
    // right star
    ctx.fillStyle = lit(1) ? '#fff' : accent;
    ctx.fillRect(px + pw - 7, py + 5, 3, 1);
    ctx.fillRect(px + pw - 6, py + 4, 1, 3);
    ctx.fillRect(px + pw - 6, py + 5, 1, 1);

    // ===== TEXT — accent-colored on dark background =====
    ctx.fillStyle = accent;
    ctx.fillText(text, W / 2, py + ph / 2 + 0.5);
    ctx.textBaseline = 'alphabetic';
    ctx.restore();
  }

  // Achievement banner — floats in mid-screen with shimmer, fades in/out
  function drawAchievementBanner() {
    if (!achievementBanner) return;
    const b = achievementBanner;
    const t = b.life / b.max;
    const a = t > 0.88 ? (1 - t) / 0.12
            : t < 0.20 ? t / 0.20
            : 1;
    const text = b.text;
    ctx.save();
    ctx.globalAlpha = Math.max(0, Math.min(1, a));
    ctx.font = 'bold 12px ui-monospace, monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    const tw = ctx.measureText(text).width;
    const pw = Math.ceil(tw) + 50;   // wider — room for trophies on each side
    const ph = 32;                    // slightly taller for layout
    const px = (W - pw) / 2;
    const py = H * 0.38;
    // shimmer scale around peak life
    const scaleP = (t > 0.7 && t < 0.92) ? (1 + (t - 0.7) * 0.6) : 1;
    ctx.translate(W / 2, py + ph / 2);
    ctx.scale(scaleP, scaleP);
    ctx.translate(-W / 2, -(py + ph / 2));

    // ===== OUTER GLOW HALO — gold pulses around the banner =====
    const glowPulse = 0.4 + Math.sin(elapsed * 6) * 0.15;
    ctx.fillStyle = `rgba(252,204,21,${glowPulse * 0.20})`;
    ctx.fillRect(px - 6, py + 4,  pw + 12, ph - 8);
    ctx.fillRect(px - 3, py - 2,  pw + 6,  ph + 4);

    // ===== DROP SHADOW =====
    ctx.fillStyle = 'rgba(0,0,0,0.55)';
    ctx.fillRect(px + 2, py + 3, pw, ph);

    // ===== DEEP RED BACKING (SoR3 retro palette) =====
    ctx.fillStyle = '#7f1d1d';
    ctx.fillRect(px, py, pw, ph);
    // inner darker bottom
    ctx.fillStyle = '#450a0a';
    ctx.fillRect(px, py + ph - 10, pw, 8);
    // top bright red highlight
    ctx.fillStyle = '#dc2626';
    ctx.fillRect(px, py + 2, pw, 6);

    // ===== YELLOW border (thick golden arches) over BLACK outer outline =====
    ctx.fillStyle = '#0a0000';
    ctx.fillRect(px - 1,            py - 1,             pw + 2, 1);
    ctx.fillRect(px - 1,            py + ph,            pw + 2, 1);
    ctx.fillRect(px - 1,            py - 1,             1,      ph + 2);
    ctx.fillRect(px + pw,           py - 1,             1,      ph + 2);
    ctx.fillStyle = '#fde047';
    ctx.fillRect(px,            py,             pw, 2);
    ctx.fillRect(px,            py + ph - 2,    pw, 2);
    ctx.fillRect(px,            py,             2,  ph);
    ctx.fillRect(px + pw - 2,   py,             2,  ph);
    // border highlights
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.fillRect(px,            py,             pw, 1);
    ctx.fillRect(px,            py,             1,  ph);

    // ===== CORNER TROPHIES — pixel art trophy on each side of the text =====
    // Trophy: cup (4px), stem (1px), base (3px) — gold
    const drawTrophy = (tx, ty) => {
      // cup body
      ctx.fillStyle = '#fde047';
      ctx.fillRect(tx,     ty,     5, 4);
      // cup highlight (left edge)
      ctx.fillStyle = '#fef9c3';
      ctx.fillRect(tx,     ty,     1, 3);
      // cup shadow (right edge)
      ctx.fillStyle = '#a16207';
      ctx.fillRect(tx + 4, ty,     1, 4);
      // handles (sticking out left + right)
      ctx.fillStyle = '#facc15';
      ctx.fillRect(tx - 1, ty + 1, 1, 2);
      ctx.fillRect(tx + 5, ty + 1, 1, 2);
      // stem
      ctx.fillStyle = '#a16207';
      ctx.fillRect(tx + 1, ty + 4, 3, 1);
      ctx.fillRect(tx + 2, ty + 5, 1, 2);
      // base
      ctx.fillStyle = '#facc15';
      ctx.fillRect(tx,     ty + 7, 5, 1);
      ctx.fillRect(tx - 1, ty + 8, 7, 1);
      // base shadow
      ctx.fillStyle = '#a16207';
      ctx.fillRect(tx + 4, ty + 8, 2, 1);
    };
    drawTrophy(px + 4,        py + 11);
    drawTrophy(px + pw - 10,  py + 11);

    // ===== STAR BURST behind the text — 4 pixels in cardinal directions =====
    const starPulse = Math.sin(elapsed * 4) * 0.5 + 0.5;
    ctx.fillStyle = `rgba(252,204,21,${starPulse * 0.7})`;
    ctx.fillRect(px + pw / 2 - 12, py + ph / 2 - 1, 2, 2);
    ctx.fillRect(px + pw / 2 + 10, py + ph / 2 - 1, 2, 2);

    // ===== SHIMMER STREAK — bright band sweeping across when active =====
    const sweep = ((elapsed * 1.8) % 1);
    const sx = px + sweep * pw;
    ctx.fillStyle = 'rgba(255,255,255,0.15)';
    ctx.fillRect(sx - 12, py + 2, 12, ph - 4);

    // ===== "UNLOCKED" prefix small =====
    ctx.fillStyle = '#9ca3af';
    ctx.font = 'bold 7px ui-monospace, monospace';
    ctx.fillText('★ UNLOCKED ★', W / 2, py + 9);

    // ===== MAIN achievement text with shadow =====
    ctx.fillStyle = 'rgba(0,0,0,0.55)';
    ctx.font = 'bold 12px ui-monospace, monospace';
    ctx.fillText(text, W / 2 + 1, py + 22);
    ctx.fillStyle = '#facc15';
    ctx.fillText(text, W / 2, py + 21);
    ctx.textBaseline = 'alphabetic';
    ctx.restore();
  }

  // Pause overlay — dimmed canvas + big PAUSED text + tap-to-resume hint
  function drawPausedOverlay() {
    // Dark backdrop
    ctx.fillStyle = 'rgba(5,9,19,0.82)';
    ctx.fillRect(0, 0, W, H);
    // Subtle scanlines (retro game pause vibe) — every other row gets a faint dim
    ctx.fillStyle = 'rgba(0,0,0,0.18)';
    for (let sy = 0; sy < H; sy += 2) {
      ctx.fillRect(0, sy, W, 1);
    }
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';

    // ===== PAUSE ICON — two thick vertical bars above the title =====
    const iconCY = H / 2 - 56;
    ctx.fillStyle = '#5ee08b';
    ctx.fillRect(W / 2 - 12, iconCY - 10, 6, 20);
    ctx.fillRect(W / 2 + 6,  iconCY - 10, 6, 20);
    // bar highlights
    ctx.fillStyle = 'rgba(255,255,255,0.4)';
    ctx.fillRect(W / 2 - 12, iconCY - 10, 1, 20);
    ctx.fillRect(W / 2 + 6,  iconCY - 10, 1, 20);
    // bar shadows
    ctx.fillStyle = '#1f7a30';
    ctx.fillRect(W / 2 - 7,  iconCY - 10, 1, 20);
    ctx.fillRect(W / 2 + 11, iconCY - 10, 1, 20);

    // ===== TITLE — drop-shadow PAUSED =====
    ctx.fillStyle = 'rgba(0,0,0,0.7)';
    ctx.font = 'bold 30px ui-monospace, monospace';
    ctx.fillText('PAUSED', W / 2 + 2, H / 2 - 10);
    ctx.fillStyle = '#fff';
    ctx.fillText('PAUSED', W / 2, H / 2 - 12);

    // ===== MINI STATS during pause (shows player current state) =====
    const sy = H / 2 + 10;
    ctx.font = '9px ui-monospace, monospace';
    // Score
    ctx.fillStyle = '#7a8aa8';
    ctx.fillText('SCORE', W / 2 - 60, sy);
    ctx.fillStyle = COL_PICK;
    ctx.font = 'bold 14px ui-monospace, monospace';
    ctx.fillText(String(score || 0), W / 2 - 60, sy + 14);
    // Combo
    ctx.fillStyle = '#7a8aa8';
    ctx.font = '9px ui-monospace, monospace';
    ctx.fillText('COMBO', W / 2, sy);
    ctx.fillStyle = '#5ee08b';
    ctx.font = 'bold 14px ui-monospace, monospace';
    ctx.fillText('×' + (combo || 0), W / 2, sy + 14);
    // HP
    ctx.fillStyle = '#7a8aa8';
    ctx.font = '9px ui-monospace, monospace';
    ctx.fillText('HP', W / 2 + 60, sy);
    ctx.fillStyle = '#ef4444';
    ctx.font = 'bold 14px ui-monospace, monospace';
    ctx.fillText(String(playerHP || 0) + '/' + PLAYER_MAX_HP, W / 2 + 60, sy + 14);

    // ===== HINT — pulsing =====
    const pulse = 0.5 + Math.sin(elapsed * 2) * 0.3;
    ctx.globalAlpha = pulse;
    ctx.fillStyle = COL_PICK;
    ctx.font = 'bold 11px ui-monospace, monospace';
    ctx.fillText('TAP RESUME · P TO CONTINUE', W / 2, H / 2 + 56);
    ctx.globalAlpha = 1;
    ctx.textBaseline = 'alphabetic';
  }

  // Brake overlay — when SLOW is held, thin red vignette + "SLOW" badge in HUD
  function drawBrakeOverlay() {
    if (!braking) return;
    const pulse = 0.5 + Math.sin(elapsed * 12) * 0.18;

    // ===== RED CORNER VIGNETTE — darker in corners, suggests pressure =====
    // Top-left corner
    ctx.fillStyle = `rgba(220,38,38,${pulse * 0.55})`;
    ctx.fillRect(0, 0, 60, 1);
    ctx.fillRect(0, 0, 1, 60);
    ctx.fillStyle = `rgba(220,38,38,${pulse * 0.35})`;
    ctx.fillRect(1, 0, 30, 1);
    ctx.fillRect(0, 1, 1, 30);
    // Top-right corner
    ctx.fillStyle = `rgba(220,38,38,${pulse * 0.55})`;
    ctx.fillRect(W - 60, 0, 60, 1);
    ctx.fillRect(W - 1, 0, 1, 60);
    // Bottom-left
    ctx.fillStyle = `rgba(220,38,38,${pulse * 0.55})`;
    ctx.fillRect(0, H - 1, 60, 1);
    ctx.fillRect(0, H - 60, 1, 60);
    // Bottom-right
    ctx.fillRect(W - 60, H - 1, 60, 1);
    ctx.fillRect(W - 1, H - 60, 1, 60);

    // ===== THIN RED BORDER around the canvas (top/bottom only — less obtrusive) =====
    ctx.fillStyle = `rgba(220,38,38,${pulse * 0.45})`;
    ctx.fillRect(0, 0, W, 1);
    ctx.fillRect(0, H - 1, W, 1);

    // ===== MOTION-DRAG STREAKS — short red horizontal streaks at the edges =====
    // (suggests the player is bleeding off speed — opposite of the boost streaks)
    ctx.fillStyle = `rgba(220,38,38,${pulse * 0.35})`;
    const dragPhase = (elapsed * 60) % 24;   // slower than boost streaks
    const dragYs = [80, 160, 240, 360, 420];
    for (const dy of dragYs) {
      // Left edge drag streak
      ctx.fillRect(2 + dragPhase * 0.3,  dy, 8, 1);
      // Right edge drag streak
      ctx.fillRect(W - 10 - dragPhase * 0.3, dy + 12, 8, 1);
    }

    // ===== SLOW BADGE — moved to TOP-LEFT under HUD (heart area cleared) =====
    const text = '◀◀ SLOW';
    ctx.save();
    ctx.font = 'bold 9px ui-monospace, monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    const tw = ctx.measureText(text).width;
    const pw = Math.ceil(tw) + 10;
    const ph = 14;
    const px = 6;
    const py = HUD_H + 4;
    // shadow
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(px + 1, py + 2, pw, ph);
    // pill body
    ctx.fillStyle = '#DC2626';
    ctx.fillRect(px, py, pw, ph);
    // top highlight
    ctx.fillStyle = 'rgba(255,255,255,0.30)';
    ctx.fillRect(px, py, pw, 1);
    // bottom shadow
    ctx.fillStyle = '#7f1d1d';
    ctx.fillRect(px, py + ph - 1, pw, 1);
    // text with subtle pulse
    ctx.fillStyle = pulse > 0.55 ? '#fff' : '#fee2e2';
    ctx.fillText(text, px + pw / 2, py + ph / 2 + 0.5);
    ctx.textBaseline = 'alphabetic';
    ctx.restore();
  }

  // HP indicator — 3 hearts in the top-right corner under HUD strip
  function drawHPHearts() {
    if (playerHP == null) return;
    const hx = W - 8;
    const hy = HUD_H + 6;
    // Pulse rate ramps up as HP drops (heartbeat anxiety)
    const lowHP = playerHP <= 1;
    const pulseRate = lowHP ? 8 : 3;
    const pulseA = 0.5 + Math.sin(elapsed * pulseRate) * 0.5;

    for (let i = 0; i < PLAYER_MAX_HP; i++) {
      const filled = i < playerHP;
      const cx = hx - i * 11;

      // ===== EMPTY HEART SLOT — dim outline =====
      if (!filled) {
        ctx.fillStyle = 'rgba(80,40,40,0.35)';
        // top two bumps
        ctx.fillRect(cx - 6, hy,     2, 2);
        ctx.fillRect(cx - 3, hy,     2, 2);
        // wide middle
        ctx.fillRect(cx - 7, hy + 2, 8, 2);
        // taper
        ctx.fillRect(cx - 6, hy + 4, 6, 1);
        ctx.fillRect(cx - 5, hy + 5, 4, 1);
        ctx.fillRect(cx - 4, hy + 6, 2, 1);
        continue;
      }

      // ===== FILLED HEART — with pulse glow when low HP =====
      // Soft red glow halo behind heart when HP=1 (critical warning)
      if (lowHP && i === 0) {
        ctx.fillStyle = `rgba(239,68,68,${0.25 * pulseA})`;
        ctx.fillRect(cx - 9, hy + 1, 12, 6);
        ctx.fillRect(cx - 8, hy,     10, 8);
      }

      // Heart body — brighter red when at full HP, deeper red when low
      const bodyColor = lowHP
        ? (pulseA > 0.5 ? '#ef4444' : '#dc2626')
        : '#DC2626';
      ctx.fillStyle = bodyColor;
      // top two bumps
      ctx.fillRect(cx - 6, hy,     2, 2);
      ctx.fillRect(cx - 3, hy,     2, 2);
      // wide middle
      ctx.fillRect(cx - 7, hy + 2, 8, 2);
      // taper
      ctx.fillRect(cx - 6, hy + 4, 6, 1);
      ctx.fillRect(cx - 5, hy + 5, 4, 1);
      ctx.fillRect(cx - 4, hy + 6, 2, 1);

      // Bright highlight on top-left of heart (3D feel)
      ctx.fillStyle = '#fb7185';
      ctx.fillRect(cx - 6, hy + 1, 1, 1);
      ctx.fillRect(cx - 3, hy + 1, 1, 1);
      // Bottom shadow inside heart (depth)
      ctx.fillStyle = '#7f1d1d';
      ctx.fillRect(cx - 5, hy + 4, 4, 1);
      // tiny white sparkle on the heart (catches the light, esp at full HP)
      if (!lowHP) {
        ctx.fillStyle = 'rgba(255,255,255,0.5)';
        ctx.fillRect(cx - 6, hy, 1, 1);
      }
    }

    // ===== HP LABEL — tiny "HP" text above the hearts row =====
    ctx.save();
    ctx.font = 'bold 6px ui-monospace, monospace';
    ctx.textAlign = 'right';
    ctx.fillStyle = lowHP && pulseA > 0.5 ? '#ef4444' : '#7a8aa8';
    ctx.fillText('HP', W - 6, HUD_H + 4);
    ctx.restore();
  }

  // LICENSE TRACKER — small horizontal bar in top-left below HUD showing how
  // many DMV license cards the player has collected toward the WIN (5 needed).
  function drawLicenseTracker() {
    if (licensesGot == null) return;
    const lx = 6;
    const ly = HUD_H + 6;
    // label "LIC"
    ctx.save();
    ctx.font = 'bold 6px ui-monospace, monospace';
    ctx.textAlign = 'left';
    ctx.fillStyle = '#7a8aa8';
    ctx.fillText('LIC', lx, ly + 4);
    // 5 license card slots in a row
    const slotW = 7, slotH = 5, gap = 1;
    for (let i = 0; i < LICENSES_TO_WIN; i++) {
      const sx = lx + 15 + i * (slotW + gap);
      const filled = i < licensesGot;
      const isFresh = filled && (i === licensesGot - 1) && licenseFlashT > 0;
      if (filled) {
        // freshly-collected slot: white-yellow glow halo + scale-up
        if (isFresh) {
          ctx.fillStyle = `rgba(253,224,71,${licenseFlashT * 0.7})`;
          ctx.fillRect(sx - 2, ly - 2, slotW + 4, slotH + 4);
          ctx.fillStyle = `rgba(255,255,255,${licenseFlashT * 0.9})`;
          ctx.fillRect(sx - 1, ly - 1, slotW + 2, slotH + 2);
        }
        // pulsing blue filled card
        const p = 0.7 + Math.sin(elapsed * 4 + i * 0.6) * 0.3;
        ctx.fillStyle = `rgba(59,130,246,${p})`;
        ctx.fillRect(sx, ly, slotW, slotH);
        // white border
        ctx.fillStyle = '#fff';
        ctx.fillRect(sx, ly,           slotW, 1);
        ctx.fillRect(sx, ly + slotH - 1, slotW, 1);
        // tiny "DMV" hint pixel
        ctx.fillStyle = '#fff';
        ctx.fillRect(sx + slotW - 2, ly + 2, 1, 1);
      } else {
        // empty slot — dim outline
        ctx.fillStyle = 'rgba(59,130,246,0.20)';
        ctx.fillRect(sx, ly, slotW, slotH);
        ctx.fillStyle = '#3a4868';
        ctx.fillRect(sx, ly,             slotW, 1);
        ctx.fillRect(sx, ly + slotH - 1, slotW, 1);
        ctx.fillRect(sx, ly,             1,     slotH);
        ctx.fillRect(sx + slotW - 1, ly, 1,     slotH);
      }
    }
    ctx.restore();
  }

  // Repair prompt — pops up after a non-fatal collision. Shows a wrench icon,
  // a "TAP TO REPAIR" label, a countdown ring, and a 3-pip progress meter.
  // Player taps anywhere inside the prompt zone (or hits R) up to 3 times
  // within REPAIR_WIN to recover the lost HP. Stored hit zone in repairRect.
  function drawRepairPrompt() {
    if (!repairPrompt) { repairRect = null; return; }
    const r = repairPrompt;
    const t = 1 - (r.life / r.max);   // 0..1 progress through window
    const pw = 130, ph = 50;
    const px = (W - pw) / 2;
    const py = H * 0.42;
    repairRect = { x: px, y: py, w: pw, h: ph };

    // Pulse scale — small breathing pulse for urgency
    const pulse = 1 + Math.sin(elapsed * 8) * 0.04;
    ctx.save();
    ctx.translate(W / 2, py + ph / 2);
    ctx.scale(pulse, pulse);
    ctx.translate(-W / 2, -(py + ph / 2));

    // Outer glow halo — green if in time, orange when low time
    const lowTime = r.life < 0.6;
    const glowColor = lowTime ? '#fb923c' : '#5ee08b';
    const glowA = 0.30 + Math.sin(elapsed * 10) * 0.10;
    ctx.fillStyle = glowColor;
    ctx.globalAlpha = glowA;
    ctx.fillRect(px - 4, py + 2,  pw + 8, ph - 4);
    ctx.fillRect(px - 2, py - 2,  pw + 4, ph + 4);
    ctx.globalAlpha = 1;

    // Drop shadow
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(px + 2, py + 3, pw, ph);

    // Dark backing
    ctx.fillStyle = 'rgba(5,9,19,0.95)';
    ctx.fillRect(px, py, pw, ph);

    // Thick top + bottom borders
    ctx.fillStyle = lowTime ? '#fb923c' : COL_PICK;
    ctx.fillRect(px, py,             pw, 2);
    ctx.fillRect(px, py + ph - 2,    pw, 2);
    // Top highlight
    ctx.fillStyle = 'rgba(255,255,255,0.35)';
    ctx.fillRect(px, py, pw, 1);

    // ===== WRENCH ICON (left side) — bobs subtly to draw the eye =====
    const wbob = Math.round(Math.sin(elapsed * 12) * 1);
    const wcx = px + 14;
    const wcy = py + ph / 2 + wbob;
    ctx.fillStyle = '#cfd8e8';
    // handle (diagonal)
    ctx.fillRect(wcx + 2, wcy - 6, 2, 2);
    ctx.fillRect(wcx + 1, wcy - 4, 2, 2);
    ctx.fillRect(wcx,     wcy - 2, 2, 2);
    ctx.fillRect(wcx - 1, wcy,     2, 2);
    ctx.fillRect(wcx - 2, wcy + 2, 2, 2);
    ctx.fillRect(wcx - 3, wcy + 4, 2, 2);
    // wrench head (chunky square at top)
    ctx.fillStyle = '#9ca3af';
    ctx.fillRect(wcx + 1, wcy - 9, 6, 5);
    // wrench head jaws (notch)
    ctx.fillStyle = '#5a5a5a';
    ctx.fillRect(wcx + 3, wcy - 9, 2, 2);
    // bright shine
    ctx.fillStyle = '#fff';
    ctx.fillRect(wcx + 1, wcy - 9, 1, 1);

    // ===== TEXT LABEL =====
    ctx.font = 'bold 9px ui-monospace, monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    // shadow
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillText('TAP TO REPAIR', W / 2 + 8 + 1, py + 14 + 1);
    // main
    ctx.fillStyle = lowTime ? '#fb923c' : '#fff';
    ctx.fillText('TAP TO REPAIR', W / 2 + 8, py + 14);
    // sub-label: keystroke hint
    ctx.font = 'bold 7px ui-monospace, monospace';
    ctx.fillStyle = '#9ca3af';
    ctx.fillText('(OR PRESS R)', W / 2 + 8, py + 24);

    // ===== 3-PIP PROGRESS METER =====
    const pipW = 16, pipH = 6, pipGap = 4;
    const pipsTotal = r.needed * pipW + (r.needed - 1) * pipGap;
    let ppx = px + (pw - pipsTotal) / 2;
    const ppy = py + ph - 12;
    for (let i = 0; i < r.needed; i++) {
      const filled = i < r.taps;
      // backing
      ctx.fillStyle = '#1a2030';
      ctx.fillRect(ppx, ppy, pipW, pipH);
      // fill
      if (filled) {
        ctx.fillStyle = COL_PICK;
        ctx.fillRect(ppx + 1, ppy + 1, pipW - 2, pipH - 2);
        // bright highlight
        ctx.fillStyle = 'rgba(255,255,255,0.4)';
        ctx.fillRect(ppx + 1, ppy + 1, pipW - 2, 1);
      }
      // outline
      ctx.fillStyle = filled ? COL_PICK : '#3a4868';
      ctx.fillRect(ppx, ppy,            pipW, 1);
      ctx.fillRect(ppx, ppy + pipH - 1, pipW, 1);
      ppx += pipW + pipGap;
    }

    // ===== TIME-LEFT BAR at the very top of the pill =====
    const timeLeft = Math.max(0, r.life / r.max);
    const tbW = (pw - 6) * timeLeft;
    ctx.fillStyle = lowTime ? '#fb923c' : COL_PICK;
    ctx.fillRect(px + 3, py + 3, tbW, 1);

    ctx.restore();
    ctx.textBaseline = 'alphabetic';
  }

  // REST BEAT — big animated breather banner that appears when the road clears
  // every REST_INTERVAL points. Pure flavor, no input required. Player sees a
  // funny "wow wow slow down" message and gets ~3.5s without any spawns.
  function drawRestBeat() {
    if (!restBeat) return;
    const r = restBeat;
    const t = 1 - (r.life / r.max);   // 0 (start) → 1 (end)
    // Fade in over first 12%, hold, fade out over last 25%
    const a = t < 0.12 ? t / 0.12
            : t > 0.75 ? (1 - t) / 0.25
            : 1;
    const alpha = Math.max(0, Math.min(1, a));
    if (alpha <= 0) return;

    // Slam-in scale (1.4× → 1.0× over first 20%)
    const slamT = Math.min(1, t * 5);
    const slamEase = 1 - Math.pow(1 - slamT, 3);
    const scale = 1.4 - 0.4 * slamEase;

    // Position near top (below HUD, above center) so it doesn't fight with
    // achievement banner (H*0.38) when a 500-pt rest aligns with a 1000-pt
    // milestone achievement.
    const cy = HUD_H + 60;
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.translate(W / 2, cy);
    ctx.scale(scale, scale);
    ctx.translate(-W / 2, -cy);

    ctx.font = 'bold 12px ui-monospace, monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    const tw = ctx.measureText(r.text).width;
    const pw = Math.min(W - 16, Math.ceil(tw) + 28);
    const ph = 32;
    const px = (W - pw) / 2;
    const py = cy - ph / 2;

    // Pulsing green halo (mirrors the calm-down feel — green = safe)
    const haloA = 0.30 + Math.sin(elapsed * 4) * 0.12;
    ctx.fillStyle = `rgba(94,224,139,${haloA * alpha})`;
    ctx.fillRect(px - 6, py + 2,  pw + 12, ph - 4);
    ctx.fillRect(px - 3, py - 2,  pw + 6,  ph + 4);
    ctx.globalAlpha = alpha;

    // Drop shadow
    ctx.fillStyle = 'rgba(0,0,0,0.55)';
    ctx.fillRect(px + 2, py + 3, pw, ph);

    // Backing — dark navy with green accent
    ctx.fillStyle = 'rgba(5,9,19,0.92)';
    ctx.fillRect(px, py, pw, ph);

    // Thick green borders top + bottom (chill safe vibe)
    ctx.fillStyle = COL_PICK;
    ctx.fillRect(px, py,             pw, 2);
    ctx.fillRect(px, py + ph - 2,    pw, 2);
    ctx.fillRect(px, py,             2,  ph);
    ctx.fillRect(px + pw - 2, py,    2,  ph);
    // Top inner highlight
    ctx.fillStyle = 'rgba(255,255,255,0.4)';
    ctx.fillRect(px, py, pw, 1);

    // Corner pips (matches achievement banner / state best flash style)
    ctx.fillStyle = '#fff';
    ctx.fillRect(px + 4,         py + 4,        1, 1);
    ctx.fillRect(px + pw - 5,    py + 4,        1, 1);
    ctx.fillRect(px + 4,         py + ph - 5,   1, 1);
    ctx.fillRect(px + pw - 5,    py + ph - 5,   1, 1);

    // "BREATHER" prefix label small
    ctx.fillStyle = '#9ca3af';
    ctx.font = 'bold 7px ui-monospace, monospace';
    ctx.fillText('· BREATHER ·', W / 2, py + 9);

    // Main message — bigger + drop shadow
    ctx.font = 'bold 11px ui-monospace, monospace';
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillText(r.text, W / 2 + 1, py + 22);
    ctx.fillStyle = COL_PICK;
    ctx.fillText(r.text, W / 2, py + 21);

    // Time-left bar at the very bottom of the pill (counts down)
    const timeLeft = Math.max(0, r.life / r.max);
    ctx.fillStyle = '#5ee08b';
    ctx.fillRect(px + 3, py + ph - 4, (pw - 6) * timeLeft, 1);

    ctx.restore();
    ctx.textBaseline = 'alphabetic';
  }

  // Combo HUD — always visible when combo > 0. Tier-1 (combo 1-2) is muted +
  // shows progress toward x2; tier 2+ (combo>=3) is gold with multiplier text.
  function drawComboBadge() {
    if (combo < 1) return;
    const mult = 1 + Math.floor((combo - 1) / 3);
    const inTier = ((combo - 1) % 3) + 1;   // 1..3 within current tier
    const isMult = combo >= 3;
    // Mult tier color escalates: x1 grey, x2 gold, x3+ orange, x4+ red-orange
    let accent;
    if (!isMult) accent = '#7a8aa8';
    else if (mult <= 2) accent = '#facc15';
    else if (mult <= 3) accent = '#fb923c';
    else accent = '#f97316';
    const text = isMult
      ? '× ' + mult + '   COMBO ' + combo
      : 'COMBO ' + combo + '/3';

    ctx.save();
    ctx.font = 'bold 9px ui-monospace, monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    const tw = ctx.measureText(text).width;
    const pw = Math.ceil(tw) + 16;
    const ph = 14;
    const px = (W - pw) / 2;
    const py = HUD_H + 3;
    // pulse when a new multiplier just kicked in
    const pulse = comboFlashT > 0 ? (1 + Math.sin(elapsed * 30) * 0.04 * (comboFlashT / 0.6)) : 1;
    ctx.translate(W / 2, py + ph / 2);
    ctx.scale(pulse, pulse);
    ctx.translate(-(W / 2), -(py + ph / 2));

    // ===== GLOW HALO behind the badge when in multiplier territory =====
    if (isMult) {
      ctx.fillStyle = accent;
      ctx.globalAlpha = 0.15 + (comboFlashT > 0 ? comboFlashT * 0.2 : 0);
      ctx.fillRect(px - 3, py + 1, pw + 6, ph - 2);
      ctx.fillRect(px - 1, py - 1, pw + 2, ph + 2);
      ctx.globalAlpha = 1;
    }

    // Drop shadow
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(px + 1, py + 2, pw, ph);

    // Dark backing
    ctx.fillStyle = 'rgba(5,9,19,0.92)';
    ctx.fillRect(px, py, pw, ph);

    // Thick top + bottom accent borders (2px each)
    ctx.fillStyle = accent;
    ctx.fillRect(px, py,             pw, 2);
    ctx.fillRect(px, py + ph - 2,    pw, 2);
    // top inner highlight
    ctx.fillStyle = 'rgba(255,255,255,0.35)';
    ctx.fillRect(px, py, pw, 1);

    // ===== 3-segment progress ticks (replaces old single-row, now on a track) =====
    // Track: a thin dim row above the bottom accent border
    const trackY = py + ph - 4;
    const segW = (pw - 6) / 3;
    for (let i = 0; i < 3; i++) {
      const sxStart = px + 3 + segW * i;
      // empty slot
      ctx.fillStyle = 'rgba(122,138,168,0.18)';
      ctx.fillRect(sxStart + 1, trackY, segW - 2, 1);
      // filled if reached
      if (i < inTier) {
        ctx.fillStyle = accent;
        ctx.fillRect(sxStart + 1, trackY, segW - 2, 1);
        // bright highlight on top of fill
        ctx.fillStyle = 'rgba(255,255,255,0.4)';
        ctx.fillRect(sxStart + 1, trackY, Math.max(1, (segW - 2) >> 1), 1);
      }
    }

    // Text with subtle shadow
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillText(text, W / 2 + 1, py + ph / 2 + 1.5);
    ctx.fillStyle = comboFlashT > 0 ? '#fff' : accent;
    ctx.fillText(text, W / 2, py + ph / 2 + 0.5);
    ctx.textBaseline = 'alphabetic';
    ctx.restore();
  }

  function drawHUD() {
    const c = currentCity();
    // ===== STRIP — dark bg + 1px top highlight (HUD reads as raised panel) =====
    ctx.fillStyle = 'rgba(5,9,19,0.7)';
    ctx.fillRect(0, 0, W, HUD_H);
    // top inner highlight (subtle gradient feel)
    ctx.fillStyle = 'rgba(255,255,255,0.06)';
    ctx.fillRect(0, 0, W, 1);
    // bottom 2px accent border — persistent state cue
    ctx.fillStyle = c.accent;
    ctx.fillRect(0, HUD_H - 2, W, 2);
    // accent border highlight
    ctx.fillStyle = 'rgba(255,255,255,0.25)';
    ctx.fillRect(0, HUD_H - 2, W, 1);

    // ===== RANK PROGRESS bar — drawn ON the accent border =====
    // Shows progress toward next rank. Bar fills the bottom 1px row of the strip.
    const refScore = Math.max(score, best);
    const ri = rankIndexFor(refScore);
    if (ri < RANKS.length - 1) {
      const rank = RANKS[ri];
      const nextRank = RANKS[ri + 1];
      const prog = Math.max(0, Math.min(1,
        (refScore - rank.threshold) / (nextRank.threshold - rank.threshold)));
      // Dim track (slightly darker than the accent)
      ctx.fillStyle = 'rgba(0,0,0,0.35)';
      ctx.fillRect(0, HUD_H - 1, W, 1);
      // Fill the achieved portion with next-rank color
      ctx.fillStyle = nextRank.color;
      ctx.fillRect(0, HUD_H - 1, Math.floor(W * prog), 1);
    }

    ctx.font = 'bold 9px ui-monospace, monospace';
    ctx.textBaseline = 'middle';
    // ===== SCORE — left, with brake indicator when braking =====
    ctx.textAlign = 'left';
    let scoreX = 6;
    if (braking) {
      // Red "‖" brake indicator next to SCORE (parallel bars)
      const onB = Math.floor(elapsed * 6) % 2 === 0;
      ctx.fillStyle = onB ? '#ef4444' : '#7f1d1d';
      ctx.fillRect(scoreX,     HUD_H / 2 - 4, 1, 8);
      ctx.fillRect(scoreX + 2, HUD_H / 2 - 4, 1, 8);
      scoreX += 6;
    }
    ctx.fillStyle = '#cfd8e8';
    ctx.fillText('SCORE ' + String(score).padStart(4, '0'), scoreX, HUD_H / 2 - 1);
    // ===== BEST — right =====
    ctx.textAlign = 'right';
    ctx.fillStyle = '#7a8aa8';
    ctx.fillText('BEST ' + String(best).padStart(4, '0'), W - 6, HUD_H / 2 - 1);

    // ===== CENTER — [VEHICLE] · [STATE KEY] in respective colors =====
    // Strip "DMVSOS " brand prefix in HUD so the center stays tight.
