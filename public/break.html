  // WIN — player collected all LICENSES_TO_WIN. Stop the run, save the winner
  // to localStorage Hall of Fame, prompt for name + comment.
  function winGame() {
    if (!alive) return;
    gameWon = true;
    alive = false;
    setBrake(false);
    setPaused(false);
    gameOverT = 0;
    // celebrate score boost — keep score and best alive
    if (score > best) {
      best = score;
      try { localStorage.setItem('chill.best', String(best)); } catch (_) {}
    }
    // big audio fanfare
    blip(523, 0.15, 'triangle', 0.14);
    setTimeout(() => blip(659, 0.15, 'triangle', 0.14), 100);
    setTimeout(() => blip(784, 0.15, 'triangle', 0.14), 200);
    setTimeout(() => blip(1047, 0.20, 'sine', 0.15), 320);
    setTimeout(() => blip(1318, 0.30, 'sine', 0.15), 450);
    vibe([80, 50, 100, 50, 200]);
    // massive confetti burst
    for (let i = 0; i < 4; i++) {
      setTimeout(() => spawnConfetti(W / 2, H / 2, 30,
        ['#fde047', '#facc15', '#3b82f6', '#22c55e', '#fff', '#dc2626']), i * 150);
    }
    // Prompt for name + comment after a beat, then save to Hall of Fame
    setTimeout(() => {
      let name = '';
      try { name = (prompt('🏆 EXAM SKIPPER LICENSED!\nEnter your name for the Hall of Fame:') || '').trim().slice(0, 16); } catch (_) {}
      let comment = '';
      if (name) {
        try { comment = (prompt('Leave a comment (other winners will see):') || '').trim().slice(0, 60); } catch (_) {}
      }
      const entry = {
        name: name || 'ANON SKIPPER',
        comment: comment || '',
        score,
        time: Math.floor(elapsed),               // seconds to win
        cash: (runStats && runStats.cash) || 0,  // cash stacks collected
        date: new Date().toISOString().slice(0, 10),
      };
      try {
        const list = JSON.parse(localStorage.getItem('chill.winners') || '[]');
        list.push(entry);
        // Sort by score desc (highest scorers on top), keep 50
        list.sort((a, b) => (b.score || 0) - (a.score || 0));
        localStorage.setItem('chill.winners', JSON.stringify(list.slice(0, 50)));
        // increment personal win counter
        const prevWins = +(localStorage.getItem('chill.winsCount') || 0);
        localStorage.setItem('chill.winsCount', String(prevWins + 1));
      } catch (_) {}
    }, 1500);
  }

  function die() {
    alive = false;
    setBrake(false);
    setPaused(false);
    combo = 0;
    comboFlashT = 0;
    gameOverT = 0;
    failLine = FAIL_LINES[(Math.random() * FAIL_LINES.length) | 0];
    skipperCallout = SKIPPER_CALLOUTS[(Math.random() * SKIPPER_CALLOUTS.length) | 0];

    // Persist best licenses-per-run so player sees progress toward win condition.
    try {
      const prevBest = +(localStorage.getItem('chill.bestLicensesRun') || 0);
      if (licensesGot > prevBest) {
        localStorage.setItem('chill.bestLicensesRun', String(licensesGot));
      }
    } catch (_) {}

    // Capture rank tier BEFORE updating best — detect crossings
    const prevBestRank = rankIndexFor(best);

    if (score > best) {
      best = score;
      try { localStorage.setItem('chill.best', String(best)); } catch (_) {}
    }
    // Close out the final state's per-state score gain before stats land
    if (prevStateKey) setStateBest(prevStateKey, score - stateEntryScore);
    saveTop5(score);
    if (markDailyAchieved(score)) {
      // immediate banner + confetti on the death overlay
      showAchievement('dailyChallenge', 'DAILY CHALLENGE DONE');
    }

    // Rank-up celebration — bigger banner + rank-colored confetti
    const newBestRank = rankIndexFor(best);
    if (newBestRank > prevBestRank) {
      const newRank = RANKS[newBestRank];
      celebrateRankUp(newRank);
    }
    canvas.classList.remove('shake');
    void canvas.offsetWidth;
    canvas.classList.add('shake');
    buzz(220, 0.45);
    vibe([60, 30, 90]);
  }

  // Brake state + DOM toggle
  const brakeBtn = document.getElementById('brake');
  function setBrake(b) {
    braking = b;
    brakeBtn.classList.toggle('on', b);
  }
  // Mouse / touch hold on the brake button
  brakeBtn.addEventListener('pointerdown', e => { e.preventDefault(); ensureAudio(); setBrake(true); });
  brakeBtn.addEventListener('pointerup',     e => { e.preventDefault(); setBrake(false); });
  brakeBtn.addEventListener('pointercancel', () => setBrake(false));
  brakeBtn.addEventListener('pointerleave',  () => setBrake(false));

  // Pause state + DOM toggle
  const pauseBtn = document.getElementById('pause');
  function setPaused(p) {
    paused = alive ? p : false;   // can't pause when dead — overlay is game-over
    pauseBtn.textContent = paused ? 'RESUME' : 'PAUSE';
    pauseBtn.classList.toggle('on', paused);
    if (paused) setBrake(false);   // dropping brake when pausing avoids stuck state
  }
  function togglePause() {
    if (!alive) return;
    setPaused(!paused);
    if (paused) blip(200, 0.06, 'square', 0.06);
    else        blip(440, 0.05, 'triangle', 0.06);
  }
  pauseBtn.addEventListener('click', e => { e.preventDefault(); ensureAudio(); togglePause(); });

  // Force-pause hook for the native shell / parent frame. When the user
  // leaves the game tab, the host posts 'dmvsos:pause' so the loop + audio
  // stop instead of running in the background. Idempotent — never unpauses.
  window.__dmvsosPause = () => { if (alive && !paused) setPaused(true); };
  window.addEventListener('message', (ev) => { if (ev && ev.data === 'dmvsos:pause') window.__dmvsosPause(); });

  // ── Chiptune backing loop ──
  // Simple 6-note arpeggio in C major, played via Web Audio scheduling
  // (lookahead-based so it stays in sync). Volume is gentle.
  const MUSIC_MELODY = [
    { f: 261.63, d: 0.22 },   // C4
    { f: 329.63, d: 0.22 },   // E4
    { f: 392.00, d: 0.22 },   // G4
    { f: 523.25, d: 0.22 },   // C5
    { f: 392.00, d: 0.22 },   // G4
    { f: 329.63, d: 0.22 },   // E4
  ];
  let musicOn = false;
  let musicSchedulerId = null;
  let musicNextTime = 0;
  let musicStep = 0;
  const musicBtn = document.getElementById('music');

  function playNoteAt(freq, dur, type, vol, t) {
    if (!audioCtx) return;
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.type = type || 'square';
    o.frequency.setValueAtTime(freq, t);
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(vol, t + 0.01);
    g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    o.connect(g).connect(audioCtx.destination);
    o.start(t);
    o.stop(t + dur + 0.02);
  }
  function scheduleMusic() {
    if (!musicOn || !audioCtx) return;
    const lookahead = 0.3;
    while (musicNextTime < audioCtx.currentTime + lookahead) {
      const note = MUSIC_MELODY[musicStep % MUSIC_MELODY.length];
      playNoteAt(note.f, note.d * 0.85, 'square', 0.035, musicNextTime);
      musicNextTime += note.d;
      musicStep++;
    }
    musicSchedulerId = setTimeout(scheduleMusic, 80);
  }
  function startMusic() {
    ensureAudio();
    if (!audioCtx) return;
    musicOn = true;
    musicBtn.classList.add('on');
    musicBtn.textContent = '♪ ON';
    musicNextTime = audioCtx.currentTime + 0.05;
    scheduleMusic();
    try { localStorage.setItem('chill.music', '1'); } catch (_) {}
  }
  function stopMusic() {
    musicOn = false;
    musicBtn.classList.remove('on');
    musicBtn.textContent = 'MUSIC';
    if (musicSchedulerId) { clearTimeout(musicSchedulerId); musicSchedulerId = null; }
    try { localStorage.setItem('chill.music', '0'); } catch (_) {}
  }
  function toggleMusic() {
    if (musicOn) stopMusic();
    else startMusic();
  }
  musicBtn.addEventListener('click', e => { e.preventDefault(); toggleMusic(); });

  function drawVehicle(x, y, v, scale) {
    const sc = scale || 1;
    const w = v.w * CELL * sc, h = v.h * CELL * sc;
    // ===== BODY =====
    ctx.fillStyle = v.color;
    ctx.fillRect(x, y, w, h);
    // top-edge highlight — catches light from above
    ctx.fillStyle = 'rgba(255,255,255,0.18)';
    ctx.fillRect(x, y, w, Math.max(1, 1 * sc));
    // right-side shadow — gives body 3D depth
    ctx.fillStyle = 'rgba(0,0,0,0.25)';
    ctx.fillRect(x + w - Math.max(1, 1 * sc), y, Math.max(1, 1 * sc), h);
    // front + rear bumpers (dark)
    ctx.fillStyle = '#1a1410';
    ctx.fillRect(x, y, w, Math.max(1, 1 * sc));
    ctx.fillRect(x, y + h - Math.max(1, 1 * sc), w, Math.max(1, 1 * sc));

    // ===== WINDSHIELD / WINDOWS =====
    ctx.fillStyle = COL_WINDOW;
    if (v.kind === 'bus') {
      // school-bus side windows — row of small rectangles along the side
      const winH = 5*sc, gap = 2*sc;
      let wy = y + 8*sc;
      while (wy + winH < y + h - 8*sc) {
        ctx.fillRect(x + 3*sc, wy, w - 6*sc, winH);
        wy += winH + gap;
      }
    } else if (v.h >= 3) {
      // FRONT windshield
      ctx.fillRect(x + 4*sc, y + 6*sc, w - 8*sc, 8*sc);
      // REAR window
      ctx.fillRect(x + 4*sc, y + h - 16*sc, w - 8*sc, 6*sc);
      // SIDE window strips along the middle (door windows)
      if (h >= 30*sc) {
        ctx.fillRect(x + 3*sc, y + h * 0.42, w - 6*sc, 4*sc);
      }
    } else {
      // moto: single helmet strip
      ctx.fillRect(x + 2*sc, y + 4*sc, w - 4*sc, 6*sc);
    }

    // ===== WHEEL ARCHES — 4 small darker pockets at corners suggesting wheel wells =====
    if (v.kind !== 'moto' && w >= 12*sc && h >= 18*sc) {
      ctx.fillStyle = 'rgba(0,0,0,0.5)';
      const wheelW = 3 * sc;
      const wheelH = 4 * sc;
      ctx.fillRect(x - 0.5*sc,     y + 4*sc,         wheelW, wheelH);
      ctx.fillRect(x + w - wheelW + 0.5*sc, y + 4*sc, wheelW, wheelH);
      ctx.fillRect(x - 0.5*sc,     y + h - 8*sc,     wheelW, wheelH);
      ctx.fillRect(x + w - wheelW + 0.5*sc, y + h - 8*sc, wheelW, wheelH);
    }

    // headlights
    ctx.fillStyle = '#fff';
    ctx.fillRect(x + 2*sc, y + 2*sc, Math.min(4, w/2 - 1)*sc, 3*sc);
    if (w >= 8*sc) ctx.fillRect(x + w - 6*sc, y + 2*sc, 4*sc, 3*sc);
    // taillights
    ctx.fillStyle = '#ff3a3a';
    ctx.fillRect(x + 2*sc, y + h - 5*sc, Math.min(4, w/2 - 1)*sc, 3*sc);
    if (w >= 8*sc) ctx.fillRect(x + w - 6*sc, y + h - 5*sc, 4*sc, 3*sc);
    // vehicle-specific decorations
    if (v.kind === 'student') {
      // DMVSOS decal — one bold readable line on a yellow placard.
      // (4px text was unreadable due to pixelated canvas scaling — bumped to 8px)
      const signW = Math.max(28, w - 4*sc), signH = 12*sc;
      const sx = x + (w - signW) / 2;
      const sy = y + h/2 - signH/2;
      // shadow
      ctx.fillStyle = 'rgba(0,0,0,0.5)';
      ctx.fillRect(sx + 1*sc, sy + 1*sc, signW, signH);
      // yellow body
      ctx.fillStyle = '#facc15';
      ctx.fillRect(sx, sy, signW, signH);
      // black thick border
      ctx.fillStyle = '#1a1410';
      ctx.fillRect(sx, sy,                 signW, 1*sc);
      ctx.fillRect(sx, sy + signH - 1*sc,  signW, 1*sc);
      ctx.fillRect(sx, sy,                 1*sc, signH);
      ctx.fillRect(sx + signW - 1*sc, sy,  1*sc, signH);
      // text "DMVSOS" — bold, big enough to read at canvas scale
      ctx.font = 'bold ' + (8*sc) + 'px ui-monospace, monospace';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillStyle = '#1a1410';
      ctx.fillText('DMVSOS', sx + signW/2, sy + signH/2 + 0.5*sc);
      ctx.textBaseline = 'alphabetic';
    } else if (v.kind === 'bus') {
      // black trim stripes along the body sides
      ctx.fillStyle = '#1a1410';
      ctx.fillRect(x, y + h * 0.32, w, 1*sc);
      ctx.fillRect(x, y + h * 0.68, w, 1*sc);
      // small STOP-arm style red square on the left side
      ctx.fillStyle = '#DC2626';
      ctx.fillRect(x - 2*sc, y + h/2 - 2*sc, 2*sc, 4*sc);
    }
  }

  function drawSign(s) {
    // M-LOGO billboard — big golden arches parody, drawn separately
    if (s.kind === 'mlogo')   { drawMLogoBillboard(s); return; }
    // EXIT sign — classic US highway green panel
    if (s.kind === 'exit')    { drawExitSign(s); return; }
    // MAILBOX — small Americana prop
    if (s.kind === 'mailbox') { drawMailbox(s); return; }
    // VOTE campaign yard sign — red/white/blue lawn sign
    if (s.kind === 'vote')    { drawVoteSign(s); return; }
    // Billboards are wider + taller, sit on TWO posts (real highway billboard)
    const isBillboard = s.kind === 'billboard';
    const sw = isBillboard ? 40 : 30;
    const sh = isBillboard ? 20 : 16;
    // shoulders span 0..ROAD_X (left) and ROAD_X+ROAD_W..W (right)
    const x = s.side === 'L'
      ? Math.max(2, (ROAD_X - sw) / 2)
      : Math.min(W - sw - 2, ROAD_X + ROAD_W + (W - ROAD_X - ROAD_W - sw) / 2);

    // Billboards use cream face + black text + yellow accent (classic US highway).
    // Brand/local signs keep the original navy/blue scheme.
    const faceColor   = isBillboard ? '#f4ead8' : COL_SIGN;
    const textColor   = isBillboard ? '#1a1410' : COL_SIGN_FG;
    const accentColor = isBillboard ? '#facc15' : (s.accent || COL_SIGN_FG);

    // ===== POSTS — single for small, twin for billboards =====
    ctx.fillStyle = 'rgba(0,0,0,0.35)';
    if (isBillboard) {
      // twin post shadows
      ctx.fillRect(x + 6,         s.y + sh + 8, 6, 1);
      ctx.fillRect(x + sw - 12,   s.y + sh + 8, 6, 1);
    } else {
      ctx.fillRect(x + sw / 2 - 3, s.y + sh + 7, 6, 1);
    }
    ctx.fillStyle = '#3a2818';   // wooden brown post for billboards
    if (isBillboard) {
      ctx.fillRect(x + 8,        s.y + sh, 2, 9);
      ctx.fillRect(x + sw - 10,  s.y + sh, 2, 9);
      // post highlights
      ctx.fillStyle = '#5a3a1c';
      ctx.fillRect(x + 8,        s.y + sh, 1, 9);
      ctx.fillRect(x + sw - 10,  s.y + sh, 1, 9);
      // concrete footings
      ctx.fillStyle = '#7a7a7a';
      ctx.fillRect(x + 7,        s.y + sh + 7, 4, 2);
      ctx.fillRect(x + sw - 11,  s.y + sh + 7, 4, 2);
    } else {
      ctx.fillStyle = '#1e3a5f';
      ctx.fillRect(x + sw / 2 - 1, s.y + sh, 2, 8);
      ctx.fillStyle = '#2f4f7f';
      ctx.fillRect(x + sw / 2 - 1, s.y + sh, 1, 8);
      ctx.fillStyle = '#7a7a7a';
      ctx.fillRect(x + sw / 2 - 2, s.y + sh + 6, 4, 2);
    }

    // ===== BOARD with drop shadow =====
    ctx.fillStyle = 'rgba(0,0,0,0.45)';
    ctx.fillRect(x + 1, s.y + 2, sw, sh);
    ctx.fillStyle = faceColor;
    ctx.fillRect(x, s.y, sw, sh);
    // top edge highlight
    ctx.fillStyle = isBillboard ? '#fff5e0' : 'rgba(255,255,255,0.10)';
    ctx.fillRect(x, s.y, sw, 1);

    // ===== ACCENT BORDERS =====
    ctx.fillStyle = accentColor;
    ctx.fillRect(x, s.y,             sw, 2);
    ctx.fillRect(x, s.y + sh - 2,    sw, 2);
    if (isBillboard) {
      // Left + right vertical borders too (full-frame billboard)
      ctx.fillRect(x,           s.y, 2, sh);
      ctx.fillRect(x + sw - 2,  s.y, 2, sh);
    }
    // border highlight
    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    ctx.fillRect(x, s.y, sw, 1);

    // ===== CORNER BOLT RIVETS =====
    ctx.fillStyle = accentColor;
    ctx.fillRect(x + 2,         s.y + 3,        1, 1);
    ctx.fillRect(x + sw - 3,    s.y + 3,        1, 1);
    ctx.fillRect(x + 2,         s.y + sh - 4,   1, 1);
    ctx.fillRect(x + sw - 3,    s.y + sh - 4,   1, 1);

    // ===== BILLBOARD LAMP — small bright bulb on top, casts down at the text =====
    if (isBillboard) {
      ctx.fillStyle = '#3a2818';
      ctx.fillRect(x + sw / 2 - 2, s.y - 3, 4, 2);
      ctx.fillStyle = '#fde047';
      ctx.fillRect(x + sw / 2 - 1, s.y - 1, 2, 1);
      // tiny glow halo
      ctx.fillStyle = 'rgba(253,224,71,0.35)';
      ctx.fillRect(x + sw / 2 - 3, s.y - 1, 6, 2);
    }

    // ===== TEXT — billboards use smaller font + auto-wrap onto 2 lines if long =====
    ctx.fillStyle = textColor;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    if (isBillboard) {
      ctx.font = 'bold 6px ui-monospace, monospace';
      // Always wrap at the midpoint space — billboards are wider but still
      // need 2 lines for most messages to be legible.
      const parts = s.text.split(' ');
      if (parts.length >= 2 && ctx.measureText(s.text).width > sw - 8) {
        const mid = Math.ceil(parts.length / 2);
        const line1 = parts.slice(0, mid).join(' ');
        const line2 = parts.slice(mid).join(' ');
        ctx.fillText(line1, x + sw / 2, s.y + sh / 2 - 4);
        ctx.fillText(line2, x + sw / 2, s.y + sh / 2 + 4);
      } else {
        ctx.fillText(s.text, x + sw / 2, s.y + sh / 2);
      }
    } else {
      ctx.font = 'bold 6px ui-monospace, monospace';
      ctx.fillText(s.text, x + sw / 2, s.y + sh / 2);
    }
    ctx.textBaseline = 'alphabetic';
  }

  // ===== VOTE EXAMSKIPPER campaign yard sign — red/white/blue =====
  function drawVoteSign(s) {
    const sw = 40, sh = 20;
    const x = s.side === 'L'
      ? Math.max(2, (ROAD_X - sw) / 2)
      : Math.min(W - sw - 2, ROAD_X + ROAD_W + (W - ROAD_X - ROAD_W - sw) / 2);
    // wire stakes (2 thin metal posts)
    ctx.fillStyle = '#6b7280';
    ctx.fillRect(x + 8,        s.y + sh, 1, 9);
    ctx.fillRect(x + sw - 9,   s.y + sh, 1, 9);
    // drop shadow
    ctx.fillStyle = 'rgba(0,0,0,0.45)';
    ctx.fillRect(x + 1, s.y + 2, sw, sh);
    // WHITE board
    ctx.fillStyle = '#f4ead8';
    ctx.fillRect(x, s.y, sw, sh);
    // BLUE top band
    ctx.fillStyle = '#1e40af';
    ctx.fillRect(x, s.y, sw, Math.floor(sh * 0.4));
    // RED bottom band
    ctx.fillStyle = '#dc2626';
    ctx.fillRect(x, s.y + sh - 4, sw, 4);
    // 5 white stars across the blue band
    ctx.fillStyle = '#fff';
    for (let i = 0; i < 5; i++) {
      const sx = x + 4 + i * 7;
      const syy = s.y + 3;
      ctx.fillRect(sx, syy, 2, 1);
      ctx.fillRect(sx - 1, syy + 1, 4, 1);
      ctx.fillRect(sx, syy + 2, 2, 1);
    }
    // border outline
    ctx.fillStyle = '#0a0000';
    ctx.fillRect(x, s.y, sw, 1);
    ctx.fillRect(x, s.y + sh - 1, sw, 1);
    ctx.fillRect(x, s.y, 1, sh);
    ctx.fillRect(x + sw - 1, s.y, 1, sh);
    // TEXT — wraps to 2 lines if long
    ctx.font = 'bold 5px ui-monospace, monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    const parts = (s.text || '').split(' ');
    const mid = Math.ceil(parts.length / 2);
    const l1 = parts.slice(0, mid).join(' ');
    const l2 = parts.slice(mid).join(' ');
    ctx.fillStyle = '#1a1410';
    if (l2 && ctx.measureText(s.text).width > sw - 4) {
      ctx.fillText(l1, x + sw / 2, s.y + sh / 2);
      ctx.fillText(l2, x + sw / 2, s.y + sh / 2 + 5);
    } else {
      ctx.fillText(s.text, x + sw / 2, s.y + sh / 2 + 2);
    }
    ctx.textBaseline = 'alphabetic';
  }

  // ===== MAILBOX — tiny roadside mailbox with number, flag up/down =====
  function drawMailbox(s) {
    const sw = 14, sh = 12;
    const x = s.side === 'L'
      ? Math.max(2, (ROAD_X - sw) / 2)
      : Math.min(W - sw - 2, ROAD_X + ROAD_W + (W - ROAD_X - ROAD_W - sw) / 2);
    // wooden post + ground shadow
    ctx.fillStyle = 'rgba(0,0,0,0.35)';
    ctx.fillRect(x + sw / 2 - 2, s.y + sh + 10, 4, 1);
    ctx.fillStyle = '#5a3018';
    ctx.fillRect(x + sw / 2 - 1, s.y + sh, 2, 10);
    ctx.fillStyle = '#8a5028';
    ctx.fillRect(x + sw / 2 - 1, s.y + sh, 1, 10);
    // mailbox body — colour varies per-mailbox (silver, rural blue, USPS white)
    // pick stable colour from text hash so the same mailbox always looks the same
    const variants = [
      { body: '#9ca3af', hi: '#cfd8e8', sh: '#6b7280' },   // silver
      { body: '#1e40af', hi: '#3b82f6', sh: '#1e3a8a' },   // rural blue
      { body: '#f4ead8', hi: '#fff8e8', sh: '#c8b894' },   // cream/USPS
    ];
    const v = variants[(s.text || '').length % variants.length];
    ctx.fillStyle = v.body;
    ctx.fillRect(x + 1, s.y + 2, sw - 2, sh - 2);
    ctx.fillRect(x + 2, s.y + 1, sw - 4, sh);
    // top arch highlight
    ctx.fillStyle = v.hi;
    ctx.fillRect(x + 2, s.y + 1, sw - 4, 1);
    // bottom shadow
    ctx.fillStyle = v.sh;
    ctx.fillRect(x + 1, s.y + sh - 2, sw - 2, 2);
    // door (front face, darker rectangle)
    ctx.fillStyle = '#3a3a3a';
    ctx.fillRect(x + 2, s.y + sh - 6, sw - 4, 4);
    // door knob
    ctx.fillStyle = '#fde047';
    ctx.fillRect(x + sw - 4, s.y + sh - 4, 1, 1);
    // flag — red, position alternates based on hash of number
    const flagUp = ((s.text || '').length % 2 === 0);
    ctx.fillStyle = '#dc2626';
    if (flagUp) {
      ctx.fillRect(x + sw - 2, s.y + 1, 1, 4);
      ctx.fillRect(x + sw - 1, s.y + 2, 2, 2);
    } else {
      ctx.fillRect(x + sw - 1, s.y + 5, 1, 3);
      ctx.fillRect(x + sw,     s.y + 5, 2, 2);
    }
    // number on the side
    ctx.font = 'bold 4px ui-monospace, monospace';
    ctx.fillStyle = '#1a1410';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(s.text, x + sw / 2, s.y + sh - 4);
    ctx.textBaseline = 'alphabetic';
  }

  // ===== EXIT SIGN — classic US highway green panel with white text =====
  function drawExitSign(s) {
    const sw = 36, sh = 18;
    const x = s.side === 'L'
      ? Math.max(2, (ROAD_X - sw) / 2)
      : Math.min(W - sw - 2, ROAD_X + ROAD_W + (W - ROAD_X - ROAD_W - sw) / 2);
    // post shadow
    ctx.fillStyle = 'rgba(0,0,0,0.35)';
    ctx.fillRect(x + sw / 2 - 3, s.y + sh + 9, 6, 1);
    // metal post
    ctx.fillStyle = '#6b7280';
    ctx.fillRect(x + sw / 2 - 1, s.y + sh, 2, 9);
    ctx.fillStyle = '#9ca3af';
    ctx.fillRect(x + sw / 2 - 1, s.y + sh, 1, 9);
    // concrete footing
    ctx.fillStyle = '#7a7a7a';
    ctx.fillRect(x + sw / 2 - 2, s.y + sh + 7, 4, 2);
    // drop shadow
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(x + 2, s.y + 2, sw, sh);
    // GREEN body (FHWA highway green)
    ctx.fillStyle = '#0f5132';
    ctx.fillRect(x, s.y, sw, sh);
    // top inner highlight
    ctx.fillStyle = '#1a7a4a';
    ctx.fillRect(x, s.y, sw, 1);
    // white inner border (classic exit sign frame)
    ctx.fillStyle = '#fff';
    ctx.fillRect(x + 1, s.y + 1,         sw - 2, 1);
    ctx.fillRect(x + 1, s.y + sh - 2,    sw - 2, 1);
    ctx.fillRect(x + 1, s.y + 1,         1,      sh - 2);
    ctx.fillRect(x + sw - 2, s.y + 1,    1,      sh - 2);
    // text
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 8px ui-monospace, monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(s.text, x + sw / 2, s.y + sh / 2 + 0.5);
    ctx.textBaseline = 'alphabetic';
  }

  // ===== M-LOGO BILLBOARD — McDowells golden arches parody =====
  // Big bold "M" on a red square, mounted on a tall post. Always reads.
  function drawMLogoBillboard(s) {
    const sw = 32;
    const sh = 28;
    const x = s.side === 'L'
      ? Math.max(2, (ROAD_X - sw) / 2)
      : Math.min(W - sw - 2, ROAD_X + ROAD_W + (W - ROAD_X - ROAD_W - sw) / 2);
    // tall post
    ctx.fillStyle = 'rgba(0,0,0,0.4)';
    ctx.fillRect(x + sw / 2 - 3, s.y + sh + 12, 6, 1);
    ctx.fillStyle = '#3a2818';
    ctx.fillRect(x + sw / 2 - 1, s.y + sh, 2, 12);
    ctx.fillStyle = '#5a3a1c';
    ctx.fillRect(x + sw / 2 - 1, s.y + sh, 1, 12);
    // concrete footing
    ctx.fillStyle = '#7a7a7a';
    ctx.fillRect(x + sw / 2 - 2, s.y + sh + 10, 4, 2);

    // drop shadow under the sign
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(x + 2, s.y + 3, sw, sh);
    // RED background panel (classic McDowells/McDonald's red)
    ctx.fillStyle = '#dc2626';
    ctx.fillRect(x, s.y, sw, sh);
    // top highlight
    ctx.fillStyle = '#ef4444';
    ctx.fillRect(x, s.y, sw, 2);
    // bottom shadow
    ctx.fillStyle = '#7f1d1d';
    ctx.fillRect(x, s.y + sh - 2, sw, 2);
    // yellow inner border (golden arches frame)
    ctx.fillStyle = '#fde047';
    ctx.fillRect(x + 2, s.y + 2,           sw - 4, 1);
    ctx.fillRect(x + 2, s.y + sh - 3,      sw - 4, 1);
    ctx.fillRect(x + 2, s.y + 2,           1,      sh - 4);
    ctx.fillRect(x + sw - 3, s.y + 2,      1,      sh - 4);

    // ===== BIG "M" GOLDEN ARCHES — drawn as two arch shapes =====
    const mcx = x + sw / 2;
    const mcy = s.y + sh / 2 + 1;
    // Left arch
    ctx.fillStyle = '#fde047';
    // left arch vertical
    ctx.fillRect(mcx - 9,  mcy - 7, 3, 14);
    // left arch top curve
    ctx.fillRect(mcx - 8,  mcy - 9, 4, 2);
    ctx.fillRect(mcx - 6,  mcy - 10, 2, 1);
    // Center "V" valley
    ctx.fillRect(mcx - 4,  mcy - 8, 2, 6);
    ctx.fillRect(mcx - 2,  mcy - 4, 2, 4);
    ctx.fillRect(mcx,      mcy - 6, 2, 6);
    ctx.fillRect(mcx + 2,  mcy - 8, 2, 6);
    // Right arch vertical
    ctx.fillRect(mcx + 6,  mcy - 7, 3, 14);
    // Right arch top curve
    ctx.fillRect(mcx + 4,  mcy - 9, 4, 2);
    ctx.fillRect(mcx + 4,  mcy - 10, 2, 1);

    // Bright yellow highlight on left side of each arch (3D shine)
    ctx.fillStyle = '#fef9c3';
    ctx.fillRect(mcx - 9,  mcy - 7, 1, 13);
    ctx.fillRect(mcx + 6,  mcy - 7, 1, 13);

    // Small "BURGS" caption under the M
    ctx.font = 'bold 4px ui-monospace, monospace';
    ctx.fillStyle = '#fff';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText("BURGS", mcx, s.y + sh - 5);
    ctx.textBaseline = 'alphabetic';

    // Tiny lamp on top of the post (illuminated billboard at night)
    ctx.fillStyle = '#fde047';
    ctx.fillRect(mcx - 1, s.y - 2, 2, 1);
    ctx.fillStyle = 'rgba(253,224,71,0.35)';
    ctx.fillRect(mcx - 3, s.y - 2, 6, 2);
  }

  function shoulderX(side, sw) {
    return side === 'L'
      ? Math.max(1, (ROAD_X - sw) / 2)
      : Math.min(W - sw - 1, ROAD_X + ROAD_W + (W - ROAD_X - ROAD_W - sw) / 2);
  }

  function drawLandmark(l) {
    const sw = 28;
    const x = shoulderX(l.side, sw);
    switch (l.type) {
      case 'bridge':   drawBridge(x, l.y, l.accent); break;
      case 'palm':     drawPalm(x, l.y, l.accent); break;
      case 'needle':   drawNeedle(x, l.y, l.accent); break;
      case 'skyline':  drawSkyline(x, l.y, l.accent); break;
      case 'pine':     drawPine(x, l.y, l.accent); break;
      case 'cactus':   drawCactus(x, l.y, l.accent); break;
      case 'neon':     drawNeonSign(x, l.y, l.accent); break;
      case 'pizza':    drawPizza(x, l.y, l.accent); break;
      case 'mountain': drawMountain(x, l.y, l.accent); break;
      case 'trumpet':  drawTrumpet(x, l.y, l.accent); break;
      case 'lighthouse': drawLighthouse(x, l.y, l.accent); break;
      case 'rv':       drawRV(x, l.y, l.accent); drawCampfire(x + 26, l.y + 30); break;
      case 'trailer':  drawHippieTrailer(x, l.y, l.accent); drawCampfire(x - 6, l.y + 28); break;
    }
  }

  // Animated CAMPFIRE — small flickering fire next to roadside trailers/RVs.
  // 3 stacked flame layers + glowing ember base + tiny ember sparks rising.
  function drawCampfire(cx, cy) {
    // Skip if off-canvas
    if (cx < -8 || cx > W + 8) return;
    // logs (X shape, brown)
    ctx.fillStyle = '#5a3018';
    ctx.fillRect(cx - 4, cy + 4, 8, 2);
    ctx.fillStyle = '#3a2014';
    ctx.fillRect(cx - 3, cy + 5, 2, 1);
    ctx.fillRect(cx + 1, cy + 5, 2, 1);
    // log endcap highlight
    ctx.fillStyle = '#8a5028';
    ctx.fillRect(cx - 4, cy + 4, 1, 1);
    ctx.fillRect(cx + 3, cy + 4, 1, 1);

    // hot ember bed (glowing red coals under flame)
    const emberPulse = 0.6 + Math.sin(elapsed * 8) * 0.3;
    ctx.fillStyle = `rgba(220,38,38,${emberPulse})`;
    ctx.fillRect(cx - 3, cy + 3, 6, 1);

    // Flame layers — animated with sin so they flicker
    const flicker1 = Math.sin(elapsed * 12) * 0.4 + 0.6;
    const flicker2 = Math.sin(elapsed * 9 + 1.2) * 0.4 + 0.6;
    // outer red flame body
    ctx.fillStyle = `rgba(220,38,38,${flicker1})`;
    ctx.fillRect(cx - 2, cy,     4, 4);
    ctx.fillRect(cx - 1, cy - 2, 2, 2);
    // mid orange
    ctx.fillStyle = `rgba(251,146,60,${flicker2})`;
    ctx.fillRect(cx - 1, cy + 1, 2, 2);
    ctx.fillRect(cx,     cy - 1, 1, 2);
    // bright yellow core
    ctx.fillStyle = `rgba(253,224,71,${Math.min(1, flicker1 + 0.2)})`;
    ctx.fillRect(cx,     cy + 1, 1, 1);

    // tiny rising ember sparks (2-3 dots floating up)
    for (let i = 0; i < 3; i++) {
      const t = (elapsed * 1.5 + i * 0.4) % 1.2;
      const sy = cy - 2 - t * 8;
      const sx = cx - 1 + Math.sin(elapsed * 4 + i) * 1.5;
      const sa = (1 - t / 1.2) * 0.9;
      if (sa > 0) {
        ctx.fillStyle = `rgba(253,224,71,${sa})`;
        ctx.fillRect(sx | 0, sy | 0, 1, 1);
      }
    }

    // ground glow halo (orange tint on dirt around fire)
    ctx.fillStyle = `rgba(251,146,60,${0.15 * emberPulse})`;
    ctx.fillRect(cx - 6, cy + 5, 12, 2);
  }

  // Golden Gate-style twin towers with cable spans
  function drawBridge(x, y, accent) {
    // Golden Gate vibe — twin tapered towers + suspension cables + deck w/ stripes
    // Towers — international orange (or accent), 2 vertical pillars
    ctx.fillStyle = accent;
    ctx.fillRect(x + 5,  y,      4, 30);
    ctx.fillRect(x + 19, y,      4, 30);
    // Tower spires (taper at the top)
    ctx.fillRect(x + 6,  y - 2,  2, 2);
    ctx.fillRect(x + 20, y - 2,  2, 2);
    // Cross-beam #1 (high) — connects the two towers
    ctx.fillRect(x + 5,  y + 4,  18, 2);
    // Cross-beam #2 (lower) — classic Golden Gate twin-band
    ctx.fillRect(x + 5,  y + 12, 18, 2);
    // Tower side shading (right-side darker for depth)
    ctx.fillStyle = 'rgba(0,0,0,0.35)';
    ctx.fillRect(x + 8,  y, 1, 30);
    ctx.fillRect(x + 22, y, 1, 30);
    // Suspension main cable — saggy approximation (3 stepped segments, sinks then climbs)
    ctx.fillStyle = '#0c1a30';
    ctx.fillRect(x + 9,  y + 16, 2, 1);
    ctx.fillRect(x + 11, y + 17, 3, 1);
    ctx.fillRect(x + 14, y + 18, 2, 1);   // sag bottom
    ctx.fillRect(x + 16, y + 17, 3, 1);
    ctx.fillRect(x + 19, y + 16, 2, 1);
    // Vertical suspender cables — 5 thin drops from main cable to deck
    ctx.fillStyle = '#1e3a5f';
    ctx.fillRect(x + 9,  y + 17, 1, 13);
    ctx.fillRect(x + 12, y + 18, 1, 12);
    ctx.fillRect(x + 14, y + 19, 1, 11);
    ctx.fillRect(x + 16, y + 18, 1, 12);
    ctx.fillRect(x + 20, y + 17, 1, 13);
    // Deck — concrete grey base
    ctx.fillStyle = '#5a5a5a';
    ctx.fillRect(x + 3, y + 28, 22, 4);
    // Deck top edge (lighter)
    ctx.fillStyle = '#7a7a7a';
    ctx.fillRect(x + 3, y + 28, 22, 1);
    // Lane stripes on the deck — dashed yellow
    ctx.fillStyle = '#fde047';
    ctx.fillRect(x + 4,  y + 30, 3, 1);
    ctx.fillRect(x + 10, y + 30, 3, 1);
    ctx.fillRect(x + 16, y + 30, 3, 1);
    ctx.fillRect(x + 22, y + 30, 2, 1);
    // Deck shadow
    ctx.fillStyle = 'rgba(0,0,0,0.4)';
    ctx.fillRect(x + 3, y + 32, 22, 1);
  }

  // Palm tree (LA / Miami) — coconut palm with 6 drooping fronds + textured trunk
  function drawPalm(x, y, accent) {
    // shadow at base
    ctx.fillStyle = 'rgba(0,0,0,0.4)';
    ctx.fillRect(x + 10, y + 31, 8, 2);

    // TRUNK — curved, with horizontal "rings" (palm trunk texture)
    // Base color
    ctx.fillStyle = '#6b3a1c';
    ctx.fillRect(x + 12, y + 12, 4, 20);
    // Gentle curve bulges
    ctx.fillRect(x + 11, y + 16, 1, 6);
    ctx.fillRect(x + 16, y + 22, 1, 6);
    // Darker shadow on right side of trunk
    ctx.fillStyle = '#4a2810';
    ctx.fillRect(x + 15, y + 12, 1, 20);
    // Trunk rings — alternating darker bands every 3px
    ctx.fillStyle = '#3a2014';
    ctx.fillRect(x + 12, y + 14, 4, 1);
    ctx.fillRect(x + 12, y + 18, 4, 1);
    ctx.fillRect(x + 12, y + 22, 4, 1);
    ctx.fillRect(x + 12, y + 26, 4, 1);
    ctx.fillRect(x + 12, y + 30, 4, 1);
    // Highlight ring above each shadow ring
    ctx.fillStyle = '#8a5028';
    ctx.fillRect(x + 12, y + 15, 4, 1);
    ctx.fillRect(x + 12, y + 19, 4, 1);
    ctx.fillRect(x + 12, y + 23, 4, 1);
    ctx.fillRect(x + 12, y + 27, 4, 1);

    // CROWN BASE — dark green hub where fronds attach
    ctx.fillStyle = '#0f3d1f';
    ctx.fillRect(x + 11, y + 10, 6, 3);

    // FRONDS — 6 drooping fronds in a starburst pattern, each made of multiple
    // segments that taper toward the tip. Dark-green base layer for body.
    ctx.fillStyle = '#0f3d1f';
    // Left frond (drooping down-left)
    ctx.fillRect(x + 9,  y + 9,  3, 2);
    ctx.fillRect(x + 6,  y + 10, 3, 2);
    ctx.fillRect(x + 3,  y + 12, 3, 2);
    ctx.fillRect(x + 1,  y + 14, 2, 2);
    // Right frond (drooping down-right)
    ctx.fillRect(x + 16, y + 9,  3, 2);
    ctx.fillRect(x + 19, y + 10, 3, 2);
    ctx.fillRect(x + 22, y + 12, 3, 2);
    ctx.fillRect(x + 25, y + 14, 2, 2);
    // Upper-left frond (reaching up-left)
    ctx.fillRect(x + 9,  y + 7,  3, 2);
    ctx.fillRect(x + 6,  y + 5,  3, 2);
    ctx.fillRect(x + 3,  y + 3,  3, 2);
    // Upper-right frond (reaching up-right)
    ctx.fillRect(x + 16, y + 7,  3, 2);
    ctx.fillRect(x + 19, y + 5,  3, 2);
    ctx.fillRect(x + 22, y + 3,  3, 2);
    // Top center frond (straight up)
    ctx.fillRect(x + 12, y + 6,  4, 4);
    ctx.fillRect(x + 13, y + 2,  2, 4);
    // Down-front frond (drooping over the trunk toward viewer)
    ctx.fillRect(x + 11, y + 12, 6, 2);
    ctx.fillRect(x + 9,  y + 14, 3, 2);
    ctx.fillRect(x + 17, y + 14, 3, 2);

    // FROND HIGHLIGHTS — brighter green along the spines (sunlit edge)
    ctx.fillStyle = '#22c55e';
    // left spine
    ctx.fillRect(x + 9,  y + 9,  3, 1);
    ctx.fillRect(x + 6,  y + 10, 3, 1);
    ctx.fillRect(x + 3,  y + 12, 3, 1);
    // right spine
    ctx.fillRect(x + 16, y + 9,  3, 1);
    ctx.fillRect(x + 19, y + 10, 3, 1);
    ctx.fillRect(x + 22, y + 12, 3, 1);
    // upper-left spine
    ctx.fillRect(x + 6,  y + 5,  3, 1);
    ctx.fillRect(x + 3,  y + 3,  3, 1);
    // upper-right spine
    ctx.fillRect(x + 19, y + 5,  3, 1);
    ctx.fillRect(x + 22, y + 3,  3, 1);
    // top spine
    ctx.fillRect(x + 13, y + 2,  2, 1);
    ctx.fillRect(x + 12, y + 6,  4, 1);

    // Tiny brighter sun-glints on tips of fronds (lime)
    ctx.fillStyle = '#86efac';
    ctx.fillRect(x + 1,  y + 14, 1, 1);
    ctx.fillRect(x + 26, y + 14, 1, 1);
    ctx.fillRect(x + 3,  y + 3,  1, 1);
    ctx.fillRect(x + 24, y + 3,  1, 1);
    ctx.fillRect(x + 13, y + 2,  1, 1);

    // COCONUTS — accent color, clustered at crown
    ctx.fillStyle = accent;
    ctx.fillRect(x + 11, y + 11, 2, 2);
    ctx.fillRect(x + 14, y + 11, 2, 2);
    // coconut highlight
    ctx.fillStyle = 'rgba(255,255,255,0.4)';
    ctx.fillRect(x + 11, y + 11, 1, 1);
    ctx.fillRect(x + 14, y + 11, 1, 1);
  }

  // Space Needle (Seattle) — flying-saucer observation deck on tripod legs
  // with blinking aviation light, observation deck windows, and curved support.
  function drawNeedle(x, y, accent) {
    // shadow at base
    ctx.fillStyle = 'rgba(0,0,0,0.4)';
    ctx.fillRect(x + 6, y + 31, 16, 2);

    // ANTENNA SPIRE — tapered top with blinking red FAA lamp
    ctx.fillStyle = '#9ca3af';
    ctx.fillRect(x + 13, y,      2, 2);
    ctx.fillStyle = '#cfd8e8';
    ctx.fillRect(x + 13, y + 2,  2, 4);
    // FAA blink lamp on the very tip
    const faaOn = Math.floor(elapsed * 1.5) % 2 === 0;
    if (faaOn) {
      ctx.fillStyle = '#ff3a3a';
      ctx.fillRect(x + 13, y - 1, 2, 1);
    }

    // SAUCER (flying-saucer observation deck) — UFO silhouette
    // upper dome
    ctx.fillStyle = accent;
    ctx.fillRect(x + 11, y + 5,  6, 1);
    ctx.fillRect(x + 10, y + 6,  8, 1);
    // main saucer body
    ctx.fillRect(x + 8,  y + 7,  12, 3);
    // saucer base (wider, like the iconic disc)
    ctx.fillRect(x + 7,  y + 10, 14, 1);
    // saucer underside shadow (darker accent)
    ctx.fillStyle = 'rgba(0,0,0,0.35)';
    ctx.fillRect(x + 8,  y + 9,  12, 1);
    ctx.fillRect(x + 7,  y + 10, 14, 1);

    // OBSERVATION DECK WINDOWS — bright yellow lit windows along the saucer
    // (these are the famous SkyCity restaurant + observation deck windows)
    ctx.fillStyle = '#fde047';
    ctx.fillRect(x + 9,  y + 8,  1, 1);
    ctx.fillRect(x + 11, y + 8,  1, 1);
    ctx.fillRect(x + 13, y + 8,  1, 1);
    ctx.fillRect(x + 15, y + 8,  1, 1);
    ctx.fillRect(x + 17, y + 8,  1, 1);
    // dimmer windows on top dome
    ctx.fillStyle = '#facc15';
    ctx.fillRect(x + 12, y + 6,  1, 1);
    ctx.fillRect(x + 15, y + 6,  1, 1);
    // bright top-disc highlight
    ctx.fillStyle = 'rgba(255,255,255,0.40)';
    ctx.fillRect(x + 11, y + 5,  3, 1);

    // CORE COLUMN — single tapered column down from saucer center
    ctx.fillStyle = '#7a8aa8';
    ctx.fillRect(x + 13, y + 11, 2, 19);
    // column shadow on right
    ctx.fillStyle = '#5a6478';
    ctx.fillRect(x + 14, y + 11, 1, 19);
    // column highlight on left
    ctx.fillStyle = '#9ca3af';
    ctx.fillRect(x + 13, y + 11, 1, 19);

    // TRIPOD LEGS — three angled supports flaring outward
    // Left leg (slants down-left)
    ctx.fillStyle = '#7a8aa8';
    ctx.fillRect(x + 12, y + 18, 1, 4);
    ctx.fillRect(x + 11, y + 22, 1, 4);
    ctx.fillRect(x + 10, y + 26, 1, 4);
    ctx.fillRect(x + 9,  y + 29, 2, 2);
    // Right leg (slants down-right)
    ctx.fillRect(x + 15, y + 18, 1, 4);
    ctx.fillRect(x + 16, y + 22, 1, 4);
    ctx.fillRect(x + 17, y + 26, 1, 4);
    ctx.fillRect(x + 17, y + 29, 2, 2);
    // Center leg (straight down — back leg)
    ctx.fillRect(x + 13, y + 26, 2, 4);

    // BASE PLATFORM — wide concrete pad with edge highlight

  // NYC skyline cluster — 5 silhouette buildings with depth, roof details,
  // and dense lit/dark windows that twinkle subtly.
  function drawSkyline(x, y, accent) {
    // Buildings — 5 columns at varying heights
    // Each: [dx, topY, width, baseColor, capColor]
    const buildings = [
      { dx: 0,  top: 14, w: 5, base: '#252f48', cap: '#3a4a70' },
      { dx: 6,  top: 8,  w: 4, base: '#2a3550', cap: '#4a5a80' },
      { dx: 11, top: 18, w: 4, base: '#1f2a40', cap: '#3a4868' },
      { dx: 16, top: 4,  w: 4, base: '#2f3a58', cap: '#4f5f88' },
      { dx: 21, top: 12, w: 4, base: '#26314c', cap: '#3e4e72' },
    ];
    for (const b of buildings) {
      const bx = x + b.dx;
      const bh = 32 - b.top;
      // base silhouette
      ctx.fillStyle = b.base;
      ctx.fillRect(bx, y + b.top, b.w, bh);
      // right-side shading for depth (1px darker stripe)
      ctx.fillStyle = 'rgba(0,0,0,0.35)';
      ctx.fillRect(bx + b.w - 1, y + b.top, 1, bh);
      // top cap — lighter line so the rooftop reads as a roof, not air
      ctx.fillStyle = b.cap;
      ctx.fillRect(bx, y + b.top, b.w, 1);
    }
    // Rooftop details — water tower on building #2, big antenna on tallest (#4)
    // Water tower (wooden barrel on stilts)
    ctx.fillStyle = '#5a3a1c';
    ctx.fillRect(x + 7, y + 5, 2, 3);
    ctx.fillStyle = '#3a2014';
    ctx.fillRect(x + 7, y + 7, 2, 1);
    // Antenna on tallest
    ctx.fillStyle = '#5a6478';
    ctx.fillRect(x + 17, y, 2, 4);
    ctx.fillStyle = '#cfd8e8';
    ctx.fillRect(x + 17, y - 1, 2, 1);
    // Tiny red FAA lamp on top (blinks every ~1s)
    if (Math.floor(elapsed * 1.5) % 2 === 0) {
      ctx.fillStyle = '#ff3a3a';
      ctx.fillRect(x + 17, y - 2, 2, 1);
    }
    // Small roof box on building #5
    ctx.fillStyle = '#1a2030';
    ctx.fillRect(x + 22, y + 11, 2, 1);
    // Dense window grid — alternate lit (accent) / dark per building
    // Use a stable per-cell hash so windows don't flicker frame-to-frame.
    const hash = (a, b) => ((a * 73 + b * 137 + 17) & 7) > 3;
    const twinkle = Math.floor(elapsed * 1.2);   // slow twinkle phase
    for (const b of buildings) {
      const bx = x + b.dx;
      const bTop = y + b.top + 2;
      const bBot = y + 32 - 1;
      // window grid: 1px wide, 1px tall, 2px stride
      for (let wx = bx + 1; wx <= bx + b.w - 2; wx += 2) {
        for (let wy = bTop; wy <= bBot - 1; wy += 2) {
          const lit = hash(wx, wy + twinkle);
          if (lit) {
            ctx.fillStyle = accent;
            ctx.fillRect(wx, wy, 1, 1);
          } else {
            ctx.fillStyle = '#0e1422';
            ctx.fillRect(wx, wy, 1, 1);
          }
        }
      }
    }
  }

  // Boston harbor lighthouse — classic red-and-white striped tower with rotating beam
  function drawLighthouse(x, y, accent) {
    // Lantern source position (center of light room)
    const lx = x + 13;
    const ly = y + 5;

    // ===== ROTATING BEAM — continuous sweep, not discrete jump =====
    // Angle sweeps full circle every 4s. Beam is drawn as a stepped cone of
    // 4 rays expanding outward from the lantern. Skip the bottom half (where
    // beam would draw INTO the tower / ocean) — visible only when pointing
    // upward/sideways. Subtle 10Hz pulse on opacity (filament shimmer).
    const sweepAngle = (elapsed * 1.6) % (Math.PI * 2);
    const pulse = 0.35 + Math.sin(elapsed * 10) * 0.10;
    // Draw beam only when angle is in upper hemisphere (so it doesn't dip into the tower)
    if (sweepAngle < Math.PI) {
      ctx.save();
      const dx = Math.cos(sweepAngle);
      const dy = -Math.sin(sweepAngle);   // canvas Y inverted
      // Beam cone — 4 expanding rays at slightly different angles for thickness
      const spreads = [-0.08, 0, 0.08];   // 3 rays for cone width
      for (let r = 0; r < spreads.length; r++) {
        const a = sweepAngle + spreads[r];
        const rdx = Math.cos(a);
        const rdy = -Math.sin(a);
        // 4 segments stepping outward, each fainter + 1px wider
        for (let s = 1; s <= 4; s++) {
          const dist = 3 + s * 4;
          const px = lx + rdx * dist;
          const py = ly + rdy * dist;
          const segAlpha = pulse * (1 - s * 0.18) * (r === 1 ? 1 : 0.6);
          ctx.globalAlpha = Math.max(0, segAlpha);
          ctx.fillStyle = '#fde047';
          ctx.fillRect(px - 1, py - 1, 2, 2);
        }
      }
      // Bright lantern core glow
      ctx.globalAlpha = 0.7 + Math.sin(elapsed * 10) * 0.15;
      ctx.fillStyle = '#fef3c7';
      ctx.fillRect(lx - 1, ly - 1, 3, 3);
      ctx.restore();
    }

    // ===== LANTERN DOME — red with a small weather vane on top =====
    // Weather vane spire
    ctx.fillStyle = '#1a1410';
    ctx.fillRect(x + 12, y - 3, 1, 3);
    // Vane horizontal arrow (rotates slowly with wind — tied to sweep phase)
    const vaneRight = ((elapsed * 0.3) % 1) < 0.5;
    ctx.fillStyle = '#5a3a1c';
    if (vaneRight) {
      ctx.fillRect(x + 11, y - 3, 3, 1);
      ctx.fillRect(x + 14, y - 4, 1, 3);  // arrow head
    } else {
      ctx.fillRect(x + 11, y - 3, 3, 1);
      ctx.fillRect(x + 10, y - 4, 1, 3);  // arrow head
    }
    // Dome (red)
    ctx.fillStyle = '#7f1d1d';
    ctx.fillRect(x + 10, y,     6, 2);
    ctx.fillRect(x + 9,  y + 2, 8, 1);
    // Dome highlight
    ctx.fillStyle = '#ef4444';
    ctx.fillRect(x + 11, y, 2, 1);

    // ===== LIGHT ROOM — yellow window with cross-bar mullions =====
    ctx.fillStyle = '#fde047';
    ctx.fillRect(x + 10, y + 3, 6, 4);
    // bright filament glow center
    ctx.fillStyle = '#fef3c7';
    ctx.fillRect(x + 12, y + 4, 2, 2);
    // window mullions (dark cross)
    ctx.fillStyle = '#1a1410';
    ctx.fillRect(x + 13, y + 3, 1, 4);   // vertical
    ctx.fillRect(x + 10, y + 5, 6, 1);   // horizontal

    // ===== GALLERY WALKWAY + railing =====
    ctx.fillStyle = '#1a1410';
    ctx.fillRect(x + 9, y + 7, 8, 1);
    // 4 tiny railing posts
    ctx.fillStyle = '#3a3a3a';
    ctx.fillRect(x + 10, y + 6, 1, 1);
    ctx.fillRect(x + 12, y + 6, 1, 1);
    ctx.fillRect(x + 14, y + 6, 1, 1);
    ctx.fillRect(x + 15, y + 6, 1, 1);

    // ===== TAPERED TOWER BODY (cream with red candy-cane stripes) =====
    ctx.fillStyle = '#f4ead8';
    ctx.fillRect(x + 10, y + 8,  6, 4);
    ctx.fillRect(x + 9,  y + 12, 8, 4);
    ctx.fillRect(x + 8,  y + 16, 10, 4);
    ctx.fillRect(x + 7,  y + 20, 12, 4);
    ctx.fillRect(x + 6,  y + 24, 14, 6);
    // Right-side shadow (depth)
    ctx.fillStyle = 'rgba(0,0,0,0.18)';
    ctx.fillRect(x + 15, y + 8,  1, 4);
    ctx.fillRect(x + 16, y + 12, 1, 4);
    ctx.fillRect(x + 17, y + 16, 1, 4);
    ctx.fillRect(x + 18, y + 20, 1, 4);
    ctx.fillRect(x + 19, y + 24, 1, 6);
    // Red horizontal stripes
    ctx.fillStyle = '#dc2626';
    ctx.fillRect(x + 10, y + 9,  6, 2);
    ctx.fillRect(x + 9,  y + 13, 8, 2);
    ctx.fillRect(x + 8,  y + 17, 10, 2);
    ctx.fillRect(x + 7,  y + 21, 12, 2);

    // small porthole window on each unstripped band
    ctx.fillStyle = '#0c2856';
    ctx.fillRect(x + 12, y + 19, 2, 1);
    ctx.fillRect(x + 11, y + 15, 2, 1);

    // ===== DOOR at base with arched top =====
    ctx.fillStyle = '#1a1410';
    ctx.fillRect(x + 12, y + 26, 2, 4);
    ctx.fillRect(x + 11, y + 25, 4, 1);   // arch top
    // door handle
    ctx.fillStyle = '#d4a017';
    ctx.fillRect(x + 13, y + 28, 1, 1);

    // ===== ROCKY CLIFF base (more detail) =====
    ctx.fillStyle = '#3a4050';
    ctx.fillRect(x + 4, y + 30, 18, 2);
    ctx.fillRect(x + 6, y + 32, 14, 1);
    // Lighter rock highlights
    ctx.fillStyle = '#5a6478';
    ctx.fillRect(x + 5, y + 30, 1, 1);
    ctx.fillRect(x + 21, y + 30, 1, 1);
    ctx.fillRect(x + 10, y + 30, 2, 1);
    ctx.fillRect(x + 16, y + 30, 2, 1);

    // ===== ANIMATED OCEAN WAVES at base — bob up/down on a phase =====
    ctx.fillStyle = accent;
    const wPhase = Math.floor(elapsed * 3) % 2;
    const wOff = wPhase * 1;
    ctx.fillRect(x,      y + 33 - wOff, 5, 1);
    ctx.fillRect(x + 7,  y + 33 + wOff, 5, 1);
    ctx.fillRect(x + 14, y + 33 - wOff, 5, 1);
    ctx.fillRect(x + 21, y + 33 + wOff, 4, 1);
    // tiny foam highlights on wave crests
    ctx.fillStyle = '#fff';
    ctx.fillRect(x + 2,  y + 33 - wOff, 1, 1);
    ctx.fillRect(x + 16, y + 33 - wOff, 1, 1);
  }

  // New Orleans brass trumpet — bell + 3 valves + mouthpiece
  function drawTrumpet(x, y, accent) {
    // ===== BRASS TRUMPET (New Orleans / Mardi Gras) =====
    // Bell flare — multi-tier so it actually flares
    ctx.fillStyle = '#fbbf24';
    ctx.fillRect(x + 17, y + 7, 3, 7);   // narrowest entry
    ctx.fillRect(x + 19, y + 6, 3, 9);
    ctx.fillRect(x + 21, y + 5, 3, 11);
    ctx.fillRect(x + 23, y + 4, 2, 13);  // widest rim
    // Bell rim — bright gold lip
    ctx.fillStyle = '#fef3c7';
    ctx.fillRect(x + 24, y + 4, 1, 13);
    // Bell shadow on lower edge (depth)
    ctx.fillStyle = '#a86c12';
    ctx.fillRect(x + 21, y + 16, 3, 1);
    ctx.fillRect(x + 19, y + 15, 2, 1);
    ctx.fillRect(x + 23, y + 16, 2, 1);

    // Main horizontal tube
    ctx.fillStyle = '#d97706';
    ctx.fillRect(x + 2, y + 9, 16, 5);
    // Tube highlight strip
    ctx.fillStyle = '#fbbf24';
    ctx.fillRect(x + 2, y + 9, 16, 1);
    // Tube shadow (underside)
    ctx.fillStyle = '#a8530a';
    ctx.fillRect(x + 2, y + 13, 16, 1);

    // TUNING SLIDE LOOP — the curved U-bend that loops back under the tube
    ctx.fillStyle = '#d97706';
    ctx.fillRect(x + 16, y + 14, 4, 2);
    ctx.fillRect(x + 18, y + 14, 2, 4);
    ctx.fillRect(x + 14, y + 16, 6, 2);
    ctx.fillRect(x + 14, y + 14, 2, 4);
    // loop bend highlight
    ctx.fillStyle = '#fbbf24';
    ctx.fillRect(x + 14, y + 14, 2, 1);
    ctx.fillRect(x + 18, y + 14, 2, 1);

    // Mouthpiece (left side, small dark cup with silver shaft)
    ctx.fillStyle = '#cfd8e8';
    ctx.fillRect(x + 1, y + 10, 2, 3);
    ctx.fillStyle = '#1a1410';
    ctx.fillRect(x,     y + 9, 2, 5);
    // mouthpiece cup rim
    ctx.fillStyle = '#9ca3af';
    ctx.fillRect(x,     y + 9, 1, 1);
    ctx.fillRect(x,     y + 13, 1, 1);

    // 3 VALVES — silver columns with caps
    ctx.fillStyle = '#9ca3af';
    ctx.fillRect(x + 5,  y + 3, 3, 7);
    ctx.fillRect(x + 9,  y + 3, 3, 7);
    ctx.fillRect(x + 13, y + 3, 3, 7);
    // valve highlights (left edge of each)
    ctx.fillStyle = '#e5e7eb';
    ctx.fillRect(x + 5,  y + 3, 1, 7);
    ctx.fillRect(x + 9,  y + 3, 1, 7);
    ctx.fillRect(x + 13, y + 3, 1, 7);
    // valve shadows (right edge)
    ctx.fillStyle = '#6b7280';
    ctx.fillRect(x + 7,  y + 3, 1, 7);
    ctx.fillRect(x + 11, y + 3, 1, 7);
    ctx.fillRect(x + 15, y + 3, 1, 7);
    // accent valve caps (Mardi Gras purple)
    ctx.fillStyle = accent;
    ctx.fillRect(x + 5,  y + 2, 3, 1);
    ctx.fillRect(x + 9,  y + 2, 3, 1);
    ctx.fillRect(x + 13, y + 2, 3, 1);
    // cap pearl highlights
    ctx.fillStyle = 'rgba(255,255,255,0.6)';
    ctx.fillRect(x + 5,  y + 2, 1, 1);
    ctx.fillRect(x + 9,  y + 2, 1, 1);
    ctx.fillRect(x + 13, y + 2, 1, 1);

    // ===== ANIMATED MUSIC NOTES floating UP & out of the bell =====
    // Each note has a continuous upward drift + horizontal sway; mod period
    // makes them recycle. Color cycles purple/gold/green for Mardi Gras.
    const noteColors = [accent, '#fde047', '#22c55e'];
    for (let i = 0; i < 4; i++) {
      const phase = (elapsed * 1.5 + i * 0.7) % 1.6;
      const ny = y + 6 - phase * 18;                 // float up
      const nx = x + 14 + i * 2 + Math.sin(phase * 6 + i) * 2;  // sway
      const alpha = Math.max(0, 1 - phase / 1.4);
      ctx.fillStyle = noteColors[i % 3];
      ctx.save();
      ctx.globalAlpha = alpha;
      // note head
      ctx.fillRect(nx, ny + 3, 2, 2);
      // note stem
      ctx.fillRect(nx + 2, ny, 1, 4);
      // tiny flag on top
      ctx.fillRect(nx + 3, ny, 1, 2);
      ctx.restore();
    }
  }

  // Denver Rockies — twin peaks with snow caps, sun, drifting clouds, and a
  // tiny mountain pass road. Three depth layers (back/mid/front) for parallax.
  function drawMountain(x, y, accent) {
    // ===== SUN behind peaks (upper-left) — with sunburst rays =====
    ctx.fillStyle = accent;
    ctx.fillRect(x + 2, y, 4, 4);
    ctx.fillRect(x + 1, y + 1, 1, 2);
    ctx.fillRect(x + 6, y + 1, 1, 2);
    // sun rays radiating out (4 directions)
    ctx.fillStyle = 'rgba(252,204,21,0.45)';
    ctx.fillRect(x,     y + 2, 1, 1);   // left ray
    ctx.fillRect(x + 7, y + 2, 1, 1);   // right ray
    ctx.fillRect(x + 3, y - 1, 1, 1);   // top ray
    ctx.fillRect(x + 4, y - 1, 1, 1);
    // bright sun core
    ctx.fillStyle = '#fef3c7';
    ctx.fillRect(x + 3, y + 1, 2, 2);

    // ===== DRIFTING CLOUD (back layer, slow scroll) =====
    const cloudPhase = Math.floor((elapsed * 2) % 20);
    const cx = x + ((cloudPhase + 10) % 20);
    ctx.fillStyle = 'rgba(244,234,216,0.7)';
    ctx.fillRect(cx,     y + 6, 5, 1);
    ctx.fillRect(cx + 1, y + 7, 4, 1);
    ctx.fillRect(cx - 1, y + 7, 1, 1);

    // ===== BACK PEAK (smallest, lightest — atmospheric depth) =====
    ctx.fillStyle = '#4a5a7a';
    ctx.fillRect(x + 18, y + 11, 2, 4);
    ctx.fillRect(x + 16, y + 15, 6, 4);
    ctx.fillRect(x + 14, y + 19, 10, 4);
    // back peak shadow on right
    ctx.fillStyle = '#3a4a6a';
    ctx.fillRect(x + 20, y + 13, 2, 2);
    ctx.fillRect(x + 21, y + 16, 2, 3);
    // back peak snow tip
    ctx.fillStyle = '#cfd8e8';
    ctx.fillRect(x + 18, y + 11, 2, 1);
    ctx.fillRect(x + 17, y + 15, 2, 1);

    // ===== MID-RIDGE between peaks (saddle valley) =====
    ctx.fillStyle = '#2f3f5f';
    ctx.fillRect(x + 14, y + 11, 2, 4);
    ctx.fillRect(x + 12, y + 13, 4, 3);

    // ===== MAIN FRONT PEAK — wide dark triangle, deeper shadow =====
    ctx.fillStyle = '#2a3550';
    ctx.fillRect(x + 10, y + 4,  4, 4);
    ctx.fillRect(x + 8,  y + 8,  8, 4);
    ctx.fillRect(x + 6,  y + 12, 12, 4);
    ctx.fillRect(x + 4,  y + 16, 16, 4);
    ctx.fillRect(x + 2,  y + 20, 20, 4);
    ctx.fillRect(x,      y + 24, 24, 6);
    // RIGHT-SIDE SHADOW (sun comes from left, right is in shadow)
    ctx.fillStyle = '#1a2030';
    ctx.fillRect(x + 13, y + 5,  1, 3);
    ctx.fillRect(x + 14, y + 9,  2, 3);
    ctx.fillRect(x + 16, y + 13, 2, 3);
    ctx.fillRect(x + 18, y + 17, 2, 3);
    ctx.fillRect(x + 20, y + 21, 2, 3);
    ctx.fillRect(x + 22, y + 25, 2, 5);

    // ===== SNOW CAP on the main peak — jagged + more coverage =====
    ctx.fillStyle = '#f4ead8';
    ctx.fillRect(x + 10, y + 4, 4, 1);
    ctx.fillRect(x + 9,  y + 5, 6, 2);
    ctx.fillRect(x + 8,  y + 7, 8, 1);
    // snow drifts trickling down the LEFT side (sunlit/lit slope holds more snow)
    ctx.fillRect(x + 11, y + 10, 2, 1);
    ctx.fillRect(x + 10, y + 11, 2, 1);
    ctx.fillRect(x + 13, y + 13, 2, 1);
    ctx.fillRect(x + 7,  y + 12, 2, 1);
    ctx.fillRect(x + 9,  y + 15, 2, 1);
    ctx.fillRect(x + 6,  y + 17, 2, 1);
    // bright sunlit snow highlight on the very peak
    ctx.fillStyle = '#fff';
    ctx.fillRect(x + 11, y + 4, 2, 1);
    ctx.fillRect(x + 10, y + 5, 2, 1);

    // ===== TINY PINE TREES on lower slopes (foreground depth) =====
    ctx.fillStyle = '#0f3d1f';
    ctx.fillRect(x + 4,  y + 27, 1, 3);
    ctx.fillRect(x + 3,  y + 28, 3, 1);
    ctx.fillRect(x + 8,  y + 28, 1, 2);
    ctx.fillRect(x + 7,  y + 29, 3, 1);
    ctx.fillRect(x + 16, y + 27, 1, 3);
    ctx.fillRect(x + 15, y + 28, 3, 1);

    // ===== MOUNTAIN PASS ROAD — switchback (two angled segments) =====
    ctx.fillStyle = '#cfd8e8';
    ctx.fillRect(x + 1, y + 26, 22, 1);

  // Vegas casino neon sign — animated chasing bulbs + center text
  function drawNeonSign(x, y, accent) {
    // post (planted into the shoulder)
    ctx.fillStyle = '#1a1410';
    ctx.fillRect(x + 13, y + 28, 2, 6);
    // backplate — deep blue
    ctx.fillStyle = '#0c2856';
    ctx.fillRect(x + 3, y, 22, 28);
    // inner border
    ctx.fillStyle = '#1a1f4a';
    ctx.fillRect(x + 5, y + 2, 18, 24);
    // chasing bulbs along the border — alternate between gold and dim
    const tick = Math.floor(elapsed * 5);
    // top + bottom rows
    for (let i = 0; i < 5; i++) {
      const on = (i + tick) % 3 !== 0;
      ctx.fillStyle = on ? accent : '#3a2818';
      ctx.fillRect(x + 4 + i * 4, y,         2, 2);    // top bulb
      ctx.fillRect(x + 4 + i * 4, y + 26,    2, 2);    // bottom bulb
    }
    // left + right columns
    for (let i = 0; i < 5; i++) {
      const on = (i + tick + 1) % 3 !== 0;
      ctx.fillStyle = on ? accent : '#3a2818';
      ctx.fillRect(x + 3,  y + 3 + i * 4, 2, 2);   // left bulb
      ctx.fillRect(x + 23, y + 3 + i * 4, 2, 2);   // right bulb
    }
    // center text — "$$$" over "777" with accent color
    ctx.fillStyle = accent;
    ctx.font = 'bold 7px ui-monospace, monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('$$$', x + 14, y + 9);
    // 777 flashes faster (jackpot vibe)
    const sevensOn = Math.floor(elapsed * 3) % 2 === 0;
    ctx.fillStyle = sevensOn ? '#fff' : accent;
    ctx.fillText('777', x + 14, y + 19);
    ctx.textBaseline = 'alphabetic';
  }

  // ───── In-road hazards ─────

  function drawGator(x, y, w, h) {
    // shadow
    ctx.fillStyle = 'rgba(0,0,0,0.4)';
    ctx.fillRect(x + 3, y + h - 1, w - 6, 3);

    const bodyY = y + 5;
    const bodyH = h - 10;
    const cy = bodyY + bodyH / 2;

    // long horizontal body — olive
    ctx.fillStyle = '#3f5a2a';
    ctx.fillRect(x + 6, bodyY, w - 18, bodyH);

    // tapering tail on the LEFT (3 segments)
    ctx.fillRect(x + 3, bodyY + 1, 4, bodyH - 2);
    ctx.fillRect(x + 1, bodyY + 3, 3, bodyH - 6);
    ctx.fillRect(x,     bodyY + 5, 2, bodyH - 10);

    // head sway — slow horizontal wobble suggesting the gator is "looking around"
    const headSway = Math.round(Math.sin(elapsed * 1.4 + y * 0.05) * 1.5);

    // BIG head block on the RIGHT (snout sticking out)
    ctx.fillRect(x + w - 16 + headSway, bodyY - 2, 14, bodyH + 4);
    ctx.fillRect(x + w - 5 + headSway,  bodyY + 1, 5, bodyH - 2);    // snout tip

    // darker scaled spine — zigzag bumps along the back
    ctx.fillStyle = '#2a3d1c';
    for (let i = 0; i < w - 18; i += 4) {
      ctx.fillRect(x + 7 + i, bodyY,         2, 2);   // top scales
      ctx.fillRect(x + 7 + i, bodyY + bodyH - 2, 2, 2);
    }
    // tail spikes (smaller, on tail segment)
    ctx.fillRect(x + 3, bodyY,         2, 1);
    ctx.fillRect(x + 3, bodyY + bodyH - 1, 2, 1);

    // legs — 4 visible stubs, two top + two bottom
    ctx.fillStyle = '#2a3d1c';
    ctx.fillRect(x + 10, bodyY - 4, 3, 4);
    ctx.fillRect(x + 22, bodyY - 4, 3, 4);
    ctx.fillRect(x + 10, bodyY + bodyH, 3, 4);
    ctx.fillRect(x + 22, bodyY + bodyH, 3, 4);
    // tiny claws
    ctx.fillStyle = '#fff';
    ctx.fillRect(x + 10, bodyY - 4, 1, 1);
    ctx.fillRect(x + 22, bodyY - 4, 1, 1);
    ctx.fillRect(x + 12, bodyY + bodyH + 3, 1, 1);
    ctx.fillRect(x + 24, bodyY + bodyH + 3, 1, 1);

    // EYE BUMPS sticking up on top of head — follow head sway
    ctx.fillStyle = '#3f5a2a';
    ctx.fillRect(x + w - 13 + headSway, bodyY - 4, 4, 3);
    ctx.fillRect(x + w - 8  + headSway, bodyY - 4, 4, 3);
    // yellow eyes with black pupils
    ctx.fillStyle = '#facc15';
    ctx.fillRect(x + w - 12 + headSway, bodyY - 3, 2, 2);
    ctx.fillRect(x + w - 7  + headSway, bodyY - 3, 2, 2);
    ctx.fillStyle = '#000';
    ctx.fillRect(x + w - 11 + headSway, bodyY - 2, 1, 1);
    ctx.fillRect(x + w - 6  + headSway, bodyY - 2, 1, 1);

    // ANIMATED JAW — clack cycle driven by elapsed (phase-offset per gator by y)
    // 1.5Hz: open fast, hold, close fast, stay closed for half the cycle
    const jawPhase = (elapsed * 1.5 + y * 0.03) % 1;
    const jawOpen = jawPhase < 0.18 ? jawPhase / 0.18
                  : jawPhase < 0.34 ? 1
                  : jawPhase < 0.50 ? 1 - (jawPhase - 0.34) / 0.16
                  : 0;
    const gap = Math.round(jawOpen * 3);   // 0..3 px

    // pink mouth interior — grows taller when open + follows head sway
    ctx.fillStyle = '#7a1818';
    ctx.fillRect(x + w - 5 + headSway, cy - 1, 5, 3 + gap);

    // top teeth — fixed position (relative to head)
    ctx.fillStyle = '#fff';
    for (let i = 0; i < 4; i++) {
      ctx.fillRect(x + w - 5 + i + headSway, cy - 2, 1, 1);
    }
    // bottom teeth — shift down with jawOpen
    for (let i = 0; i < 4; i++) {
      ctx.fillRect(x + w - 5 + i + headSway, cy + 2 + gap, 1, 1);
    }
    // bottom lip line (subtle dark edge under bottom teeth)
    ctx.fillStyle = '#2a3d1c';
    ctx.fillRect(x + w - 5 + headSway, cy + 3 + gap, 5, 1);

    // nostril dot
    ctx.fillStyle = '#000';
    ctx.fillRect(x + w - 3 + headSway, cy - 3, 1, 1);
  }

  function drawTree(x, y, w, h) {
    // shadow under the trunk
    ctx.fillStyle = 'rgba(0,0,0,0.4)';
    ctx.fillRect(x + 4, y + h - 1, w - 8, 3);

    // main trunk — darker brown for contrast against the road
    ctx.fillStyle = '#3a2014';
    ctx.fillRect(x, y + 3, w, h - 6);

    // bark grain — lighter horizontal cracks
    ctx.fillStyle = '#6b3a1c';
    ctx.fillRect(x + 4,  y + 5,        w - 8, 1);
    ctx.fillRect(x + 6,  y + 8,        w - 14, 1);
    ctx.fillRect(x + 4,  y + h - 6,    w - 8, 1);
    ctx.fillRect(x + 10, y + h - 10,   w - 22, 1);

    // bark knots (dark spots)
    ctx.fillStyle = '#1a0a04';
    ctx.fillRect(x + 18,                       y + 6,      4, 4);
    ctx.fillRect(x + Math.max(40, w - 36),     y + h - 10, 4, 4);
    ctx.fillRect(x + Math.floor(w / 2),        y + 7,      3, 3);
    ctx.fillRect(x + Math.floor(w / 2) - 14,   y + h - 9,  3, 3);

    // broken stump (left end) — jagged pale-cream pulp + visible tree rings
    ctx.fillStyle = '#e7decf';
    ctx.fillRect(x - 4, y + 5,        4, 4);
    ctx.fillRect(x - 5, y + 9,        4, 4);
    ctx.fillRect(x - 4, y + h / 2,    4, 4);
    ctx.fillRect(x - 5, y + h - 10,   4, 3);
    ctx.fillRect(x - 4, y + h - 7,    4, 3);
    // tree rings — concentric ring colors at the cut face
    ctx.fillStyle = '#8a5028';
    ctx.fillRect(x - 3, y + 7, 2, h - 14);
    ctx.fillStyle = '#5a3018';
    ctx.fillRect(x - 2, y + 9, 1, h - 18);

    // 3 prominent branches sticking UP (toward player) with foliage clusters
    drawTreeBranch(x + 14,        y, true);
    drawTreeBranch(x + w / 2 - 3, y, false);
    drawTreeBranch(x + w - 24,    y, true);

    // small twig poking down
    ctx.fillStyle = '#3a2014';
    ctx.fillRect(x + 30, y + h - 1, 3, 6);
    ctx.fillRect(x + w - 36, y + h - 1, 3, 5);
    ctx.fillStyle = '#0f3d1f';
    ctx.fillRect(x + 28, y + h + 4, 7, 3);
  }

  // One up-pointing branch with a leaf cluster — used 3x along the trunk
  function drawTreeBranch(bx, by, big) {
    // branch wood
    ctx.fillStyle = '#3a2014';
    if (big) {
      ctx.fillRect(bx,     by - 12, 4, 14);
      ctx.fillRect(bx - 2, by - 14, 2, 3);
      ctx.fillRect(bx + 4, by - 14, 2, 3);
    } else {
      ctx.fillRect(bx,     by - 9, 3, 11);
      ctx.fillRect(bx + 3, by - 11, 2, 3);
    }
    // foliage cluster — dark green base
    ctx.fillStyle = '#0f3d1f';
    if (big) {
      ctx.fillRect(bx - 5, by - 20, 14, 6);
      ctx.fillRect(bx - 3, by - 24, 10, 4);
      ctx.fillRect(bx - 6, by - 18, 4, 4);
      ctx.fillRect(bx + 8, by - 18, 4, 4);
    } else {
      ctx.fillRect(bx - 4, by - 16, 11, 5);
      ctx.fillRect(bx - 2, by - 19, 7, 3);
    }
    // bright highlights
    ctx.fillStyle = '#22c55e';
    ctx.fillRect(bx - 2, by - 22, 2, 1);
    ctx.fillRect(bx + 3, by - 19, 2, 1);
    ctx.fillRect(bx - 3, by - 17, 1, 1);
  }

  // Single TRAFFIC CONE obstacle — tall 4-tier pyramid with reflective bands
  // (replaces the embarrassing "flat red rectangle" default render)
  function drawCone(x, y, w, h) {
    // Render a small fixed-size cone CENTERED in the bounding box, so callers
    // can pass a smaller collision width (so player at lane center drives past)
    // without distorting the visual.
    const cx = x + w / 2;             // cone center X
    const baseHalf = 6;               // cone base half-width — 12px total
    // ground shadow
    ctx.fillStyle = 'rgba(0,0,0,0.4)';
    ctx.fillRect(cx - baseHalf,     y + h - 2, baseHalf * 2,     2);
    // BLACK BASE (wider rim for stability look)
    ctx.fillStyle = '#0a0a0a';
    ctx.fillRect(cx - baseHalf + 1, y + h - 5, baseHalf * 2 - 2, 4);
    ctx.fillRect(cx - baseHalf,     y + h - 3, baseHalf * 2,     3);
    // CONE BODY — 4 stacked layers narrowing toward tip
    const baseY = y + h - 5;
    ctx.fillStyle = '#ea580c';
    ctx.fillRect(cx - 5, baseY - 8,  10, 8);
    ctx.fillRect(cx - 4, baseY - 16,  8, 8);
    ctx.fillRect(cx - 3, baseY - 24,  6, 8);
    ctx.fillRect(cx - 1, baseY - 32,  2, 8);
    // bright LEFT-edge highlight (3D)
    ctx.fillStyle = '#fb923c';
    ctx.fillRect(cx - 5, baseY - 8,  1, 8);
    ctx.fillRect(cx - 4, baseY - 16, 1, 8);
    ctx.fillRect(cx - 3, baseY - 24, 1, 8);
    ctx.fillRect(cx - 1, baseY - 32, 1, 8);
    // dark RIGHT-edge shading
    ctx.fillStyle = '#9a3a09';
    ctx.fillRect(cx + 4, baseY - 8,  1, 8);
    ctx.fillRect(cx + 3, baseY - 16, 1, 8);
    ctx.fillRect(cx + 2, baseY - 24, 1, 8);
    ctx.fillRect(cx,     baseY - 32, 1, 8);
    // 2 WHITE REFLECTIVE BANDS
    ctx.fillStyle = '#fff';
    ctx.fillRect(cx - 5, baseY - 4,  10, 1);
    ctx.fillRect(cx - 4, baseY - 12,  8, 1);
    // silver glint
    ctx.fillStyle = '#e7decf';
    ctx.fillRect(cx - 3, baseY - 3,  1, 1);
    ctx.fillRect(cx - 3, baseY - 11, 1, 1);
    // black tip on top
    ctx.fillStyle = '#1a0a04';
    ctx.fillRect(cx - 1, baseY - 32, 2, 1);
  }

  // BOX TRUCK obstacle — amber cab + cargo + side rivets + tail lights + wheels
  function drawTruck(x, y, w, h) {
    // shadow
    ctx.fillStyle = 'rgba(0,0,0,0.4)';
    ctx.fillRect(x + 1, y + h - 2, w - 2, 3);
    const cabH = Math.floor(h * 0.28);
    // CAB at top — amber with windshield
    ctx.fillStyle = '#F59E0B';
    ctx.fillRect(x, y, w, cabH);
    // cab shading bottom edge
    ctx.fillStyle = '#9a4a0a';
    ctx.fillRect(x, y + cabH - 1, w, 1);
    // cab windshield
    ctx.fillStyle = COL_WINDOW;
    ctx.fillRect(x + 4, y + 3, w - 8, cabH - 7);
    // glint
    ctx.fillStyle = 'rgba(255,255,255,0.18)';
    ctx.fillRect(x + 4, y + 3, w - 8, 1);
    // headlights
    ctx.fillStyle = '#fff';
    ctx.fillRect(x + 2,     y + 1, 3, 2);
    ctx.fillRect(x + w - 5, y + 1, 3, 2);
    // CARGO BOX — amber, slightly darker
    ctx.fillStyle = '#d97706';
    ctx.fillRect(x, y + cabH, w, h - cabH);
    // top accent stripe (where cab meets cargo)
    ctx.fillStyle = '#fbbf24';
    ctx.fillRect(x, y + cabH, w, 1);
    // SIDE RIVETS — corrugated panels
    ctx.fillStyle = '#7a3a09';
    const rivetH = h - cabH - 6;
    const rivets = Math.max(2, (rivetH / 8) | 0);
    for (let i = 0; i < rivets; i++) {
      const ry = y + cabH + 4 + i * 8;
      ctx.fillRect(x + 2,     ry, 1, 1);
      ctx.fillRect(x + w - 3, ry, 1, 1);
    }
    // REAR DOOR — horizontal split
    ctx.fillStyle = '#9a4a0a';
    ctx.fillRect(x, y + h - 6, w, 1);
    ctx.fillRect(x + w / 2 - 1, y + h - 5, 2, 4);   // door handle
    // wheels sticking out the sides
    ctx.fillStyle = '#0a0a0a';
    ctx.fillRect(x - 2, y + cabH + 4,        3, 4);
    ctx.fillRect(x + w - 1, y + cabH + 4,    3, 4);
    ctx.fillRect(x - 2, y + h - 12,          3, 4);
    ctx.fillRect(x + w - 1, y + h - 12,      3, 4);
    // taillights at very back
    ctx.fillStyle = '#dc2626';
    ctx.fillRect(x + 2,     y + h - 3, 4, 2);
    ctx.fillRect(x + w - 6, y + h - 3, 4, 2);
  }

  // NEVERENDING CONSTRUCTION LLC barricade — 2-lane orange/black striped barrier
  function drawConstruction(x, y, w, h) {
    // ground shadow
    ctx.fillStyle = 'rgba(0,0,0,0.4)';
    ctx.fillRect(x + 2, y + h - 1, w - 4, 2);
    // BARRICADE — alternating diagonal-look stripes (orange + black)
    for (let row = 0; row < h; row += 2) {
      ctx.fillStyle = ((row / 2) | 0) % 2 === 0 ? '#fb923c' : '#1a1410';
      ctx.fillRect(x, y + row, w, 2);
    }
    // bright top edge
    ctx.fillStyle = '#fdba74';
    ctx.fillRect(x, y, w, 1);
    // FLASHING YELLOW BEACONS on top corners
    const beaconOn = Math.floor(elapsed * 3) % 2 === 0;
    ctx.fillStyle = beaconOn ? '#facc15' : '#5a4818';
    ctx.fillRect(x + 4,     y - 4, 4, 4);
    ctx.fillRect(x + w - 8, y - 4, 4, 4);
    if (beaconOn) {
      ctx.fillStyle = 'rgba(250,204,21,0.35)';
      ctx.fillRect(x + 2,      y - 6, 8, 8);
      ctx.fillRect(x + w - 10, y - 6, 8, 8);
    }
    // BIG WHITE TEXT centered — "CONSTRUCTION" + "NEVERENDING LLC"
    ctx.save();
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 7px ui-monospace, monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    // dark backing for legibility on the striped pattern
    const tw1 = ctx.measureText('CONSTRUCTION').width;
    ctx.fillStyle = 'rgba(0,0,0,0.85)';
    ctx.fillRect(x + w / 2 - tw1 / 2 - 2, y + h / 2 - 11, tw1 + 4, 9);
    ctx.fillStyle = '#fff';
    ctx.fillText('CONSTRUCTION', x + w / 2, y + h / 2 - 7);
    // smaller "NEVERENDING LLC" under
    ctx.font = '6px ui-monospace, monospace';
    const tw2 = ctx.measureText('NEVERENDING LLC').width;
    ctx.fillStyle = 'rgba(0,0,0,0.85)';
    ctx.fillRect(x + w / 2 - tw2 / 2 - 2, y + h / 2 + 1, tw2 + 4, 8);
    ctx.fillStyle = '#facc15';
    ctx.fillText('NEVERENDING LLC', x + w / 2, y + h / 2 + 5);
    ctx.textBaseline = 'alphabetic';
    ctx.restore();
  }

  // Single construction cone — orange, white reflective bands, 3D shading
  function drawSingleCone(cx, cy) {
    // soft shadow under the base
    ctx.fillStyle = 'rgba(0,0,0,0.45)';
    ctx.fillRect(cx - 1, cy + 12, 12, 1);
    // BLACK BASE — wider rim for stability look
    ctx.fillStyle = '#0a0a0a';
    ctx.fillRect(cx,     cy + 10, 10, 2);
    ctx.fillRect(cx - 1, cy + 11, 12, 2);
    // ORANGE CONE BODY — stacked levels with stronger orange
    ctx.fillStyle = '#ea580c';
    ctx.fillRect(cx + 1, cy + 8, 8, 2);
    ctx.fillRect(cx + 2, cy + 6, 6, 2);
    ctx.fillRect(cx + 3, cy + 4, 4, 2);
    ctx.fillRect(cx + 4, cy + 2, 2, 2);
    ctx.fillRect(cx + 4, cy,     2, 2);
    // BRIGHT LEFT-EDGE highlight — 3D pop
    ctx.fillStyle = '#fb923c';
    ctx.fillRect(cx + 1, cy + 8, 1, 2);
    ctx.fillRect(cx + 2, cy + 6, 1, 2);
    ctx.fillRect(cx + 3, cy + 4, 1, 2);
    ctx.fillRect(cx + 4, cy + 2, 1, 2);
    ctx.fillRect(cx + 4, cy,     1, 2);
    // DARKER RIGHT-EDGE shading
    ctx.fillStyle = '#9a3a09';
    ctx.fillRect(cx + 8, cy + 8, 1, 2);
    ctx.fillRect(cx + 7, cy + 6, 1, 2);
    ctx.fillRect(cx + 6, cy + 4, 1, 2);
    ctx.fillRect(cx + 5, cy + 2, 1, 2);
    // 2 WHITE REFLECTIVE BANDS — distinctive cone identifier
    ctx.fillStyle = '#fff';
    ctx.fillRect(cx + 2, cy + 7, 6, 1);   // wide band lower
    ctx.fillRect(cx + 3, cy + 4, 4, 1);   // narrow band upper
    // tiny silver glint on left band (suggests reflective tape)
    ctx.fillStyle = '#e7decf';
    ctx.fillRect(cx + 3, cy + 8, 1, 1);
    ctx.fillRect(cx + 4, cy + 5, 1, 1);
    // black tip on top for sharpness
    ctx.fillStyle = '#1a0a04';
    ctx.fillRect(cx + 4, cy, 2, 1);
  }

  function drawCones(x, y, w, h) {
    // 3 cones in a triangle formation — two at front, one behind/center
    const baseY = y + h - 14;
    drawSingleCone(x + 2,            baseY);
    drawSingleCone(x + w - 12,       baseY);
    drawSingleCone(x + (w - 10) / 2, y);
    // YELLOW CAUTION TAPE between front cones — thin striped diamond pattern
    const tapeY = y + h - 6;
    for (let i = 0; i < (w - 6); i += 4) {
      ctx.fillStyle = (i / 4) % 2 === 0 ? '#facc15' : '#1a1410';
      ctx.fillRect(x + 6 + i, tapeY, 2, 1);
    }
  }

  // MOVING TRUCK — yellow box truck with rental decals + rivets + roll-up door
  // CRAZY TRAILER — tiny cab (top 1/4) towing a huge wobbly cargo box (bottom 3/4).
  // Visibly unstable: warning triangle, missing rivets, swerve marks on the box,
  // dangling chain between cab and trailer.
  function drawCrazyTrailer(x, y, w, h) {
    // shadow
    ctx.fillStyle = 'rgba(0,0,0,0.4)';
    ctx.fillRect(x + 1, y + h - 2, w - 2, 3);

    // ===== TINY TOW CAB at the top =====
    const cabH = Math.floor(h * 0.22);
    // cab body — beige/old pickup color
    ctx.fillStyle = '#a86838';
    ctx.fillRect(x + 2, y, w - 4, cabH);
    // cab top highlight
    ctx.fillStyle = '#c8884a';
    ctx.fillRect(x + 2, y, w - 4, 2);
    // cab right shadow
    ctx.fillStyle = '#6b3a1c';
    ctx.fillRect(x + w - 4, y, 2, cabH);
    // cab windshield
    ctx.fillStyle = COL_WINDOW;
    ctx.fillRect(x + 4, y + 3, w - 8, cabH - 6);
    // headlights — small yellow
    ctx.fillStyle = '#fde047';
    ctx.fillRect(x + 3,     y + 1, 3, 2);
    ctx.fillRect(x + w - 6, y + 1, 3, 2);

    // ===== HITCH CHAIN between cab and trailer =====
    ctx.fillStyle = '#5a5a5a';
    ctx.fillRect(x + w / 2 - 1, y + cabH, 2, 3);
    // chain links — dangling
    ctx.fillStyle = '#3a3a3a';
    ctx.fillRect(x + w / 2 - 2, y + cabH + 1, 1, 1);
    ctx.fillRect(x + w / 2 + 1, y + cabH + 2, 1, 1);

    // ===== GIANT WOBBLY CARGO BOX =====
    const boxY = y + cabH + 3;
    const boxH = h - cabH - 5;
    // box body — bright orange (rental color)
    ctx.fillStyle = '#f97316';
    ctx.fillRect(x, boxY, w, boxH);
    // top highlight
    ctx.fillStyle = '#fdba74';
    ctx.fillRect(x, boxY, w, 2);
    // right shadow
    ctx.fillStyle = '#c2410c';
    ctx.fillRect(x + w - 2, boxY, 2, boxH);
    // bottom dark band
    ctx.fillStyle = '#7c2d12';
    ctx.fillRect(x, boxY + boxH - 4, w, 4);

    // ===== DENT MARKS on the box (rectangular dark patches) =====
    ctx.fillStyle = 'rgba(0,0,0,0.35)';
    ctx.fillRect(x + 3,         boxY + 6,           4, 3);
    ctx.fillRect(x + w - 9,     boxY + 14,          5, 4);
    ctx.fillRect(x + 5,         boxY + boxH - 16,   6, 3);

    // ===== "WIDE LOAD" decal on the side =====
    ctx.save();
    ctx.font = 'bold 5px ui-monospace, monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    // black backing
    ctx.fillStyle = '#1a1410';
    ctx.fillRect(x + 4, boxY + Math.floor(boxH * 0.30), w - 8, 7);
    ctx.fillStyle = '#fde047';
    ctx.fillText('WIDE LOAD', x + w / 2, boxY + Math.floor(boxH * 0.30) + 4);
    ctx.restore();

    // ===== WARNING TRIANGLE icon on the side =====
    ctx.fillStyle = '#fde047';
    const tcx = x + w / 2;
    const tcy = boxY + Math.floor(boxH * 0.55);
    ctx.fillRect(tcx - 1, tcy - 3, 2, 1);
    ctx.fillRect(tcx - 2, tcy - 2, 4, 1);
    ctx.fillRect(tcx - 3, tcy - 1, 6, 1);
    ctx.fillRect(tcx - 4, tcy,     8, 1);
    // black exclamation mark inside
    ctx.fillStyle = '#1a1410';
    ctx.fillRect(tcx, tcy - 2, 1, 2);
    ctx.fillRect(tcx, tcy,     1, 1);

    // ===== DOORS at the back — vertical seam =====
    ctx.fillStyle = '#1a1410';
    ctx.fillRect(x + w / 2 - 1, boxY + Math.floor(boxH * 0.7), 2, Math.floor(boxH * 0.3) - 4);
    // door handles
    ctx.fillStyle = '#3a3a3a';
    ctx.fillRect(x + w / 2 - 3, boxY + Math.floor(boxH * 0.85), 2, 1);
    ctx.fillRect(x + w / 2 + 1, boxY + Math.floor(boxH * 0.85), 2, 1);

    // ===== WHEELS — 4 sticking out the bottom (dual axle, badly loaded) =====
    ctx.fillStyle = '#0a0a0a';
    ctx.fillRect(x - 2, y + cabH + 2,    4, 4);
    ctx.fillRect(x + w - 2, y + cabH + 2, 4, 4);
    ctx.fillRect(x - 2, y + h - 14,      4, 5);
    ctx.fillRect(x + w - 2, y + h - 14,  4, 5);
    ctx.fillRect(x - 2, y + h - 8,       4, 5);
    ctx.fillRect(x + w - 2, y + h - 8,   4, 5);

    // ===== SCREECH MARKS — small white dashes behind the trailer (skidmarks) =====
    ctx.fillStyle = 'rgba(255,255,255,0.4)';
    ctx.fillRect(x - 4, y + h - 1, 2, 1);
    ctx.fillRect(x + w + 2, y + h - 1, 2, 1);
  }

  function drawMovingTruck(x, y, w, h) {
    ctx.save();
    // shadow
    ctx.fillStyle = 'rgba(0,0,0,0.4)';
    ctx.fillRect(x + 1, y + h - 2, w - 2, 3);

    const cabH = Math.floor(h * 0.22);

    // BLACK CAB at front
    ctx.fillStyle = '#1a1410';
    ctx.fillRect(x + 2, y, w - 4, cabH);
    // cab roof slight slope
    ctx.fillStyle = '#0c0a08';
    ctx.fillRect(x + 4, y, w - 8, 2);
    // cab windshield — wide glass at front
    ctx.fillStyle = COL_WINDOW;
    ctx.fillRect(x + 4, y + 3, w - 8, cabH - 6);
    // headlights at the very top
    ctx.fillStyle = '#fff';
    ctx.fillRect(x + 3,     y + 1, 3, 2);
    ctx.fillRect(x + w - 6, y + 1, 3, 2);

    // YELLOW BOX cargo area — main body
    ctx.fillStyle = '#fbbf24';
    ctx.fillRect(x, y + cabH, w, h - cabH);
    // top accent stripe
    ctx.fillStyle = '#f59e0b';
    ctx.fillRect(x, y + cabH,     w, 2);
    ctx.fillRect(x, y + cabH + 2, w, 1);
    // bottom shading
    ctx.fillStyle = '#d97706';
    ctx.fillRect(x, y + h - 8, w, 4);
    ctx.fillRect(x, y + h - 4, w, 2);
    // side panel rivets — small dark dots in 2 columns
    ctx.fillStyle = '#7a4a1a';
    for (let i = 0; i < 6; i++) {
      const ry = y + cabH + 6 + i * 8;
      if (ry > y + h - 6) break;
      ctx.fillRect(x + 2,     ry, 1, 1);
      ctx.fillRect(x + w - 3, ry, 1, 1);
    }
    // "MOVING" decal text on the side
    ctx.fillStyle = '#1a1410';
    ctx.font = 'bold 7px ui-monospace, monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('MOVING', x + w / 2, y + cabH + Math.floor((h - cabH) * 0.35));
    ctx.font = '5px ui-monospace, monospace';
    ctx.fillText('U-MOVE LLC', x + w / 2, y + cabH + Math.floor((h - cabH) * 0.50));
    ctx.textBaseline = 'alphabetic';

    // ROLL-UP DOOR at the back — horizontal lines suggesting corrugated metal
    ctx.fillStyle = '#a86a14';
    ctx.fillRect(x + 4, y + h - 22, w - 8, 14);
    for (let i = 0; i < 7; i++) {
      ctx.fillStyle = (i % 2 === 0) ? '#d97706' : '#7a4a1a';
      ctx.fillRect(x + 4, y + h - 22 + i * 2, w - 8, 1);
    }
    // door handle
    ctx.fillStyle = '#1a1410';
    ctx.fillRect(x + w / 2 - 2, y + h - 10, 4, 2);

    // wheels — 6 (3-axle truck) sticking out the bottom
    ctx.fillStyle = '#0a0a0a';
    ctx.fillRect(x - 2, y + cabH + 2,        4, 4);
    ctx.fillRect(x + w - 2, y + cabH + 2,    4, 4);
    ctx.fillRect(x - 2, y + h - 18,          4, 4);
    ctx.fillRect(x + w - 2, y + h - 18,      4, 4);
    ctx.fillRect(x - 2, y + h - 8,           4, 4);
    ctx.fillRect(x + w - 2, y + h - 8,       4, 4);

    // big red taillights at very back
    ctx.fillStyle = '#dc2626';
    ctx.fillRect(x + 2,     y + h - 4, 5, 2);
    ctx.fillRect(x + w - 7, y + h - 4, 5, 2);
    ctx.restore();
  }

  // U-HAUL parody — orange and white rental box truck with "U-HALT" decal
  function drawUHaul(x, y, w, h) {
    ctx.save();
    // shadow
    ctx.fillStyle = 'rgba(0,0,0,0.4)';
    ctx.fillRect(x + 1, y + h - 2, w - 2, 3);

    const cabH = Math.floor(h * 0.22);

    // White cab at front
    ctx.fillStyle = '#f4ead8';
    ctx.fillRect(x + 2, y, w - 4, cabH);

    ctx.fillStyle = '#fb923c';
    ctx.fillRect(x + 2, y, w - 4, 1);
    // cab windshield
    ctx.fillStyle = COL_WINDOW;
    ctx.fillRect(x + 4, y + 3, w - 8, cabH - 6);
    // headlights at top
    ctx.fillStyle = '#fde047';
    ctx.fillRect(x + 3,     y + 1, 3, 2);
    ctx.fillRect(x + w - 6, y + 1, 3, 2);

    // Orange cargo box
    ctx.fillStyle = '#f97316';
    ctx.fillRect(x, y + cabH, w, h - cabH);
    // top white accent stripe (classic U-Haul brand band)
    ctx.fillStyle = '#f4ead8';
    ctx.fillRect(x, y + cabH, w, 3);

    ctx.fillStyle = '#ea580c';
    ctx.fillRect(x, y + cabH + 3, w, 2);
    // bottom shading
    ctx.fillStyle = '#7c2d12';
    ctx.fillRect(x, y + h - 6, w, 4);

    ctx.fillStyle = '#f4ead8';
    ctx.fillRect(x + 3, y + cabH + 7, w - 6, 11);

    ctx.fillRect(x + 3, y + cabH + 7, w - 6, 1);
    ctx.fillRect(x + 3, y + cabH + 17, w - 6, 1);
    // U-HALT text
    ctx.font = 'bold 7px ui-monospace, monospace';
    ctx.fillStyle = '#c2410c';
    ctx.textAlign = 'center';

    ctx.fillRect(x + w - 2, y + h - 18,  4, 4);
    ctx.fillRect(x - 2, y + h - 8,       4, 4);
    ctx.fillRect(x + w - 2, y + h - 8,   4, 4);

    // big red taillights at very back
    ctx.fillStyle = '#dc2626';
    ctx.fillRect(x + 2,     y + h - 4, 5, 2);
    ctx.fillRect(x + w - 7, y + h - 4, 5, 2);
    ctx.restore();
    ctx.textBaseline = 'alphabetic';
  }

  // SOCCER MOM SUV — silver minivan with family stickers + baby-on-board decal

    // FAMILY STICKERS on rear window — small color dots
    ctx.fillStyle = '#1a1410';
    ctx.fillRect(x + 6,  y + h - 16, 2, 4);   // dad
    ctx.fillRect(x + 10, y + h - 16, 2, 4);   // mom
    ctx.fillRect(x + 14, y + h - 14, 2, 3);   // kid 1
    ctx.fillRect(x + 17, y + h - 13, 2, 2);   // kid 2
    ctx.fillRect(x + 20, y + h - 13, 2, 2);   // dog
    // BABY ON BOARD yellow diamond on side
    const bx = x + 2, by = y + Math.floor(h * 0.62);
    ctx.fillStyle = '#fde047';
    ctx.fillRect(bx + 1, by, 6, 1);
    ctx.fillRect(bx,     by + 1, 8, 1);
    ctx.fillRect(bx,     by + 2, 8, 1);
    ctx.fillRect(bx + 1, by + 3, 6, 1);
    ctx.fillRect(bx + 2, by + 4, 4, 1);
    // "B" letter inside (just a dot for legibility at small size)
    ctx.fillStyle = '#1a1410';
    ctx.fillRect(bx + 3, by + 1, 2, 2);
    // headlights
    ctx.fillStyle = '#fff';
    ctx.fillRect(x + 2,     y + 1, 4, 2);
    ctx.fillRect(x + w - 6, y + 1, 4, 2);
    // taillights
    ctx.fillStyle = '#ff3a3a';
    ctx.fillRect(x + 2,     y + h - 4, 4, 2);
    ctx.fillRect(x + w - 6, y + h - 4, 4, 2);
    // BUMPER STICKER "MY CHILD IS HONOR ROLL" — small pink strip
    ctx.fillStyle = '#ec4899';
    ctx.fillRect(x + w - 12, y + Math.floor(h * 0.70), 9, 2);
  }

  // TESLA Cybertruck — sharp angular wedge, stainless steel chrome
  function drawTesla(x, y, w, h) {
    // shadow
    ctx.fillStyle = 'rgba(0,0,0,0.35)';
    ctx.fillRect(x + 1, y + h - 2, w - 2, 3);
    // wedge body — stainless steel main mass
    ctx.fillStyle = '#9ca3af';
    ctx.fillRect(x, y + Math.floor(h * 0.18), w, h - Math.floor(h * 0.18));
    // sharp slanted hood / roof line
    ctx.fillRect(x + 3, y + Math.floor(h * 0.10), w - 6, Math.floor(h * 0.08));
    ctx.fillRect(x + 6, y + Math.floor(h * 0.04), w - 12, Math.floor(h * 0.06));
    ctx.fillRect(x + 9, y, w - 18, Math.floor(h * 0.04));
    // bright chrome highlights along the wedge edges
    ctx.fillStyle = '#cfd8e8';
    ctx.fillRect(x,     y + Math.floor(h * 0.18), w, 1);
    ctx.fillRect(x + 3, y + Math.floor(h * 0.10), w - 6, 1);
    ctx.fillRect(x + 6, y + Math.floor(h * 0.04), w - 12, 1);
    // LED light bar — full-width single white strip
    ctx.fillStyle = '#fff';
    ctx.fillRect(x + 2, y + 1, w - 4, 2);
    // triangle windshield (acrylic-looking dark tint)
    ctx.fillStyle = '#1a2030';
    ctx.fillRect(x + 5, y + Math.floor(h * 0.20), w - 10, Math.floor(h * 0.18));
    ctx.fillStyle = COL_WINDOW;
    ctx.fillRect(x + 6, y + Math.floor(h * 0.21), w - 12, Math.floor(h * 0.14));
    // side window slit (small)
    ctx.fillStyle = '#1a2030';
    ctx.fillRect(x + 4, y + Math.floor(h * 0.43), w - 8, 5);
    // body panel split line
    ctx.fillStyle = '#7a8aa8';
    ctx.fillRect(x, y + Math.floor(h * 0.62), w, 1);
    // big black tire arches (4)
