  // Daily challenge — target score that refreshes every local-midnight.
  // Retention: gives a clear "come back tomorrow" reason after completion.
  function todayKey() {
    const d = new Date();
    return d.getFullYear() + '-' +
      String(d.getMonth() + 1).padStart(2, '0') + '-' +
      String(d.getDate()).padStart(2, '0');
  }
  function getDailyChallenge() {
    try {
      const raw = localStorage.getItem('chill.daily');
      if (raw) {
        const data = JSON.parse(raw);
        if (data && data.date === todayKey()) return data;
      }
    } catch (_) {}
    // New target: ~60% of best (snapped to 50), with a floor of 200.
    const baseBest = best || 250;
    const target = Math.max(200, Math.round(baseBest * 0.6 / 50) * 50);
    const data = { date: todayKey(), target, achieved: false };
    try { localStorage.setItem('chill.daily', JSON.stringify(data)); } catch (_) {}
    return data;
  }
  // Daily streak — bumps every day the player opens the game, resets if a day
  // is skipped. Big visible badge → "X-DAY STREAK" creates loss aversion.
  function yesterdayKey() {
    const d = new Date();
    d.setDate(d.getDate() - 1);
    return d.getFullYear() + '-' +
      String(d.getMonth() + 1).padStart(2, '0') + '-' +

    try {
      const raw = localStorage.getItem('chill.streak');
      if (!raw) return { count: 0, lastPlayedDate: null };
      const data = JSON.parse(raw);
      return data && typeof data === 'object' ? data : { count: 0, lastPlayedDate: null };

  }

  // its own leaderboard. Shows "SF BEST: 240" flash when entering each city.
  function getStateBests() {
    try {
      const raw = localStorage.getItem('chill.stateBests');
      if (!raw) return {};
      const obj = JSON.parse(raw);
      return obj && typeof obj === 'object' ? obj : {};
    } catch (_) { return {}; }
  }
  function setStateBest(key, val) {
    try {
      const obj = getStateBests();
      obj[key] = Math.max(val | 0, obj[key] || 0);

    } catch (_) {}

  function updateStreak() {
    try {
      const today = todayKey();
      let data = getStreak();
      if (data.lastPlayedDate === today) return data;   // already counted
      if (data.lastPlayedDate === yesterdayKey()) data.count = (data.count || 0) + 1;
      else data.count = 1;
      data.lastPlayedDate = today;
      localStorage.setItem('chill.streak', JSON.stringify(data));
      return data;
    } catch (_) { return { count: 1, lastPlayedDate: todayKey() }; }

  function getTop5() {
    try {

  function saveTop5(score) {
    if (score < 50) return;
    const list = getTop5();
    list.push({ score, date: Date.now() });

    const top5 = list.slice(0, 5);
    try { localStorage.setItem('chill.top5', JSON.stringify(top5)); } catch (_) {}

  // Also handles edge cases (zero hazards, new best, daily smashed, etc).
  function getPunchLine() {
    // Pick a phrasing variant — combine random + score parity so it's stable
    // for the duration of a game-over screen but differs between runs.
    const seed = (score * 31 + (runStats?.hazards || 0) * 17) | 0;
    const pick = (arr) => arr[Math.abs(seed + arr.length) % arr.length];

    // ===== EDGE-CASE LINES (these short-circuit the gap-based pick) =====

    // Zero-hazard run — playful jab
    if ((runStats?.hazards || 0) === 0 && score === 0) {
      return pick([
        'ZERO HAZARDS. TAP THE SCREEN, MAYBE?',
        'YOU DIDN\'T MOVE. ROAD WON.',
        'STILL IN PARK?',

      return pick([
        'NEW BEST. NEXT ONE\'S COMING FOR YOU.',
        'PERSONAL RECORD. NOW DEFEND IT.',
        'TOP OF YOUR OWN HILL.',
      ]);

    // Daily challenge just smashed
    const daily = getDailyChallenge();
    if (daily && !daily.achieved && score >= daily.target) {
      return pick([
        'DAILY DONE. COME BACK TOMORROW.',
        'CHALLENGE: SMASHED. SEE YOU TOMORROW.',
        'DAILY ★ COMPLETE.',
      ]);
    }
    // Max-rank player — flex
    const refScore = Math.max(score, best);
    const ri = rankIndexFor(refScore);
    if (ri === RANKS.length - 1) {
      return pick([
        'MAX RANK. NOTHING LEFT TO PROVE.',
        '★ TOP TIER. JUST FOR THE LOVE OF IT.',
        'KING OF THE ROAD. AGAIN.',
      ]);
    }

    if (!achievements.has('combo5') && runStats && runStats.maxCombo < 5) {
      candidates.push({ gap: 5 - runStats.maxCombo, label: '×2 COMBO', cat: 'combo' });

    if (!achievements.has('combo10') && runStats && runStats.maxCombo < 10) {
      candidates.push({ gap: 10 - runStats.maxCombo, label: '×4 COMBO', cat: 'combo' });
    }
    // Score milestones
    const scoreGoals = [
      { t: 100,   l: '100 PTS',  k: 's100'  },
      { t: 250,   l: '250 PTS',  k: 's250'  },
      { t: 500,   l: '500 PTS',  k: 's500'  },
      { t: 1000,  l: '1K',       k: 's1000' },
      { t: 2500,  l: '2.5K',     k: 's2500' },
      { t: 5000,  l: '5K',       k: 's5000' },
    ];
    for (const g of scoreGoals) {
      if (score < g.t && !achievements.has(g.k)) {
        candidates.push({ gap: g.t - score, label: g.l, cat: 'score' });
      }
    }
    // Next rank
    if (ri < RANKS.length - 1) {
      const next = RANKS[ri + 1];
      const gap = next.threshold - refScore;
      if (gap > 0) candidates.push({ gap, label: next.name, cat: 'rank' });
    }
    // Vehicle unlocks (use best, not score — unlock is persistent)
    if (best < 1000) candidates.push({ gap: 1000 - best, label: 'MOTO', cat: 'unlock' });
    if (best < 3000) candidates.push({ gap: 3000 - best, label: 'BUS',  cat: 'unlock' });
    // Daily challenge gap
    if (daily && !daily.achieved && score < daily.target) {
      candidates.push({ gap: daily.target - score, label: 'DAILY', cat: 'daily' });
    }
    // NEW BEST teaser
    if (score < best && best > 0) {
      candidates.push({ gap: best - score + 1, label: 'NEW BEST', cat: 'newbest' });
    }
    if (!candidates.length) return null;
    candidates.sort((a, b) => a.gap - b.gap);
    const winner = candidates[0];
    if (winner.gap > 2000) return null;

    // Per-category phrase variants — varied + on-brand
    const variants = {
      combo: [
        winner.gap + ' MORE PASSES FOR ' + winner.label,
        ' ' + winner.gap + ' SHORT OF ' + winner.label,
        'NEED ' + winner.gap + ' STREAK FOR ' + winner.label,
      ],
      score: [
        winner.gap + ' PT FROM ' + winner.label,
        'JUST ' + winner.gap + ' PT TO ' + winner.label,
        'SO CLOSE — ' + winner.gap + ' OFF ' + winner.label,
        winner.gap + ' AWAY FROM ' + winner.label,
      ],
      rank: [
        winner.gap + ' PT TO RANK ' + winner.label,
        'RANK ' + winner.label + ' IS ' + winner.gap + ' AWAY',
        'NEXT RANK ' + winner.label + ': ' + winner.gap + ' PT',
      ],
      unlock: [
        winner.gap + ' PT UNTIL ' + winner.label + ' UNLOCKS',
        'UNLOCK ' + winner.label + ': ' + winner.gap + ' PT',
        winner.gap + ' MORE FOR ' + winner.label,
      ],
      daily: [
        winner.gap + ' PT FROM TODAY\'S GOAL',
        'DAILY: ' + winner.gap + ' PT LEFT',
        'ALMOST! ' + winner.gap + ' OFF DAILY',
      ],
      newbest: [
        winner.gap + ' PT FROM NEW BEST',
        'ONLY ' + winner.gap + ' OFF NEW BEST',
        'NEW BEST IS ' + winner.gap + ' AWAY',
      ],
    };
    const bag = variants[winner.cat] || [winner.gap + ' FROM ' + winner.label];
    return bag[Math.abs(seed) % bag.length];
  }

  function blip(freq, dur, type, vol) {
    if (!audioCtx) return;
    const t = audioCtx.currentTime;
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.type = type || 'square';
    o.frequency.setValueAtTime(freq, t);
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(vol || 0.12, t + 0.01);
    g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    o.connect(g).connect(audioCtx.destination);
    o.start(t);
    o.stop(t + dur + 0.02);
  }

  // Gator hiss — short noise burst with quick decay
  function hiss() {
    if (!audioCtx) return;
    const t = audioCtx.currentTime;
    const dur = 0.35;
    const buf = audioCtx.createBuffer(1, Math.floor(audioCtx.sampleRate * dur), audioCtx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < data.length; i++) {
      data[i] = (Math.random() * 2 - 1) * (1 - i / data.length) * 0.6;
    }
    const src = audioCtx.createBufferSource();
    src.buffer = buf;
    // bandpass-ish via biquad to make it sound more like a hiss
    const filter = audioCtx.createBiquadFilter();
    filter.type = 'highpass';
    filter.frequency.value = 1800;
    const g = audioCtx.createGain();
    g.gain.setValueAtTime(0.1, t);
    g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    src.connect(filter).connect(g).connect(audioCtx.destination);
    src.start(t);
  }

    if (!tutorialActive) return true;
    tutorialActive = false;
    try { localStorage.setItem('chill.tutorial', 'done'); } catch (_) {}
    blip(740, 0.10, 'square', 0.08);
    return true;
  }

  function dismissStartScreen() {
    if (!startScreenActive) return false;
    startScreenActive = false;
    blip(740, 0.08, 'square', 0.07);
    setTimeout(() => blip(880, 0.10, 'square', 0.07), 70);
    return true;
  }

  // Floating learn-the-vocabulary tag above a sprite. Shown up to 3 times per
  // type per session — after that the player knows what it is, no more labels.
  function maybeLabel(key, text, x, y, color, relSpeed) {
    const n = labeledCounts.get(key) || 0;
    if (n >= 3) return;
    labeledCounts.set(key, n + 1);
    labels.push({
      text, x, y,
      life: 3.0, max: 3.0,    // up from 1.7s — players need time to read
      color: color || '#fff',
      relSpeed: relSpeed ?? 1,
    });
  }

  function spawn() {
    // REST BEAT — when active, road is completely clear (no spawns at all).
    // Player gets a breather + funny banner. Triggers every REST_INTERVAL pts.
    if (restBeat) return;
    // FAIRNESS RULE: There must ALWAYS be at least one drivable lane in the
    // player's reaction window. Trees and construction block 2 adjacent lanes,
    // so we must not spawn anything in the third (free) lane while one of those
    // wide hazards is still in front of the player.
    const wideAhead = obstacles.filter(o =>
      (o.type === 'tree' || o.type === 'construction') && o.y < H - CELL - 20
    );
    const mustAvoid = new Set();
    for (const o of wideAhead) {
      const startLane = Math.round((o.x - ROAD_X) / LANE_W);
      const freeLane = 3 - startLane - (startLane + 1);
      mustAvoid.add(freeLane);
    }
    // If a wide hazard is on screen, skip this spawn entirely — the player
    // already has one route to thread; don't add a second pinch.
    if (mustAvoid.size > 0) return;

    // Build the "blocked lanes" set from recent obstacles in the spawn window.
    // Wide hazards (tree/construction) count as 2 adjacent lanes; everything
    // else counts only its own lane.
    let lane = (Math.random() * LANES) | 0;
    const recent = obstacles.filter(o => o.y < 80);
    const blocked = new Set();
    for (const o of recent) {
      if (o.type === 'tree' || o.type === 'construction') {
        const startLane = Math.round((o.x - ROAD_X) / LANE_W);
        blocked.add(startLane);
        blocked.add(startLane + 1);
      } else if (o.lane >= 0) {
        blocked.add(o.lane);
      }
    }

    // Build the list of FREE lanes (the complement of `blocked`).
    const freeLanes = [];
    for (let i = 0; i < LANES; i++) {
      if (!blocked.has(i)) freeLanes.push(i);
    }
    // If there are no free lanes at all, the player has no escape — skip this
    // spawn entirely (prior code had a bug here: it would force a spawn into
    // a free lane that didn't exist, blocking the road).
    if (freeLanes.length === 0) return;
    // If our random `lane` is blocked, pick a random free one instead.
    if (blocked.has(lane)) {
      lane = freeLanes[(Math.random() * freeLanes.length) | 0];
    }
    // If only ONE free lane is left, leave it free — don't spawn at all. That
    // guarantees there's always a path through.
    if (freeLanes.length === 1 && blocked.size >= LANES - 1) return;

    // Fairness cap — too many slow-moving obstacles pile up and make the road
    // unreadable. If 1+ slow vehicle is already on screen, force a regular cone/truck.
    const slowOnScreen = obstacles.filter(o => o.y < H && (o.relSpeed ?? 1) < 0.85).length;
    if (slowOnScreen >= 1) {
      const isTruck = Math.random() < 0.22;
      if (isTruck) {
        obstacles.push({
          lane, y: -60,
          w: CELL * 2, h: CELL * 4,
          type: 'truck',
        });
      } else {
        // Skippable cone — narrow (CELL*0.9), parked at lane edge so a player
        // centered in the lane drives past without colliding.
        const sideSign = Math.random() < 0.5 ? -1 : 1;
        const coneW = CELL * 0.75;     // 18px wide collision box
        const offset = LANE_W / 2 - coneW / 2 - 2; // 4px gap from lane edge
        obstacles.push({
          lane,
          x: laneX(lane) + sideSign * offset - coneW / 2,
          y: -60,
          w: coneW, h: CELL * 2,
          type: 'cone',
        });
      }
      return;
    }

    const ck = currentCity().key;

    // Florida hazard — gator crossing slowly.
    if (ck === 'MIA' && Math.random() < 0.20) {
      obstacles.push({
        lane, y: -40,
        w: CELL * 2.4, h: CELL * 1.4,   // wider, flatter — sideways silhouette
        type: 'gator', relSpeed: 0.45,
      });
      teachSound('gator', hiss);
      maybeLabel('gator', 'GATOR!', laneX(lane), -52, '#facc15', 0.45);
      return;
    }

    // Pacific NW hazard — fallen tree blocking 2 adjacent lanes.
    // Only spawn if the remaining lane isn't already blocked nearby.
    if ((ck === 'SEA' || ck === 'PDX') && Math.random() < 0.16) {
      const startLane = Math.random() < 0.5 ? 0 : 1;
      const freeLane = startLane === 0 ? 2 : 0;
      if (!blocked.has(freeLane)) {
        obstacles.push({
          lane: -1,
          x: ROAD_X + startLane * LANE_W + 4,
          y: -30,
          w: LANE_W * 2 - 8,
          h: CELL * 1.1,
          type: 'tree', relSpeed: 1,
        });
        teachSound('tree', thud);
        maybeLabel('tree', 'FALLEN TREE',
          ROAD_X + startLane * LANE_W + LANE_W, -42, '#22c55e', 1);
        return;
      }
    }

    // OIL SLICK — wet rainbow puddle in NYC / Chicago. Doesn't damage HP but
    // FORCE-SKIDS the player into a random adjacent lane. Hard-mode only (score>=200).
    if ((ck === 'NYC' || ck === 'CHI') && score >= 200 && Math.random() < 0.05) {
      obstacles.push({
        lane, y: -20,
        w: CELL * 1.8, h: CELL * 0.9,
        type: 'oilslick', relSpeed: 1,
      });
      teachSound('oilslick', skidSound);
      maybeLabel('oilslick', 'OIL SLICK', laneX(lane), -30, '#a78bfa', 1);
      return;
    }

    // Pothole — broken asphalt in NYC / Chicago. Flat dark patch, normal scroll.
    if ((ck === 'NYC' || ck === 'CHI') && Math.random() < 0.18) {
      obstacles.push({
        lane, y: -20,
        w: CELL * 2, h: CELL,
        type: 'pothole', relSpeed: 1,
      });
      teachSound('pothole', thunk);
      maybeLabel('pothole', 'POTHOLE', laneX(lane), -30, '#9ca3af', 1);
      return;
    }

    // Deer in the road — Pacific NW (SEA/PDX) and Texas (AUS).
    // Slow scroll so player can react. Single lane, brown silhouette.
    if ((ck === 'SEA' || ck === 'PDX' || ck === 'AUS') && Math.random() < 0.12) {
      obstacles.push({
        lane, y: -50,
        w: CELL * 1.7, h: CELL * 2.2,
        type: 'deer', relSpeed: 0.5,
      });
      teachSound('deer', snort);
      maybeLabel('deer', 'DEER!', laneX(lane), -62, '#c08a3a', 0.5);
      return;
    }

    // Slow stoned hippie van — scrolls slower than the road so player overtakes.
    // Spawns everywhere with a low rate, much higher in Portland.
    const vanChance = ck === 'PDX' ? 0.22 : 0.09;
    if (Math.random() < vanChance) {
      obstacles.push({
        lane, y: -70,
        w: CELL * 2, h: CELL * 3.2,
        type: 'van', relSpeed: 0.55,
      });
      teachSound('van', groovyChord);
      maybeLabel('van', 'STONED DRIVER', laneX(lane), -82, '#a78bfa', 0.55);
      return;
    }

    // Cone cluster — 3 cones grouped, any state, low probability
    if (Math.random() < 0.06) {
      obstacles.push({
        lane, y: -40,
        w: CELL * 1.8, h: CELL * 1.6,
        type: 'cones', relSpeed: 1,
      });
      maybeLabel('cones', 'CONES', laneX(lane), -52, '#DC2626', 1);
      return;
    }

    // MOVING TRUCK — big yellow box truck with rental decals. Long body, slow. ~3%.
    if (Math.random() < 0.03) {
      obstacles.push({
        lane, y: -90,
        w: CELL * 2.1, h: CELL * 3.8,
        type: 'movingtruck', relSpeed: 0.50,
      });
      teachSound('movingtruck', dieselRumble);
      maybeLabel('movingtruck', 'MOVING TRUCK', laneX(lane), -105, '#fbbf24', 0.50);
      return;
    }

    // U-HAUL parody — orange-and-white rental truck. Slow lumbering box truck.
    if (Math.random() < 0.03) {
      obstacles.push({
        lane, y: -90,
        w: CELL * 2.1, h: CELL * 3.8,
        type: 'uhaul', relSpeed: 0.52,
      });
      teachSound('uhaul', dieselRumble);
      maybeLabel('uhaul', 'U-HALT · STUDENT MOVE', laneX(lane), -105, '#f97316', 0.52);
      return;
    }

    // SOCCER MOM SUV — silver minivan, kid-stick-figure stickers + baby-on-board diamond. ~5%.
    if (Math.random() < 0.05) {
      obstacles.push({
        lane, y: -65,
        w: CELL * 2.2, h: CELL * 3.3,
        type: 'momsuv', relSpeed: 0.60,
      });
      teachSound('momsuv', momHonk);
      maybeLabel('momsuv', 'SOCCER MOM', laneX(lane), -80, '#fde047', 0.60);
      return;
    }

    // TESLA Cybertruck — sharp chrome wedge, fast quiet electric. ~4% chance.
    if (Math.random() < 0.04) {
      obstacles.push({
        lane, y: -70,
        w: CELL * 2.1, h: CELL * 3.2,
        type: 'tesla', relSpeed: 0.78,
      });
      teachSound('tesla', teslaHum);
      maybeLabel('tesla', 'CYBERTRUCK', laneX(lane), -82, '#cfd8e8', 0.78);
      return;
    }

    // NEVERENDING CONSTRUCTION LLC — 2-lane barricade. Spawns ONLY on hard
    // game (score >= 500), and only in urban states (NYC/CHI/LA/SF/BOS).
    // Same fairness rules as fallen tree: never spawns if free lane is blocked.
    if (score >= 500 &&
        (ck === 'NYC' || ck === 'CHI' || ck === 'LA' || ck === 'SF' || ck === 'BOS') &&
        Math.random() < 0.08) {
      const startLane = Math.random() < 0.5 ? 0 : 1;
      const freeLane = startLane === 0 ? 2 : 0;
      if (!blocked.has(freeLane)) {
        obstacles.push({
          lane: -1,
          x: ROAD_X + startLane * LANE_W + 4,
          y: -50,
          w: LANE_W * 2 - 8,
          h: CELL * 2.0,
          type: 'construction', relSpeed: 1,
        });
        teachSound('construction', dieselRumble);
        maybeLabel('construction', 'NEVERENDING LLC',
          ROAD_X + startLane * LANE_W + LANE_W, -62, '#facc15', 1);
        return;
      }
    }

    // PRIUS — silver hybrid hatchback driving slow & polite. ~6% chance.
    if (Math.random() < 0.06) {
      obstacles.push({
        lane, y: -65,
        w: CELL * 2, h: CELL * 3,
        type: 'prius', relSpeed: 0.55,
      });
      teachSound('prius', priusWhine);
      maybeLabel('prius', 'PRIUS', laneX(lane), -78, '#22c55e', 0.55);
      return;
    }

    // CRAZY BIMMER — black sedan signals LEFT but actually swaps RIGHT (or vice
    // versa). Joke obstacle + tactical surprise: don't trust the blinker.
    // Has a persistent "CRAZY BIMMER" name tag drawn above the car (see drawBMW)
    // so players always recognize who just cut them off.
    if (Math.random() < 0.05) {
      // pick a swap direction the Bimmer will actually take (toward a valid lane)
      const tryDirs = lane === 0 ? [1] : lane === LANES - 1 ? [-1] : (Math.random() < 0.5 ? [-1, 1] : [1, -1]);
      const actualDir = tryDirs[0];
      const signalSide = actualDir === 1 ? 'L' : 'R';   // OPPOSITE of actual move
      obstacles.push({
        lane, y: -70,
        w: CELL * 2, h: CELL * 3,
        type: 'bmw', relSpeed: 0.75,
        // Slower windup so player has more reaction time when they see the Bimmer
        swapDelay: 1.9 + Math.random() * 0.7,
        actualDir, signalSide,
        startLane: lane,
        swapped: false,
        swapAnimT: 0,    // ramps 0→1 during the swap animation
      });
      teachSound('bmw', turnClick);
      return;
    }

    // CRAZY TRAILER — sketchy tow rig swerving lane-to-lane. Tiny cab + big
    // wobbling cargo box; visibly unstable, screechy tire noise.
    if (Math.random() < 0.04) {
      obstacles.push({
        lane, y: -90,
        w: CELL * 2, h: CELL * 4.2,
        type: 'crazytrailer', relSpeed: 0.55,
        wobblePhase: Math.random() * Math.PI * 2,
      });
      teachSound('crazytrailer', skidSound);
      maybeLabel('crazytrailer', 'SKETCHY TRAILER!', laneX(lane), -102, '#fb923c', 0.55);
      return;
    }

    // DRIFTER — spinning sports car doing donuts, slow scroll. Rare ~3%.
    if (Math.random() < 0.03) {
      obstacles.push({
        lane, y: -70,
        w: CELL * 2, h: CELL * 2.5,
        type: 'drifter', relSpeed: 0.6,
        spinPhase: Math.random() * Math.PI * 2,
      });
      teachSound('drifter', revEngine);
      maybeLabel('drifter', 'YOUNG DRIFTER', laneX(lane), -82, '#ef4444', 0.6);
      return;
    }

    // Federal — POLICE (Crown Vic) or ICE (dark-green SUV). Slow NPC vehicles
    // you overtake. ~10% globally, 45/55 ICE vs local police (moderately bumped from 7% / 35%).
    if (Math.random() < 0.10) {
      const isICE = Math.random() < 0.45;
      obstacles.push({
        lane, y: -70,
        w: CELL * 2, h: CELL * 3.4,
        type: isICE ? 'ice' : 'police',
        relSpeed: 0.68,
      });
      if (isICE) {
        teachSound('ice', siren);
        maybeLabel('ice', 'ICE · CHECK PERMIT', laneX(lane), -82, '#22c55e', 0.68);
      } else {
        teachSound('police', siren);
        maybeLabel('police', 'POLICE · GO STUDY', laneX(lane), -82, '#3b82f6', 0.68);
      }
      return;
    }

    // Default — cone (skippable) or truck.
    const isTruck = Math.random() < 0.22;
    if (isTruck) {
      obstacles.push({
        lane, y: -60,
        w: CELL * 2, h: CELL * 4,
        type: 'truck',
      });
    } else {
      // Skippable cone at lane edge — narrow collision box, player drives past
      // when centered. Random side per cone for variety.
      const sideSign = Math.random() < 0.5 ? -1 : 1;
      const coneW = CELL * 0.75;
      const offset = LANE_W / 2 - coneW / 2 - 2;
      obstacles.push({
        lane,
        x: laneX(lane) + sideSign * offset - coneW / 2,
        y: -60,
        w: coneW, h: CELL * 2,
        type: 'cone',
      });
    }
  }

  function spawnCoin() {
    const nearY = 140;
    const taken = new Set([
      ...obstacles.filter(o => o.y < nearY).map(o => o.lane),
      ...coins.filter(c => c.y < nearY).map(c => c.lane),
    ]);
    const free = [];
    for (let i = 0; i < LANES; i++) if (!taken.has(i)) free.push(i);
    if (!free.length) return;
    const lane = free[(Math.random() * free.length) | 0];
    // ~5% mystery gold coin worth 4× normal — rare slot-jackpot vibe
    // ~2% boost star — rarer, gives ×2 speed + invuln for 3s
    // ~4% cash stack — green $$$, +100 pts, "GOT THE CASH SKIPPER"
    // ~2% license card — blue DMV card, +500 pts + 1 HP, "GOT YOUR LICENSE"
    //   (bumped from 1% to 2% so 5/5 WIN is achievable in ~10-15 min)
    const roll = Math.random();
    const mystery = roll < 0.05;
    const boost   = !mystery && roll < 0.07;
    const cash    = !mystery && !boost && roll < 0.11;
    const license = !mystery && !boost && !cash && roll < 0.13;
    coins.push({ lane, y: -20, picked: false, mystery, boost, cash, license });
  }

  let signSideAlt = 0;
  function spawnSign() {
    signSideAlt = 1 - signSideAlt;
    const bank = currentCity().signs;
    // Mix: ~22% Americana billboard humor, ~18% DMVSOS brand, rest = local city.
    const r = Math.random();
    let text, kind;
    // 5% chance: roadside MAILBOX (small Americana prop)
    if (r < 0.05) {
      const nums = ['101', '420', '666', '1776', '99', '7-11', 'RT 66'];
      text = nums[(Math.random() * nums.length) | 0];
      kind = 'mailbox';
    }
    // 7% chance: VOTE EXAMSKIPPER campaign yard sign
    else if (r < 0.12) {
      const lines = [
        'VOTE EXAMSKIPPER',
        'I VOTED EXAMSKIPPER',
        'SKIPPER 4 PREZ 3000',
        'EXAMSKIPPER · FOR THE PEOPLE',
        'YES TO SKIPPING',
      ];
      text = lines[(Math.random() * lines.length) | 0];
      kind = 'vote';
    }
    // 8% chance: classic green US highway EXIT sign
    else if (r < 0.20) {
      const exitNum = 1 + Math.floor(Math.random() * 99);
      const letter = Math.random() < 0.4 ? (Math.random() < 0.5 ? 'A' : 'B') : '';
      text = 'EXIT ' + exitNum + letter;
      kind = 'exit';
    } else if (r < 0.32) {
      // 12% chance: special "M" logo billboard (McDowells parody)
      text = 'M';
      kind = 'mlogo';
    } else if (r < 0.55) {
      // 23% chance: Americana parody billboard
      text = BILLBOARD_SIGNS[(Math.random() * BILLBOARD_SIGNS.length) | 0];
      kind = 'billboard';
    } else if (r < 0.70) {
      // 15% chance: DMVSOS brand sign
      text = BRAND_SIGNS[(Math.random() * BRAND_SIGNS.length) | 0];
      kind = 'brand';
    } else {
      // 30% rest: local city sign
      text = bank[(Math.random() * bank.length) | 0];
      kind = 'local';
    }
    signs.push({
      side: signSideAlt ? 'R' : 'L',
      y: -28,
      text,
      kind,
      accent: currentCity().accent,
    });
  }

  let landmarkSideAlt = 1;
  function spawnLandmark() {
    landmarkSideAlt = 1 - landmarkSideAlt;
    const c = currentCity();
    // 35% of roadside spawns are props (broken RV / hippie trailer) instead of
    // the city's marquee landmark — Portland leans harder into the trailer.
    let type = c.landmark;
    const r = Math.random();
    if (c.key === 'PDX') {
      if (r < 0.30)      type = 'trailer';
      else if (r < 0.45) type = 'rv';
    } else {
      if (r < 0.18)      type = 'rv';
      else if (r < 0.30) type = 'trailer';
    }
    landmarks.push({
      side: landmarkSideAlt ? 'R' : 'L',
      y: -36,
      type,
      accent: c.accent,
    });
    if (type === 'rv' || type === 'trailer') {
      const side = landmarkSideAlt ? 'R' : 'L';
      const cx = shoulderX(side, 28) + 14;
      const text = type === 'rv' ? 'BROKE-DOWN RV' : 'HIPPIE TRAILER';
      const color = type === 'rv' ? '#DC2626' : '#facc15';
      teachSound(type, type === 'rv' ? sputter : chime);
      maybeLabel(type, text, cx, -48, color, 0.85);
    }
  }

  function update(dt) {
    if (!alive || paused || tutorialActive || startScreenActive) return;
    // Brake mechanic — when held, world time slows ×BRAKE_FACTOR.
    // elapsed grows slower → score, speed ramp, city changes, spawn cadence all slow.
    const brakeMul = braking ? BRAKE_FACTOR : 1;
    elapsed += dt * brakeMul;
    score = Math.floor(elapsed * 10 + pickedCoinBonus);
    // Slowed baseline speed — user feedback: "the SLOW pace is nice".
    // Was 130 + min(elapsed*7, 260) = 130-390 px/s. Now ~100-260 px/s.
    speed = 100 + Math.min(elapsed * 5, 160);
    // ONBOARDING — first 12s of player's very first game ever are gentler
    if (onboardingRamp > 0) {
      onboardingRamp = Math.max(0, onboardingRamp - dt);
      const tOn = 1 - (onboardingRamp / ONBOARDING_DUR);
      speed *= 0.55 + tOn * 0.45;   // 0.55 → 1.0 across the 12s
    }
    // BOOST — ×2 speed window from picking up a shooting star
    if (boostT > 0) {
      boostT = Math.max(0, boostT - dt);
      speed *= 2;
    }
    // REPAIR PROMPT — tick down; expire when life runs out (player didn't
    // tap enough times in the window).
    if (repairPrompt) {
      repairPrompt.life -= dt;
      if (repairPrompt.life <= 0) repairPrompt = null;
    }
    // LICENSE FLASH — fades the most-recent slot's glow over ~1s after pickup
    if (licenseFlashT > 0) licenseFlashT = Math.max(0, licenseFlashT - dt);
    // REST BEAT — tick down; trigger a new one every REST_INTERVAL pts.
    if (restBeat) {
      restBeat.life -= dt;
      if (restBeat.life <= 0) restBeat = null;
    } else if (score >= lastRestScore + REST_INTERVAL) {
      lastRestScore = Math.floor(score / REST_INTERVAL) * REST_INTERVAL;
      restBeat = {
        life: REST_DUR, max: REST_DUR,
        text: REST_MESSAGES[(Math.random() * REST_MESSAGES.length) | 0],
      };
      // gentle chime so the player hears the breather start
      blip(660, 0.10, 'triangle', 0.08);
      setTimeout(() => blip(880, 0.12, 'triangle', 0.08), 90);
    }

    // District transition: every CITY_DURATION seconds switch city + show banner.
    const newCityIdx = Math.floor(elapsed / CITY_DURATION) % CITIES.length;
    if (newCityIdx !== cityIdx) {
      // Close out the state we're leaving — store its score-gain best
      if (prevStateKey) setStateBest(prevStateKey, score - stateEntryScore);
      cityIdx = newCityIdx;
      bannerCity = currentCity();
      bannerTimer = 2.6;
      prevStateKey = bannerCity.key;
      stateEntryScore = score;
      // flash this state's previous best (if any)
      const stBest = getStateBests()[bannerCity.key] || 0;
      if (stBest > 0) {
        stateBestFlash = {
          text: bannerCity.key + ' BEST: ' + stBest,
          color: bannerCity.accent,
          life: 3.0, max: 3.0,
        };
      } else {
        stateBestFlash = {
          text: bannerCity.key + ' · FIRST VISIT',
          color: bannerCity.accent,
          life: 3.0, max: 3.0,
        };
      }
      // in-world arch sign — scrolls down the road over the player's car
      archSigns.push({ y: -56, city: bannerCity });
      // ease back into action so the player can read the arch + new landmarks
      cityEnterRamp = ENTER_RAMP_DUR;
      blip(620, 0.12, 'square', 0.1);
      vibe(12);
    }
    if (stateBestFlash) {
      stateBestFlash.life -= dt;
      if (stateBestFlash.life <= 0) stateBestFlash = null;
    }
    if (bannerTimer > 0) bannerTimer = Math.max(0, bannerTimer - dt);
    if (cityEnterRamp > 0) cityEnterRamp = Math.max(0, cityEnterRamp - dt);

    // 0.45 (right at transition) → 1.0 (after ENTER_RAMP_DUR) with ease-out
    const rampT = 1 - cityEnterRamp / ENTER_RAMP_DUR;
    const rampEase = rampT * (2 - rampT);
    const scrollFactor = ENTER_RAMP_MIN + (1 - ENTER_RAMP_MIN) * rampEase;

    // spawn timers tick at the scroll rate — slower during ease-in AND brake
    const sdt = dt * scrollFactor * brakeMul;

    spawnT -= sdt;
    // Easier difficulty curve: more breathing room between obstacles. Starts at
    // 1.4s, ramps slowly, bottoms out at 0.75s (was 0.55 — felt too cramped).
    const cadence = Math.max(0.75, 1.4 - elapsed * 0.011);
    if (spawnT <= 0) { spawn(); spawnT = cadence; }

    coinSpawnT -= sdt;
    if (coinSpawnT <= 0) { spawnCoin(); coinSpawnT = 1.6 + Math.random() * 1.2; }

    signSpawnT -= sdt;
    if (signSpawnT <= 0) { spawnSign(); signSpawnT = 1.2 + Math.random() * 1.0; }

    landmarkSpawnT -= sdt;
    if (landmarkSpawnT <= 0) { spawnLandmark(); landmarkSpawnT = 2.6 + Math.random() * 1.8; }

    scrollY = (scrollY + speed * sdt) % 40;

    const tx = laneX(carLane);
    carXSmooth += (tx - carXSmooth) * Math.min(1, dt * 35);

    {
      const carBottomY = H - CELL;
      const carHalfW = (VEHICLES[vehicleKey].w * CELL) / 2;
      const carLeft = carXSmooth - carHalfW;
      const carRight = carXSmooth + carHalfW;
      for (const o of obstacles) {
        o.y += speed * sdt * (o.relSpeed ?? 1);
        // BMW — wait swapDelay, then animate lane change in opposite direction of signal
        if (o.type === 'bmw') {
          if (!o.swapped) {
            o.swapDelay -= dt;
            if (o.swapDelay <= 0) {
              const targetLane = Math.max(0, Math.min(LANES - 1, o.lane + o.actualDir));
              // Don't slam into an obstacle already in the destination lane
              const destBlocked = obstacles.some(other =>
                other !== o &&
                other.lane === targetLane &&
                Math.abs(other.y - o.y) < 70
              );
              if (destBlocked || targetLane === o.lane) {
                // abort the swap — BMW stays the course (player wins this round)
                o.swapped = true;
                o.swapAnimT = 0;
              } else {
                o.startLane = o.lane;
                o.lane = targetLane;
                o.swapped = true;
                o.swapAnimT = 0.45;
              }
            }
          }
          if (o.swapAnimT > 0) o.swapAnimT = Math.max(0, o.swapAnimT - dt);
          // Set explicit o.x so collision tracks the BMW visually during the swap
          const baseX = laneX(o.lane) - o.w / 2;
          if (o.swapAnimT > 0) {
            const startX = laneX(o.startLane) - o.w / 2;
            const tProg = 1 - (o.swapAnimT / 0.45);
            const ease = tProg * tProg * (3 - 2 * tProg);
            o.x = startX + (baseX - startX) * ease;
          } else {
            o.x = baseX;
          }
        }
        // drifter — emit constant tire smoke from its center
        if (o.type === 'drifter' && Math.random() < dt * 22) {
          const dx = (o.x !== undefined ? o.x : laneX(o.lane) - o.w / 2) + o.w / 2;
          dust.push({
            x: dx + (Math.random() - 0.5) * o.w * 1.2,
            y: o.y + o.h / 2 + (Math.random() - 0.5) * o.h * 0.7,
            life: 0.7, max: 0.7,
            w: 3 + ((Math.random() * 2) | 0),
            kind: 'exhaust',
          });
        }
        // safely passed the player — grow combo, award scaled bonus
        if (!o.passed && o.y > carBottomY) {
          o.passed = true;
          combo++;
          runStats.hazards++;
          if (combo > runStats.maxCombo) runStats.maxCombo = combo;
          const mult = 1 + Math.floor((combo - 1) / 3);
          let bonus = 8 * mult;

          // Close-call detection — minimum horizontal gap between car and obstacle
          const ox = o.x !== undefined ? o.x : laneX(o.lane) - o.w / 2;
          const obLeft = ox;
          const obRight = ox + o.w;
          const gap = Math.max(carLeft - obRight, obLeft - carRight);
          const closeBy = gap > 0 && gap <= 12;
          if (closeBy) {
            const closeBonus = 20 * mult;
            bonus += closeBonus;
            runStats.closeCalls++;
            popups.push({
              x: carXSmooth,
              y: carBottomY - 24,
              vy: -68,
              text: 'CLOSE! +' + closeBonus,
              color: '#5ee08b',
              big: true,
              life: 1.3, max: 1.3,
            });
            blip(880,  0.05, 'triangle', 0.07);
            setTimeout(() => blip(1175, 0.10, 'triangle', 0.07), 50);
            vibe([10, 5, 25]);
          }

          pickedCoinBonus += bonus;
          // floating "+N ×M" popup at the obstacle's last position — slot-style feedback
          const centerX = o.x !== undefined ? o.x + o.w / 2 : laneX(o.lane);
          popups.push({
            x: centerX,
            y: carBottomY - 4,
            vy: -42,
            text: mult > 1 ? '+' + bonus + ' ×' + mult : '+' + bonus,
            color: mult >= 3 ? '#facc15' : mult >= 2 ? '#5ee08b' : '#cfd8e8',
            big: mult >= 2,
            life: 1.0, max: 1.0,
          });
          // milestone audio + flash + confetti on multiplier change (every 3 passes)
          if (combo % 3 === 0) {
            blip(620 + Math.min(combo, 30) * 18, 0.09, 'triangle', 0.06);
            comboFlashT = 0.6;
            // tiny focused burst — 8 particles, not noise
            spawnConfetti(carXSmooth, H - CELL - 4, 8, ['#facc15', '#fde047']);
          }
        }
      }
    }
    obstacles = obstacles.filter(o => o.y < H + 80);
    if (comboFlashT > 0) comboFlashT = Math.max(0, comboFlashT - dt);
    // floating score popups — slot-machine style number-pop feedback
    for (const p of popups) {
      p.y += p.vy * dt;
      p.life -= dt;
      p.vy *= 0.985;   // gentle deceleration
    }
    popups = popups.filter(p => p.life > 0);
    // confetti coin shower
    for (const cf of confetti) {
      cf.x += cf.vx * dt;
      cf.y += cf.vy * dt;
      cf.vy += 220 * dt;   // gravity
      cf.spin += cf.spinVel * dt;
      cf.life -= dt;
    }
    confetti = confetti.filter(cf => cf.life > 0 && cf.y < H + 24);
    // achievement banner timer
    if (achievementBanner) {
      achievementBanner.life -= dt;
      if (achievementBanner.life <= 0) achievementBanner = null;
    }
    checkAchievements();

    for (const c of coins) c.y += speed * sdt;
    coins = coins.filter(c => c.y < H + 30 && !c.picked);

    // signs + landmarks scroll a touch slower for parallax depth
    for (const s of signs) s.y += speed * sdt * 0.85;
    signs = signs.filter(s => s.y < H + 30);
    for (const l of landmarks) l.y += speed * sdt * 0.85;
    landmarks = landmarks.filter(l => l.y < H + 50);

    // floating learn-the-vocabulary labels — track their parent's relSpeed
    for (const lb of labels) {
      lb.y += speed * sdt * (lb.relSpeed ?? 1);
      lb.life -= dt;
    }
    labels = labels.filter(lb => lb.life > 0 && lb.y < H + 20);

    // in-world arch signs — scroll at full road speed (but eased during ramp)
    for (const a of archSigns) a.y += speed * sdt;
    archSigns = archSigns.filter(a => a.y < H + 60);

    // NYC blowing trash scraps — newspaper / wrapper / dark scrap flutter horizontally
    {
      const ckTR = currentCity().key;
      if (ckTR === 'NYC') {
        // ~6 scraps per second on average
        if (Math.random() < dt * 6) {
          const fromLeft = Math.random() < 0.5;
          const r = Math.random();
          trashScraps.push({
            x: fromLeft ? -8 : W + 8,
            y: Math.random() * (H - HUD_H) + HUD_H,
            vx: (fromLeft ? 1 : -1) * (45 + Math.random() * 55),
            vy: (Math.random() - 0.5) * 14,
            shade: r < 0.5 ? '#3a3f4a'         // dark scrap (most common)
                 : r < 0.78 ? '#7a8aa8'         // grey newspaper
                 : r < 0.92 ? '#facc15'         // yellow taxi-flier
                 : '#b91c1c',                   // red wrapper
            w: 2 + ((Math.random() * 3) | 0),
            h: 1 + ((Math.random() * 2) | 0),
            flutter: Math.random() * Math.PI * 2,
            life: 4.5, max: 4.5,
          });
        }
      }
      for (const ts of trashScraps) {
        ts.x += ts.vx * dt;
        ts.y += ts.vy * dt + Math.sin(elapsed * 5 + ts.flutter) * 0.55;
        ts.life -= dt;
      }
      trashScraps = trashScraps.filter(ts => ts.life > 0 && ts.x > -12 && ts.x < W + 12);
    }

    // Austin tumbleweeds — occasionally roll across the road horizontally
    {
      const ckTW = currentCity().key;
      if (ckTW === 'AUS') {
        // ~one new tumbleweed every 4-7 seconds
        if (Math.random() < dt * 0.18) {
          const fromLeft = Math.random() < 0.5;
          tumbleweeds.push({
            baseY: H * (0.55 + Math.random() * 0.20),
            x: fromLeft ? -10 : W + 10,
            vx: (fromLeft ? 1 : -1) * (70 + Math.random() * 40),
            rot: 0,
            life: 5.5, max: 5.5,
          });
        }
      }
      for (const tw of tumbleweeds) {
        tw.x += tw.vx * dt;
        tw.rot += dt * (Math.abs(tw.vx) / 9);
        tw.life -= dt;
      }
      tumbleweeds = tumbleweeds.filter(tw => tw.life > 0 && tw.x > -20 && tw.x < W + 20);
    }

    // PNW leaves OR Denver snow — same particle system, state-specific shade/speed
    {
      const ck2 = currentCity().key;
      if (ck2 === 'SEA' || ck2 === 'PDX') {
        // green leaves
        if (Math.random() < dt * 7) {
          leaves.push({
            x: Math.random() * W,
            y: -6,
            vx: (Math.random() - 0.5) * 26,
            vy: 28 + Math.random() * 22,
            shade: Math.random() < 0.55 ? '#22c55e'
                 : Math.random() < 0.7  ? '#0f3d1f'
                 : '#a3b948',
            life: 7, max: 7,
          });
        }
      } else if (ck2 === 'DEN') {
        // white snowflakes — denser, slower, lighter drift
        if (Math.random() < dt * 11) {
          leaves.push({
            x: Math.random() * W,
            y: -4,
            vx: (Math.random() - 0.5) * 14,
            vy: 16 + Math.random() * 14,
            shade: Math.random() < 0.5 ? '#fff'
                 : Math.random() < 0.8 ? '#e7decf'
                 : '#cfd8e8',
            life: 8, max: 8,
          });
        }
      } else if (ck2 === 'NOLA') {
        // golden fireflies — slow erratic drift, pulsing glow, may go upward
        if (Math.random() < dt * 4) {
          leaves.push({
            x: Math.random() * W,
            y: Math.random() * (H - HUD_H - 80) + HUD_H + 20,
            vx: (Math.random() - 0.5) * 18,
            vy: (Math.random() - 0.5) * 14 - 4,
            shade: '#fde047',
            glow: true,
            blink: Math.random() * Math.PI * 2,
            life: 6, max: 6,
          });
        }
      } else if (ck2 === 'BOS') {
        // Boston harbor seagulls — soar across the sky with wing-flap
        if (Math.random() < dt * 2.5) {
          const fromLeft = Math.random() < 0.5;
          leaves.push({
            x: fromLeft ? -8 : W + 8,
            y: Math.random() * (H * 0.32) + HUD_H + 8,
            vx: (fromLeft ? 1 : -1) * (55 + Math.random() * 35),
            vy: (Math.random() - 0.5) * 4,
            flap: Math.random() * Math.PI * 2,
            gull: true,
            shade: '#e7decf',
            life: 10, max: 10,
          });
        }
      }
      for (const lf of leaves) {
        lf.x += lf.vx * dt;
        lf.y += lf.vy * dt + speed * sdt * 0.25;   // partial road-scroll
        lf.life -= dt;
      }
      leaves = leaves.filter(lf => lf.life > 0 && lf.y < H + 8 && lf.x > -8 && lf.x < W + 8);
    }

    // dust trail behind car
    if (Math.random() < 0.55) {
      const v = VEHICLES[vehicleKey];
      const halfW = (v.w * CELL) / 2;
      dust.push({
        x: carXSmooth + (Math.random() * halfW * 1.2 - halfW * 0.6),
        y: H - CELL - 2 + Math.random() * 3,
        life: 0.5, max: 0.5,
        w: 2 + ((Math.random() * 2) | 0),
      });
    }
    // MOTO has its own exhaust puffs — darker, bigger, rising instead of falling
    if (vehicleKey === 'moto' && Math.random() < (boostT > 0 ? 0.8 : 0.42)) {
      dust.push({
        x: carXSmooth + (Math.random() - 0.5) * 5,
        y: H - CELL,
        life: boostT > 0 ? 0.7 : 0.85,
        max: boostT > 0 ? 0.7 : 0.85,
        w: 3 + ((Math.random() * 2) | 0),
        kind: boostT > 0 ? 'rainbow' : 'exhaust',
      });
    }
    // Vegas — golden neon afterimage trail behind any vehicle
    if (currentCity().key === 'LV' && Math.random() < 0.7) {
      const v2 = VEHICLES[vehicleKey];
      const halfW2 = (v2.w * CELL) / 2;
      dust.push({
        x: carXSmooth + (Math.random() - 0.5) * halfW2 * 1.4,
        y: H - CELL - 1 + Math.random() * 2,
        life: 0.95, max: 0.95,
        w: 3 + ((Math.random() * 2) | 0),
        kind: 'neon',
      });
    }
    for (const d of dust) {
      d.life -= dt;
      d.y += (d.kind === 'exhaust' ? -14
            : d.kind === 'rainbow' ? -22
            : d.kind === 'neon'    ?   8
            :                          18) * dt;
      if (d.kind === 'exhaust' || d.kind === 'rainbow') {
        d.x += (Math.random() - 0.5) * 0.8;
      }
    }
    dust = dust.filter(d => d.life > 0);

    const carW = vehW(), carH = vehH();
    const cx = carXSmooth - carW / 2;
    const cy = H - carH - CELL;

    // coin pickup
    for (const c of coins) {
      if (c.picked) continue;
      const cs = c.mystery ? 14 : 10;
      const cox = laneX(c.lane) - cs / 2;
      if (cx < cox + cs && cx + carW > cox && cy < c.y + cs && cy + carH > c.y) {
        c.picked = true;
        runStats.coins++;
        // BOOST STAR pickup — separate handling, no normal coin bonus
        if (c.boost) {
          boostT = BOOST_DUR;
          invulnT = Math.max(invulnT, BOOST_DUR);
          pickedCoinBonus += 100;
          popups.push({
            x: laneX(c.lane),
            y: c.y - 2,
            vy: -85,
            text: '★ BOOST ×2 ★',
            color: '#facc15',
            big: true,
            life: 1.6, max: 1.6,
          });
          // rising 5-note arpeggio
          blip(523, 0.08, 'sine', 0.10);
          setTimeout(() => blip(659, 0.08, 'sine', 0.10), 70);
          setTimeout(() => blip(784, 0.10, 'sine', 0.10), 140);
          setTimeout(() => blip(1047, 0.12, 'sine', 0.10), 220);
          setTimeout(() => blip(1568, 0.20, 'sine', 0.10), 320);
          vibe([40, 30, 80]);
          spawnConfetti(laneX(c.lane), c.y + 4, 20, ['#facc15', '#fde047', '#fff', '#ffe788']);
          continue;
        }
        if (c.mystery) runStats.jackpots++;
        // CASH pickup — green stack, +100, big skipper-themed popup
        if (c.cash) {
          pickedCoinBonus += 100;
          runStats.cash++;
          const cashLines = [
            'GOT THE CASH, SKIPPER!',
            "SKIPPER'S RICH NOW · +$100",
            'CASH FOR DMVSOS!',
            'STACKS ON STACKS · +100',
            'DMVSOS PRO MEMBERSHIP · +$100',
            'PAY DMVSOS · GET LICENSE',
          ];
          popups.push({
            x: laneX(c.lane), y: c.y - 2, vy: -65,
            text: cashLines[(Math.random() * cashLines.length) | 0],
            color: '#22c55e',
            big: true,
            life: 1.6, max: 1.6,
          });
          spawnConfetti(laneX(c.lane), c.y + 5, 16, ['#22c55e', '#86efac', '#fde047', '#fff']);
          // double cha-ching
          blip(660, 0.08, 'square', 0.12);
          setTimeout(() => blip(880, 0.10, 'square', 0.12), 70);
          setTimeout(() => blip(1320, 0.10, 'triangle', 0.12), 140);
          vibe([20, 30, 40]);
        }
        // LICENSE pickup — blue DMV card, +500 + 1 HP, mega-popup
        else if (c.license) {
          pickedCoinBonus += 500;
          if (playerHP < PLAYER_MAX_HP) playerHP++;
          licensesGot++;
          licenseFlashT = 1;   // freshly-collected slot glows for ~1s
          const remaining = LICENSES_TO_WIN - licensesGot;
          let licText;
          if (licensesGot >= LICENSES_TO_WIN) {
            licText = '★ ALL 5 LICENSES! ★';
          } else {
            const licLines = [
              `LICENSE ${licensesGot}/${LICENSES_TO_WIN} · ${remaining} MORE!`,
              `GOT LICENSE ${licensesGot}/${LICENSES_TO_WIN}, SKIPPER!`,
              `${remaining} MORE LICENSES TO WIN`,
              'OFFICIAL DRIVER · +$500 + HP',
              `LICENSED ${licensesGot}/${LICENSES_TO_WIN}`,
            ];
            licText = licLines[(Math.random() * licLines.length) | 0];
          }
          popups.push({
            x: laneX(c.lane), y: c.y - 2, vy: -75,
            text: licText,
            color: '#3b82f6',
            big: true,
            life: 2.0, max: 2.0,
          });
          spawnConfetti(laneX(c.lane), c.y + 5, 28, ['#3b82f6', '#60a5fa', '#fff', '#fde047']);
          // grand fanfare
          blip(523, 0.10, 'triangle', 0.12);
          setTimeout(() => blip(659, 0.10, 'triangle', 0.12), 80);
          setTimeout(() => blip(784, 0.12, 'triangle', 0.12), 160);
          setTimeout(() => blip(1047, 0.18, 'sine', 0.14), 260);
          vibe([40, 30, 60, 30, 80]);
          // WIN — 5th license collected
          if (licensesGot >= LICENSES_TO_WIN) {
            // small delay so the pickup popup is visible before win screen takes over
            setTimeout(() => { if (alive) winGame(); }, 600);
          }
        }
        else {
          const bonus = c.mystery ? 200 : 50;
          pickedCoinBonus += bonus;
          popups.push({
            x: laneX(c.lane),
            y: c.y - 2,
            vy: c.mystery ? -72 : -55,
            text: c.mystery ? 'JACKPOT +200' : '+50',
            color: c.mystery ? '#f59e0b' : '#facc15',
            big: true,
            life: c.mystery ? 1.5 : 1.0,
            max:  c.mystery ? 1.5 : 1.0,
          });
          if (c.mystery) {
            chaChing();
            spawnConfetti(laneX(c.lane), c.y + 5, 12, ['#facc15', '#fde047', '#f59e0b']);
            vibe([30, 20, 50]);
          } else {
            blip(880, 0.08, 'square', 0.14);
            vibe(18);
          }
        }
      }
    }

    // obstacle collision — skip if invulnerable; survive non-fatal hits
    if (invulnT > 0) {
      invulnT = Math.max(0, invulnT - dt);
    } else {
      for (const o of obstacles) {
        const ox = o.x !== undefined ? o.x : laneX(o.lane) - o.w / 2;
        const pad = 2;
        if (cx + pad < ox + o.w - pad &&
            cx + carW - pad > ox + pad &&
            cy + pad < o.y + o.h - pad &&
            cy + carH - pad > o.y + pad) {
          // OIL SLICK — no HP damage, force-skid to an adjacent lane
          if (o.type === 'oilslick') {
            const dir = Math.random() < 0.5 ? -1 : 1;
            const newLane = Math.max(0, Math.min(LANES - 1, carLane + dir));
            if (newLane === carLane) {
              // can't go that way (edge of road) — try the other side
              carLane = Math.max(0, Math.min(LANES - 1, carLane - dir));
            } else {
              carLane = newLane;
            }
            popups.push({
              x: carXSmooth, y: H - CELL - 28, vy: -55,
              text: 'SKID!',
              color: '#a78bfa',
              big: true,
              life: 1.3, max: 1.3,
            });
            skidSound();
            vibe([20, 30, 20]);
            // short invuln so player isn't smacked again instantly
            invulnT = 0.5;
            o.y = H + 40;  // remove from screen
            continue;       // don't end the loop — check other obstacles
          }
          if (playerHP > 1) {
            playerHP--;
            invulnT = INVULN_DUR;
            combo = 0;          // collision breaks combo streak
            comboFlashT = 0;
            // strong feedback: shake, low buzz, vibrate, popup
            canvas.classList.remove('shake');
            void canvas.offsetWidth;
            canvas.classList.add('shake');
            buzz(140, 0.30);
            vibe([40, 80, 40]);
            // Hazard-specific popup text so the player understands what hit them
            let hitText = '−1 HP  (' + playerHP + ' LEFT)';
            let hitColor = '#DC2626';
            if (o.type === 'gator') {
              hitText = '🐊 GATOR SPLAT!  −1 HP';
              hitColor = '#5ee08b';
              spawnConfetti(carXSmooth, H - CELL - 8, 18,
                ['#3f5a2a', '#7a1818', '#facc15', '#5ee08b']);
            } else if (o.type === 'tree')         hitText = 'TIMBER! · −1 HP';
            else if (o.type === 'pothole')        hitText = 'POTHOLE! · −1 HP';
            else if (o.type === 'deer')           hitText = 'BAMBI! · −1 HP';
            else if (o.type === 'construction')   hitText = 'NEVERENDING LLC · −1 HP';
            else if (o.type === 'cone')           hitText = 'CLIPPED A CONE · −1 HP';
            else if (o.type === 'movingtruck')    hitText = 'BIG TRUCK! · −1 HP';
            popups.push({
              x: carXSmooth,
              y: H - CELL - 28,
              vy: -55,
              text: hitText,
              color: hitColor,
              big: true,
              life: 1.8, max: 1.8,
            });
            // REPAIR PROMPT — give the player a chance to recover the HP via
            // a quick 3-tap mini-game. One-shot, expires after REPAIR_WIN sec.
            repairPrompt = {
              life: REPAIR_WIN, max: REPAIR_WIN,
              hpToRestore: 1,
              taps: 0, needed: REPAIR_TAPS,
            };
            // displace obstacle off the player so we don't double-hit next frame
            o.y = H + 40;
          } else {
            die();
          }
          break;
        }
      }
    }
  }

  // Spawn a confetti burst from (x,y) — gold particles arcing up with gravity
  function spawnConfetti(x, y, count, palette) {
    for (let i = 0; i < count; i++) {
      const angle = -Math.PI / 2 + (Math.random() - 0.5) * Math.PI * 1.1;
      const sp = 90 + Math.random() * 110;
      confetti.push({
        x, y,
        vx: Math.cos(angle) * sp,
        vy: Math.sin(angle) * sp,
        shade: palette[(Math.random() * palette.length) | 0],
        size: 2 + ((Math.random() * 2) | 0),
        spin: Math.random() * Math.PI * 2,
        spinVel: (Math.random() - 0.5) * 9,
        life: 1.3 + Math.random() * 0.5,
        max: 1.8,
      });
    }
  }

  // RANK UP celebration — bigger banner, rank-colored confetti, 4-note arpeggio.
  // Distinct from a regular achievement so the player really feels the milestone.
  function celebrateRankUp(newRank) {

    achievements.add(key);
    achievementBanner = { text: '★ RANK UP: ' + newRank.name + ' ★', life: 3.5, max: 3.5 };
    // rising 4-note arpeggio
    blip(660,  0.12, 'sine', 0.09);
    setTimeout(() => blip(990,  0.14, 'sine', 0.09), 110);
    setTimeout(() => blip(1320, 0.18, 'sine', 0.09), 240);
    setTimeout(() => blip(1568, 0.30, 'sine', 0.09), 400);
    vibe([40, 60, 120]);
    // bigger confetti burst in this tier's colors + cream/gold accents
    spawnConfetti(W / 2, H * 0.40, 50, [newRank.color, '#fff', '#facc15', '#fde047']);

  function checkAchievements() {
    if (combo >= 5  && !achievements.has('combo5'))  showAchievement('combo5',  'COMBO MASTER ×2');
    if (combo >= 10 && !achievements.has('combo10')) showAchievement('combo10', 'COMBO LEGEND ×4');
    if (combo >= 20 && !achievements.has('combo20')) showAchievement('combo20', 'COMBO HERO ×7');
    // Early-game stepping stones — keeps fresh players hooked
    if (score >= 100   && !achievements.has('s100'))   showAchievement('s100',   '100 POINTS · WARMED UP');
    if (score >= 250   && !achievements.has('s250'))   showAchievement('s250',   '250 POINTS · CRUISING');
    if (score >= 500   && !achievements.has('s500'))   showAchievement('s500',   '500 POINTS');
    if (score >= 1000  && !achievements.has('s1000'))  showAchievement('s1000',  '1,000 POINTS!');
    if (score >= 2500  && !achievements.has('s2500'))  showAchievement('s2500',  '2,500 POINTS!!');
    if (score >= 5000  && !achievements.has('s5000'))  showAchievement('s5000',  '5,000 POINTS!!!');
    if (score >= 10000 && !achievements.has('s10000')) showAchievement('s10000', '10K LEGEND!!!!');
    // Vehicle unlocks — fire ONLY if this is the first time crossing (best < threshold)
    if (score >= 1000 && best < 1000 && !achievements.has('unlockMoto')) {
      showAchievement('unlockMoto', '★ MOTO UNLOCKED ★');
    }
    if (score >= 3000 && best < 3000 && !achievements.has('unlockBus')) {
      showAchievement('unlockBus', '★ BUS UNLOCKED ★');
    }
    // NEW BEST mid-game — bigger custom celebration, not regular achievement
    if (score > best && best > 0 && !achievements.has('newBest')) {
      celebrateNewBest();
    }
  }

    setTimeout(() => blip(659, 0.12, 'sine', 0.09), 110);
    setTimeout(() => blip(784, 0.18, 'sine', 0.09), 230);
