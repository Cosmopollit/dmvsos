    ctx.fillStyle = '#0a0a0a';
    ctx.fillRect(x - 1, y + Math.floor(h * 0.32), 3, 8);
    ctx.fillRect(x + w - 2, y + Math.floor(h * 0.32), 3, 8);
    ctx.fillRect(x - 1, y + Math.floor(h * 0.72), 3, 8);
    ctx.fillRect(x + w - 2, y + Math.floor(h * 0.72), 3, 8);
    // tail light bar (red strip across rear)
    ctx.fillStyle = '#dc2626';
    ctx.fillRect(x + 3, y + h - 3, w - 6, 2);
    ctx.fillStyle = '#7f1d1d';
    ctx.fillRect(x + 4, y + h - 2, w - 8, 1);
  }

  // PRIUS — silver hybrid hatchback with green eco-leaf decal
  function drawPrius(x, y, w, h) {
    // shadow
    ctx.fillStyle = 'rgba(0,0,0,0.35)';
    ctx.fillRect(x + 1, y + h - 2, w - 2, 3);
    // body — silver
    ctx.fillStyle = '#a8b0bc';
    ctx.fillRect(x + 1, y, w - 2, h);
    // hatchback rear bulge (taller back)
    ctx.fillStyle = '#90a0b0';
    ctx.fillRect(x, y + h * 0.55, w, h * 0.45);
    // panoramic windshield (Prius is notably big-windowed)
    ctx.fillStyle = COL_WINDOW;
    ctx.fillRect(x + 4, y + 4, w - 8, 11);
    // hatchback rear window
    ctx.fillRect(x + 3, y + h - 16, w - 6, 8);
    // side window strip
    ctx.fillRect(x + 3, y + h * 0.42, w - 6, 5);
    // ECO-LEAF green decal on door
    ctx.fillStyle = '#22c55e';
    ctx.fillRect(x + w / 2 - 3, y + h * 0.65, 6, 2);
    ctx.fillRect(x + w / 2 - 2, y + h * 0.65 - 2, 4, 2);
    ctx.fillRect(x + w / 2 - 1, y + h * 0.65 + 2, 2, 1);
    // body crease
    ctx.fillStyle = '#506070';
    ctx.fillRect(x + 1, y + h * 0.50, w - 2, 1);
    // bi-LED daytime running lights (thin strips at top)
    ctx.fillStyle = '#fde047';
    ctx.fillRect(x + 3,     y + 1, 5, 2);
    ctx.fillRect(x + w - 8, y + 1, 5, 2);
    // taillights — red strip across the back
    ctx.fillStyle = '#dc2626';
    ctx.fillRect(x + 3, y + h - 4, w - 6, 2);
    ctx.fillStyle = '#7a1818';
    ctx.fillRect(x + 4, y + h - 3, w - 8, 1);
  }

  // CRAZY BIMMER — black sedan with kidney grille + mismatched turn signal.
  // Persistent "CRAZY BIMMER" name tag is rendered above the car body so players
  // always see who just cut them off (no fade — moves with the car).
  function drawBMW(x, y, w, h, signalSide) {
    // shadow
    ctx.fillStyle = 'rgba(0,0,0,0.35)';
    ctx.fillRect(x + 1, y + h - 2, w - 2, 3);
    // body — graphite (lighter than pure black so it reads against dark road)
    ctx.fillStyle = '#3a3a42';
    ctx.fillRect(x, y, w, h);
    // top highlight (sun on roof)
    ctx.fillStyle = '#5a5a62';
    ctx.fillRect(x, y, w, 2);
    // shaded right side
    ctx.fillStyle = '#1a1a20';
    ctx.fillRect(x + w - 2, y, 2, h);
    // KIDNEY GRILLE — two vertical bars at front
    ctx.fillStyle = '#2a2a2a';
    ctx.fillRect(x + w / 2 - 5, y + 1, 4, 4);
    ctx.fillRect(x + w / 2 + 1, y + 1, 4, 4);
    ctx.fillStyle = '#1a1a1a';
    ctx.fillRect(x + w / 2 - 4, y + 2, 2, 2);
    ctx.fillRect(x + w / 2 + 2, y + 2, 2, 2);
    // LED headlights — bright white blocks
    ctx.fillStyle = '#fff';
    ctx.fillRect(x + 2,     y + 1, 5, 3);
    ctx.fillRect(x + w - 7, y + 1, 5, 3);
    // brand "M" stripe (blue/purple/red) on hood
    ctx.fillStyle = '#1e40af';
    ctx.fillRect(x + w / 2 - 3, y + 7, 2, 1);
    ctx.fillStyle = '#7f1d1d';
    ctx.fillRect(x + w / 2 - 1, y + 7, 2, 1);
    ctx.fillStyle = '#dc2626';
    ctx.fillRect(x + w / 2 + 1, y + 7, 2, 1);
    // windshield
    ctx.fillStyle = COL_WINDOW;
    ctx.fillRect(x + 4, y + 9, w - 8, 8);
    // side window strip
    ctx.fillRect(x + 3, y + h * 0.46, w - 6, 5);
    // rear window
    ctx.fillRect(x + 4, y + h - 12, w - 8, 6);
    // body crease line
    ctx.fillStyle = '#2a2a2a';
    ctx.fillRect(x + 1, y + h * 0.55, w - 2, 1);
    // taillights base
    ctx.fillStyle = '#7f1d1d';
    ctx.fillRect(x + 2,     y + h - 4, 5, 2);
    ctx.fillRect(x + w - 7, y + h - 4, 5, 2);
    // MISMATCHED TURN SIGNAL — blinks bright orange on the SIGNAL side
    // (signalSide is opposite of actualDir — caller passes it explicitly)
    const sigBlink = Math.floor(elapsed * 5) % 2 === 0;
    if (sigBlink) {
      ctx.fillStyle = '#fb923c';
      if (signalSide === 'L') {
        ctx.fillRect(x + 1, y + h - 4, 6, 3);
        ctx.fillStyle = 'rgba(251,146,60,0.4)';
        ctx.fillRect(x - 2, y + h - 5, 4, 5);
      } else {
        ctx.fillRect(x + w - 7, y + h - 4, 6, 3);
        ctx.fillStyle = 'rgba(251,146,60,0.4)';
        ctx.fillRect(x + w - 2, y + h - 5, 4, 5);
      }
    }

    // Persistent name tag floating above the car — "CRAZY BIMMER" in red on a
    // yellow pill. Doesn't fade. Bobs slightly + a little arrow points down at
    // the roof so the connection between tag and car is unambiguous.
    const tagBob = Math.sin(elapsed * 4 + y * 0.05) * 0.6;
    const tagText = 'CRAZY BIMMER';
    const tagH = 9;
    ctx.font = 'bold 7px ui-monospace, "SF Mono", Menlo, monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    const tagW = Math.ceil(ctx.measureText(tagText).width) + 8;
    const tagX = x + w / 2 - tagW / 2;
    const tagY = y - tagH - 4 + tagBob;
    // outer black border for contrast against any backdrop
    ctx.fillStyle = '#0a0000';
    ctx.fillRect(tagX - 1, tagY - 1, tagW + 2, tagH + 2);
    // yellow pill body
    ctx.fillStyle = '#fde047';
    ctx.fillRect(tagX, tagY, tagW, tagH);
    // top highlight
    ctx.fillStyle = '#fff7a8';
    ctx.fillRect(tagX, tagY, tagW, 1);
    // red bold text
    ctx.fillStyle = '#b91c1c';
    ctx.fillText(tagText, x + w / 2, tagY + tagH / 2 + 0.5);
    // tiny arrow pointing down at the car
    ctx.fillStyle = '#0a0000';
    ctx.fillRect(x + w / 2 - 2, tagY + tagH, 4, 1);
    ctx.fillRect(x + w / 2 - 1, tagY + tagH + 1, 2, 1);
    ctx.fillStyle = '#fde047';
    ctx.fillRect(x + w / 2 - 1, tagY + tagH, 2, 1);
    // reset text alignment defaults
    ctx.textAlign = 'start';
    ctx.textBaseline = 'alphabetic';
  }

  // DRIFTER — black sports car doing donuts (constantly rotating)
  function drawDrifter(x, y, w, h) {
    const cx = x + w / 2;
    const cy = y + h / 2;
    const spin = elapsed * 5.5 + y * 0.04;   // ~0.9 rotations/sec
    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(spin);
    // body — sleek black with red racing stripes
    ctx.fillStyle = '#1a1410';
    ctx.fillRect(-w / 2 + 3, -h / 2, w - 6, h);
    // shaded right side
    ctx.fillStyle = '#0a0a0a';
    ctx.fillRect(w / 2 - 5, -h / 2, 2, h);
    // RED RACING STRIPE down the center
    ctx.fillStyle = '#dc2626';
    ctx.fillRect(-1, -h / 2 + 2, 2, h - 4);
    ctx.fillStyle = '#ef4444';
    ctx.fillRect(0, -h / 2 + 2, 1, h - 4);
    // tinted windshield + rear glass
    ctx.fillStyle = 'rgba(0,0,0,0.7)';
    ctx.fillRect(-w / 2 + 5, -h / 2 + 5, w - 10, 8);
    ctx.fillRect(-w / 2 + 5, h / 2 - 13, w - 10, 7);
    // door creases
    ctx.fillStyle = '#3a2014';
    ctx.fillRect(-w / 2 + 3, -2, w - 6, 1);
    // 4 tires sticking out
    ctx.fillStyle = '#000';
    ctx.fillRect(-w / 2,      -h / 2 + 8,    3, 6);
    ctx.fillRect(w / 2 - 3,   -h / 2 + 8,    3, 6);
    ctx.fillRect(-w / 2,      h / 2 - 14,    3, 6);
    ctx.fillRect(w / 2 - 3,   h / 2 - 14,    3, 6);
    // yellow headlights front
    ctx.fillStyle = '#fde047';
    ctx.fillRect(-w / 2 + 4, -h / 2 + 1, 5, 2);
    ctx.fillRect(w / 2 - 9,  -h / 2 + 1, 5, 2);
    // taillights rear
    ctx.fillStyle = '#ff3a3a';
    ctx.fillRect(-w / 2 + 4, h / 2 - 3, 5, 2);
    ctx.fillRect(w / 2 - 9,  h / 2 - 3, 5, 2);
    // spoiler at the back
    ctx.fillStyle = '#0a0a0a';
    ctx.fillRect(-w / 2 + 1, h / 2 - 1, w - 2, 2);
    ctx.restore();
  }

  // POLICE — classic Crown Vic squad car with animated red/blue light bar
  function drawPolice(x, y, w, h) {
    ctx.save();
    // shadow
    ctx.fillStyle = 'rgba(0,0,0,0.35)';
    ctx.fillRect(x + 1, y + h - 2, w - 2, 3);
    // body — black sedan
    ctx.fillStyle = '#1a1410';
    ctx.fillRect(x, y, w, h);
    // WHITE DOOR PANEL band along middle (classic squad livery)
    ctx.fillStyle = '#f4ead8';
    ctx.fillRect(x, y + Math.floor(h * 0.36), w, Math.floor(h * 0.28));
    // BLACK TRIM lines top + bottom of white band
    ctx.fillStyle = '#1a1410';
    ctx.fillRect(x, y + Math.floor(h * 0.36),    w, 1);
    ctx.fillRect(x, y + Math.floor(h * 0.64) - 1, w, 1);
    // diagonal accent stripe (across the door) — classic police graphic
    ctx.fillStyle = '#1a1410';
    for (let i = 0; i < 6; i++) {
      ctx.fillRect(x + 2 + i * 2, y + Math.floor(h * 0.38) + i, 4, 1);
    }
    // windshield + rear window — tinted
    ctx.fillStyle = COL_WINDOW;
    ctx.fillRect(x + 4, y + 4,         w - 8, 7);
    ctx.fillRect(x + 4, y + h - 12,    w - 8, 6);
    // "POLICE" door text
    ctx.fillStyle = '#1a1410';
    ctx.font = 'bold 5px ui-monospace, monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('POLICE', x + w / 2, y + Math.floor(h * 0.51));

    // ===== LIGHT BAR (4-segment chase) =====
    const barY = y + Math.floor(h * 0.20);
    const barH = 4;
    const barW = w - 6;
    const segW = barW / 4;
    // bar housing — black with bright top edge
    ctx.fillStyle = '#0a0a0a';
    ctx.fillRect(x + 3, barY, barW, barH);
    ctx.fillStyle = '#3a3a3a';
    ctx.fillRect(x + 3, barY, barW, 1);
    // Chase pattern at 6Hz: tick 0 = outer-R + inner-B ON, tick 1 = inner-R + outer-B ON
    // 4 segments laid out: R0 | B1 | R2 | B3
    const tick = Math.floor(elapsed * 6) % 2;
    const seg = [
      { lit: '#ff2828', dim: '#601010', isRed: true,  on: tick === 0 },
      { lit: '#3088ff', dim: '#0a2858', isRed: false, on: tick === 1 },
      { lit: '#ff2828', dim: '#601010', isRed: true,  on: tick === 0 },
      { lit: '#3088ff', dim: '#0a2858', isRed: false, on: tick === 1 },
    ];
    for (let i = 0; i < 4; i++) {
      const sx = x + 3 + segW * i + 1;
      const sw = segW - 1.5;
      ctx.fillStyle = seg[i].on ? seg[i].lit : seg[i].dim;
      ctx.fillRect(sx | 0, barY + 1, Math.max(2, sw | 0), barH - 2);
      // bright center dot (lamp focal point)
      if (seg[i].on) {
        ctx.fillStyle = '#fff';
        ctx.fillRect((sx + sw / 2 - 1) | 0, barY + 1, 2, 1);
      }
    }
    // SIDE HALOS — colored glow on the side matching active lights
    if (tick === 0) {
      ctx.fillStyle = 'rgba(255,40,40,0.35)';
      ctx.fillRect(x - 5, barY - 3, 6, barH + 6);
      ctx.fillRect(x + w - 1, barY - 3, 6, barH + 6);
    } else {
      ctx.fillStyle = 'rgba(40,136,255,0.35)';
      ctx.fillRect(x - 5, barY - 3, 6, barH + 6);
      ctx.fillRect(x + w - 1, barY - 3, 6, barH + 6);
    }
    // tiny antenna on rear bumper
    ctx.fillStyle = '#3a3a3a';
    ctx.fillRect(x + w - 4, y + h - 8, 1, 4);

    // headlights
    ctx.fillStyle = '#fff';
    ctx.fillRect(x + 2,     y + 1, 3, 2);
    ctx.fillRect(x + w - 5, y + 1, 3, 2);
    // taillights
    ctx.fillStyle = '#ff3a3a';
    ctx.fillRect(x + 2,     y + h - 4, 3, 2);
    ctx.fillRect(x + w - 5, y + h - 4, 3, 2);

    ctx.textBaseline = 'alphabetic';
    ctx.restore();
  }

  // ICE — dark olive SUV with white "ICE" badge on the door
  function drawICE(x, y, w, h) {
    ctx.save();
    // shadow
    ctx.fillStyle = 'rgba(0,0,0,0.4)';
    ctx.fillRect(x + 1, y + h - 2, w - 2, 3);

    // BODY — dark tactical olive-black, full SUV silhouette
    ctx.fillStyle = '#1a2010';
    ctx.fillRect(x, y, w, h);
    // bright top edge (light from above)
    ctx.fillStyle = '#2a3020';
    ctx.fillRect(x + 2, y, w - 4, 1);
    // shaded right side
    ctx.fillStyle = '#0a0e08';
    ctx.fillRect(x + w - 3, y, 3, h);

    // BULL BAR (front-end metal guard) at the very top
    ctx.fillStyle = '#3a3a3a';
    ctx.fillRect(x + 2, y + 1, w - 4, 2);
    // bull bar vertical posts
    ctx.fillStyle = '#5a5a5a';
    ctx.fillRect(x + 5,      y + 1, 1, 2);
    ctx.fillRect(x + w / 2,  y + 1, 1, 2);
    ctx.fillRect(x + w - 6,  y + 1, 1, 2);

    // WINDSHIELD — heavily tinted (covert federal)
    ctx.fillStyle = '#0a0f1c';
    ctx.fillRect(x + 4, y + 4,        w - 8, 9);
    ctx.fillStyle = COL_WINDOW;
    ctx.fillRect(x + 5, y + 5,        w - 10, 7);
    // tint glint (subtle)
    ctx.fillStyle = 'rgba(255,255,255,0.10)';
    ctx.fillRect(x + 5, y + 5,        w - 10, 1);

    // REAR WINDOW
    ctx.fillStyle = '#0a0f1c';
    ctx.fillRect(x + 4, y + h - 14,   w - 8, 8);
    ctx.fillStyle = COL_WINDOW;
    ctx.fillRect(x + 5, y + h - 13,   w - 10, 6);

    // SIDE WINDOWS (split by door pillar) — small SUV-style
    ctx.fillStyle = COL_WINDOW;
    ctx.fillRect(x + 4, y + Math.floor(h * 0.40), w - 8, 5);
    // door pillar
    ctx.fillStyle = '#0a0e08';
    ctx.fillRect(x + w / 2 - 1, y + Math.floor(h * 0.40), 2, 5);

    // BIG ICE BADGE — white square with red border + bold ICE text
    const bw = Math.floor(w * 0.60), bh = 11;
    const bx = x + (w - bw) / 2;
    const by = y + Math.floor(h * 0.56);
    // red outer border (federal authority red)
    ctx.fillStyle = '#7f1d1d';
    ctx.fillRect(bx - 1, by - 1, bw + 2, bh + 2);
    // white panel
    ctx.fillStyle = '#f4ead8';
    ctx.fillRect(bx, by, bw, bh);
    // inner black border
    ctx.fillStyle = '#1a1410';
    ctx.fillRect(bx, by, bw, 1);
    ctx.fillRect(bx, by + bh - 1, bw, 1);
    // "ICE" — big stark letters
    ctx.fillStyle = '#1a1410';
    ctx.font = 'bold 8px ui-monospace, monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('ICE', bx + bw / 2, by + bh / 2 + 0.5);

    // ROOF RACK — 2 horizontal bars + 4 vertical mounts
    ctx.fillStyle = '#3a4030';
    ctx.fillRect(x + 3, y + Math.floor(h * 0.18),     w - 6, 1);
    ctx.fillRect(x + 3, y + Math.floor(h * 0.18) + 3, w - 6, 1);
    ctx.fillStyle = '#5a6048';
    ctx.fillRect(x + 5,      y + Math.floor(h * 0.18), 1, 4);
    ctx.fillRect(x + w / 3,  y + Math.floor(h * 0.18), 1, 4);
    ctx.fillRect(x + 2*w/3,  y + Math.floor(h * 0.18), 1, 4);
    ctx.fillRect(x + w - 6,  y + Math.floor(h * 0.18), 1, 4);

    // COVERT R/B STROBES inside windshield — alternating positions
    const flashCovert = Math.floor(elapsed * 6) % 2 === 0;
    ctx.fillStyle = flashCovert ? '#ff2020' : '#2080ff';
    ctx.fillRect(x + 6, y + 7, 3, 2);
    ctx.fillStyle = flashCovert ? '#2080ff' : '#ff2020';
    ctx.fillRect(x + w - 9, y + 7, 3, 2);
    // glow halos for strobes (subtle covert glow)
    if (flashCovert) {
      ctx.fillStyle = 'rgba(255,40,40,0.25)';
      ctx.fillRect(x + 4, y + 6, 7, 4);
      ctx.fillStyle = 'rgba(40,128,255,0.25)';
      ctx.fillRect(x + w - 11, y + 6, 7, 4);
    } else {
      ctx.fillStyle = 'rgba(40,128,255,0.25)';
      ctx.fillRect(x + 4, y + 6, 7, 4);
      ctx.fillStyle = 'rgba(255,40,40,0.25)';
      ctx.fillRect(x + w - 11, y + 6, 7, 4);
    }

    // 4 BLACK TIRES sticking out (rugged off-road SUV)
    ctx.fillStyle = '#000';
    ctx.fillRect(x - 2,     y + Math.floor(h * 0.22), 3, 5);
    ctx.fillRect(x + w - 1, y + Math.floor(h * 0.22), 3, 5);
    ctx.fillRect(x - 2,     y + Math.floor(h * 0.68), 3, 5);
    ctx.fillRect(x + w - 1, y + Math.floor(h * 0.68), 3, 5);

    // SPARE TIRE on rear (SUV detail — small black square)
    ctx.fillStyle = '#1a1410';
    ctx.fillRect(x + w / 2 - 3, y + h - 8, 6, 4);
    ctx.fillStyle = '#0a0a0a';
    ctx.fillRect(x + w / 2 - 2, y + h - 7, 4, 2);

    // headlights — bright LED
    ctx.fillStyle = '#fff';
    ctx.fillRect(x + 2,     y + 1, 3, 2);
    ctx.fillRect(x + w - 5, y + 1, 3, 2);
    ctx.fillStyle = '#fde047';
    ctx.fillRect(x + 3,     y + 2, 1, 1);
    ctx.fillRect(x + w - 4, y + 2, 1, 1);
    // taillights
    ctx.fillStyle = '#ff3a3a';
    ctx.fillRect(x + 2,     y + h - 4, 3, 2);
    ctx.fillRect(x + w - 5, y + h - 4, 3, 2);

    ctx.textBaseline = 'alphabetic';
    ctx.restore();
  }

  // OIL SLICK — dark rainbow-shimmer puddle on the road
  function drawOilSlick(x, y, w, h) {
    // soft outer edge — irregular blob
    ctx.fillStyle = 'rgba(10,10,10,0.6)';
    ctx.fillRect(x,     y + 2, w,     h - 4);
    ctx.fillRect(x + 1, y + 1, w - 2, h - 2);
    // dark oily base
    ctx.fillStyle = '#0a0a0a';
    ctx.fillRect(x + 2, y + 2, w - 4, h - 4);
    ctx.fillRect(x + 3, y + 1, w - 6, h - 2);
    // RAINBOW SHIMMER streaks (purple/cyan/pink — like oil-on-water)
    ctx.fillStyle = 'rgba(168,139,250,0.45)';   // purple
    ctx.fillRect(x + 4, y + 2, w - 8, 1);
    ctx.fillStyle = 'rgba(34,211,238,0.45)';    // cyan
    ctx.fillRect(x + 5, y + Math.floor(h / 2), w - 10, 1);
    ctx.fillStyle = 'rgba(244,114,182,0.45)';   // pink
    ctx.fillRect(x + 4, y + h - 3, w - 8, 1);
    // animated bright glint moving across
    const sh = Math.floor(elapsed * 4) % (w - 8);
    ctx.fillStyle = '#fff';
    ctx.fillRect(x + 4 + sh, y + 2, 1, 1);
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.fillRect(x + 4 + sh, y + h - 3, 1, 1);
  }

  // Pothole — flat dark patch on the road with jagged broken-asphalt edges
  function drawPothole(x, y, w, h) {
    // outermost subtle dark ring on the road
    ctx.fillStyle = 'rgba(0,0,0,0.4)';
    ctx.fillRect(x + 2, y + h - 2, w - 4, 2);

    // jagged broken-asphalt rim — gray lighter than the dark hole
    ctx.fillStyle = '#2a2a2a';
    ctx.fillRect(x + 1,     y + 2,        2, h - 4);
    ctx.fillRect(x + w - 3, y + 2,        2, h - 4);
    ctx.fillRect(x + 3,     y,            w - 6, 2);
    ctx.fillRect(x + 3,     y + h - 2,    w - 6, 2);
    // bumps in the rim
    ctx.fillStyle = '#3a3a3a';
    ctx.fillRect(x,         y + 4,    1, 2);
    ctx.fillRect(x + w - 1, y + 6,    1, 2);
    ctx.fillRect(x + 5,     y - 1,    2, 1);
    ctx.fillRect(x + w - 8, y + h,    2, 1);

    // dark hole interior
    ctx.fillStyle = '#0a0a0a';
    ctx.fillRect(x + 3, y + 2, w - 6, h - 4);
    // even darker pit center
    ctx.fillStyle = '#000';
    ctx.fillRect(x + 5, y + 4, w - 10, h - 8);

    // gravel chunks inside (small lighter specks)
    ctx.fillStyle = '#1a1a1a';
    ctx.fillRect(x + Math.floor(w/2) - 4, y + 4,        2, 1);
    ctx.fillRect(x + Math.floor(w/2) + 2, y + h - 5,    1, 1);
    ctx.fillRect(x + 6,                   y + h - 6,    1, 1);
    ctx.fillRect(x + w - 8,               y + 3,        1, 1);
  }

  // Deer — brown silhouette with antlers, 4 legs, white tail, eye + nose
  function drawDeer(x, y, w, h) {
    // shadow
    ctx.fillStyle = 'rgba(0,0,0,0.4)';
    ctx.fillRect(x + 4, y + h - 1, w - 8, 2);

    const bodyX = x + 3;
    const bodyW = w - 6;
    const bodyTop = y + 14;
    const bodyH = h - 24;

    // 4 legs
    ctx.fillStyle = '#5a3018';
    ctx.fillRect(bodyX + 2,           y + h - 10, 3, 9);
    ctx.fillRect(bodyX + bodyW - 5,    y + h - 10, 3, 9);
    ctx.fillRect(bodyX + 6,           y + h - 10, 3, 9);
    ctx.fillRect(bodyX + bodyW - 9,    y + h - 10, 3, 9);
    // hooves
    ctx.fillStyle = '#1a0a04';
    ctx.fillRect(bodyX + 2,            y + h - 2, 3, 1);
    ctx.fillRect(bodyX + bodyW - 5,    y + h - 2, 3, 1);
    ctx.fillRect(bodyX + 6,            y + h - 2, 3, 1);
    ctx.fillRect(bodyX + bodyW - 9,    y + h - 2, 3, 1);

    // body
    ctx.fillStyle = '#8a5028';
    ctx.fillRect(bodyX, bodyTop, bodyW, bodyH);
    // lighter ridge along the top
    ctx.fillStyle = '#a86838';
    ctx.fillRect(bodyX, bodyTop, bodyW, 2);
    // small white spots
    ctx.fillStyle = '#f4ead8';
    ctx.fillRect(bodyX + 3,           bodyTop + 4, 2, 2);
    ctx.fillRect(bodyX + 8,           bodyTop + 3, 2, 2);
    ctx.fillRect(bodyX + bodyW - 6,    bodyTop + 4, 2, 2);
    ctx.fillRect(bodyX + bodyW - 11,   bodyTop + 6, 2, 2);
    // white belly stripe
    ctx.fillStyle = '#e7decf';
    ctx.fillRect(bodyX + 2, bodyTop + bodyH - 2, bodyW - 4, 2);

    // head + snout — placed in the upper-front area
    const headX = bodyX + Math.floor(bodyW * 0.62);
    const headY = y + 6;
    ctx.fillStyle = '#8a5028';
    ctx.fillRect(headX, headY, 8, 9);
    ctx.fillRect(headX - 2, headY + 3, 2, 5);   // snout
    // ears
    ctx.fillStyle = '#5a3018';
    ctx.fillRect(headX + 1, headY - 2, 2, 3);
    ctx.fillRect(headX + 5, headY - 2, 2, 3);
    // eye + nose
    ctx.fillStyle = '#000';
    ctx.fillRect(headX + 2, headY + 4, 1, 1);
    ctx.fillRect(headX - 2, headY + 5, 1, 1);

    // ANTLERS — Y-shaped pair sticking up
    ctx.fillStyle = '#3a2014';
    // left antler
    ctx.fillRect(headX + 2, headY - 7, 1, 6);
    ctx.fillRect(headX + 1, headY - 9, 1, 3);
    ctx.fillRect(headX,     headY - 10, 1, 2);
    ctx.fillRect(headX + 3, headY - 10, 1, 4);
    // right antler
    ctx.fillRect(headX + 5, headY - 7, 1, 6);
    ctx.fillRect(headX + 6, headY - 9, 1, 3);
    ctx.fillRect(headX + 7, headY - 10, 1, 2);
    ctx.fillRect(headX + 4, headY - 10, 1, 4);
    // antler tips (brighter)
    ctx.fillStyle = '#6b3a1c';
    ctx.fillRect(headX,     headY - 10, 1, 1);
    ctx.fillRect(headX + 7, headY - 10, 1, 1);

    // white-poof tail at the back
    ctx.fillStyle = '#f4ead8';
    ctx.fillRect(bodyX - 1, bodyTop + 3, 2, 4);
  }

  // Slow stoned hippie VW van — moves slower than the road so the player overtakes it
  function drawVan(x, y, w, h) {
    // shadow
    ctx.fillStyle = 'rgba(0,0,0,0.35)';
    ctx.fillRect(x + 1, y + h - 2, w - 2, 3);

    const splitY = y + Math.floor(h * 0.42);

    // body — orange bottom
    ctx.fillStyle = '#ea580c';
    ctx.fillRect(x, y, w, h);
    // upper section — cream/white wrap
    ctx.fillStyle = '#f4ead8';
    ctx.fillRect(x, y, w, splitY - y);

    // V-shape notch where white meets orange (classic VW Bus front)
    ctx.fillStyle = '#ea580c';
    ctx.fillRect(x + w / 2 - 1, splitY - 5, 2, 10);
    ctx.fillRect(x + w / 2 - 3, splitY,     6, 1);
    ctx.fillRect(x + w / 2 - 2, splitY + 1, 4, 1);

    // headlights — round-ish yellow, FRONT facing the player
    ctx.fillStyle = '#ffe788';
    ctx.fillRect(x + 3,     y + 3, 5, 4);
    ctx.fillRect(x + w - 8, y + 3, 5, 4);
    ctx.fillStyle = '#fff';
    ctx.fillRect(x + 4,     y + 4, 2, 2);
    ctx.fillRect(x + w - 7, y + 4, 2, 2);

    // windshield (panoramic — big block under the headlights)
    ctx.fillStyle = COL_WINDOW;
    ctx.fillRect(x + 4, y + 9, w - 8, 9);
    // windshield horizon glint
    ctx.fillStyle = 'rgba(255,255,255,0.18)';
    ctx.fillRect(x + 4, y + 9, w - 8, 1);

    // side windows split by door pillar
    const swY = splitY + 4;
    const swH = Math.max(5, Math.floor(h * 0.16));
    ctx.fillStyle = COL_WINDOW;
    ctx.fillRect(x + 3,           swY, (w - 8) / 2 - 1, swH);
    ctx.fillRect(x + w / 2 + 2,   swY, (w - 8) / 2 - 1, swH);
    // door pillar
    ctx.fillStyle = '#1a1410';
    ctx.fillRect(x + w / 2 - 1, swY, 2, swH);

    // PEACE SIGN — large white-backed circle on the side door area, very obvious
    const pcx = x + w / 2;
    const pcy = y + Math.floor(h * 0.78);
    const pcr = 7;
    // white backing (almost-circle from rectangles)
    ctx.fillStyle = '#f4ead8';
    ctx.fillRect(pcx - pcr + 2, pcy - pcr,         pcr * 2 - 4, 2);
    ctx.fillRect(pcx - pcr,     pcy - pcr + 2,     pcr * 2,     pcr * 2 - 4);
    ctx.fillRect(pcx - pcr + 2, pcy + pcr - 2,     pcr * 2 - 4, 2);
    // peace symbol — vertical bar
    ctx.fillStyle = '#1a1410';
    ctx.fillRect(pcx - 1, pcy - pcr + 2, 2, pcr * 2 - 4);
    // diagonals (V shape pointing down)
    ctx.fillRect(pcx - 2, pcy + 1, 1, 1);
    ctx.fillRect(pcx - 3, pcy + 2, 1, 1);
    ctx.fillRect(pcx - 4, pcy + 3, 1, 1);
    ctx.fillRect(pcx + 2, pcy + 1, 1, 1);
    ctx.fillRect(pcx + 3, pcy + 2, 1, 1);
    ctx.fillRect(pcx + 4, pcy + 3, 1, 1);
    // horizontal of the peace symbol (around the rim)
    ctx.fillStyle = '#1a1410';
    ctx.fillRect(pcx - pcr + 1, pcy - 1, 2, 2);
    ctx.fillRect(pcx + pcr - 2, pcy - 1, 2, 2);

    // bumper
    ctx.fillStyle = '#1a1410';
    ctx.fillRect(x, y + h - 2, w, 2);

    // taillights
    ctx.fillStyle = '#ff3a3a';
    ctx.fillRect(x + 2,     y + h - 5, 4, 3);
    ctx.fillRect(x + w - 6, y + h - 5, 4, 3);
  }

  // In-world arch sign — "ENTERING [STATE]" banner with two posts on the
  // shoulders, scrolls down the road and over the player. Stronger state
  // transition cue than the floating banner alone.
  function drawArchSign(a) {
    const c = a.city;
    const archX = ROAD_X - 6;
    const archW = ROAD_W + 12;
    const archH = 28;

    // ===== POSTS — thicker, with bolts/rivets =====
    ctx.fillStyle = '#1a1410';
    ctx.fillRect(archX,             a.y + archH,     5, 28);
    ctx.fillRect(archX + archW - 5, a.y + archH,     5, 28);
    // post highlights (left edge of each, like lit by sun)
    ctx.fillStyle = '#3a3030';
    ctx.fillRect(archX,             a.y + archH,     1, 28);
    ctx.fillRect(archX + archW - 5, a.y + archH,     1, 28);
    // post rivets at top/middle (4 small bolts)
    ctx.fillStyle = '#5a5a5a';
    ctx.fillRect(archX + 2,           a.y + archH + 3,  1, 1);
    ctx.fillRect(archX + 2,           a.y + archH + 14, 1, 1);
    ctx.fillRect(archX + archW - 3,   a.y + archH + 3,  1, 1);
    ctx.fillRect(archX + archW - 3,   a.y + archH + 14, 1, 1);
    // post bases (concrete footing)
    ctx.fillStyle = '#3a2818';
    ctx.fillRect(archX - 1,             a.y + archH + 26, 7, 3);
    ctx.fillRect(archX + archW - 6,     a.y + archH + 26, 7, 3);

    // ===== BANNER BOARD — dark blue base =====
    ctx.fillStyle = '#0c2856';
    ctx.fillRect(archX + 4, a.y, archW - 8, archH);
    // subtle inner gradient strip (darker bottom for depth)
    ctx.fillStyle = '#081e3e';
    ctx.fillRect(archX + 4, a.y + archH - 8, archW - 8, 6);

    // ===== ACCENT STRIPES top/bottom (thicker + double-layer) =====
    ctx.fillStyle = c.accent;
    ctx.fillRect(archX + 4, a.y,             archW - 8, 2);
    ctx.fillRect(archX + 4, a.y + archH - 2, archW - 8, 2);
    // brighter inner stripe (1px highlight inside the accent)
    ctx.fillStyle = 'rgba(255,255,255,0.4)';
    ctx.fillRect(archX + 4, a.y,             archW - 8, 1);
    ctx.fillRect(archX + 4, a.y + archH - 1, archW - 8, 1);

    // ===== CHASING LIGHT BULBS along top + bottom edges =====
    // Stable per-bulb phase based on elapsed; alternate ON/OFF in a moving wave.
    const bulbCount = 10;
    const bulbStrideX = (archW - 16) / (bulbCount - 1);
    const wave = Math.floor(elapsed * 4);
    for (let i = 0; i < bulbCount; i++) {
      const bx = archX + 8 + Math.round(i * bulbStrideX);
      const on = (i + wave) % 2 === 0;
      // top row
      ctx.fillStyle = on ? '#fde047' : '#5a4a18';
      ctx.fillRect(bx, a.y + 3, 1, 1);
      // bottom row (offset so wave goes opposite direction)
      const onB = (i + wave + 1) % 2 === 0;
      ctx.fillStyle = onB ? '#fde047' : '#5a4a18';
      ctx.fillRect(bx, a.y + archH - 4, 1, 1);
      // bright halo on lit bulbs (subtle glow)
      if (on) {
        ctx.fillStyle = 'rgba(253,224,71,0.35)';
        ctx.fillRect(bx - 1, a.y + 3, 3, 1);
      }
      if (onB) {
        ctx.fillStyle = 'rgba(253,224,71,0.35)';
        ctx.fillRect(bx - 1, a.y + archH - 4, 3, 1);
      }
    }

    // ===== CORNER RIVETS (thicker / 2px) =====
    ctx.fillStyle = c.accent;
    ctx.fillRect(archX + 5,           a.y + 4, 2, 2);
    ctx.fillRect(archX + archW - 7,   a.y + 4, 2, 2);
    ctx.fillRect(archX + 5,           a.y + archH - 6, 2, 2);
    ctx.fillRect(archX + archW - 7,   a.y + archH - 6, 2, 2);
    // rivet highlights
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.fillRect(archX + 5,           a.y + 4, 1, 1);
    ctx.fillRect(archX + archW - 7,   a.y + 4, 1, 1);
    ctx.fillRect(archX + 5,           a.y + archH - 6, 1, 1);
    ctx.fillRect(archX + archW - 7,   a.y + archH - 6, 1, 1);

    // ===== PENNANT FLAGS waving on top of each post =====
    // Triangular flags that "wave" via phase offset
    const flagWave = Math.sin(elapsed * 6) * 1.5;
    ctx.fillStyle = c.accent;
    // left flag
    const lfx = archX + 2;
    const lfy = a.y + archH - 8;
    ctx.fillRect(lfx,     lfy,         5, 1);
    ctx.fillRect(lfx,     lfy + 1,     4 + Math.round(flagWave * 0.5), 1);
    ctx.fillRect(lfx,     lfy + 2,     3, 1);
    // pole extends up
    ctx.fillStyle = '#1a1410';
    ctx.fillRect(lfx - 1, lfy - 2,     1, 6);
    // right flag (mirrored, opposite wave phase)
    const rfx = archX + archW - 7;
    const rfy = a.y + archH - 8;
    ctx.fillStyle = c.accent;
    ctx.fillRect(rfx + 1 - Math.round(flagWave * 0.5), rfy,     4 + Math.round(flagWave * 0.5), 1);
    ctx.fillRect(rfx + 2, rfy + 1,     3, 1);
    ctx.fillRect(rfx + 3, rfy + 2,     2, 1);
    ctx.fillStyle = '#1a1410';
    ctx.fillRect(rfx + 5, rfy - 2,     1, 6);

    // ===== TEXT — accent-colored city name with subtle drop shadow =====
    ctx.fillStyle = '#cfd8e8';
    ctx.font = 'bold 7px ui-monospace, monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('ENTERING', archX + archW / 2, a.y + 7);
    // drop shadow under city name
    ctx.fillStyle = 'rgba(0,0,0,0.7)';
    ctx.font = 'bold 11px ui-monospace, monospace';
    ctx.fillText(c.name, archX + archW / 2 + 1, a.y + 21);
    ctx.fillStyle = c.accent;
    ctx.fillText(c.name, archX + archW / 2, a.y + 20);
    ctx.textBaseline = 'alphabetic';
  }

  // Floating learn-the-vocabulary badge — small dark pill with accent border.
  // Sits above a sprite for ~1.7s, fades in last 0.5s. Shown only first 3
  // times the player sees each type (handled in maybeLabel).
  function drawLabels() {
    if (!labels.length) return;
    ctx.save();
    ctx.font = 'bold 7px ui-monospace, monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    for (const lb of labels) {
      // fade out over last 0.5s, fade in over first 0.15s
      const t = lb.life / lb.max;             // 1 -> 0
      const a = t > 0.91 ? (1 - t) / 0.09     // fade-in window
              : t < 0.30 ? t / 0.30           // fade-out window
              : 1;
      const alpha = Math.max(0, Math.min(1, a));
      ctx.globalAlpha = alpha;

      const tw = ctx.measureText(lb.text).width;
      const pw = Math.ceil(tw) + 8;
      const ph = 11;
      // Subtle bob — gentle vertical hover (sin-driven) so the label feels alive
      const bob = Math.round(Math.sin(elapsed * 4 + lb.x * 0.05) * 1);
      const px = (lb.x | 0) - pw / 2;
      const py = (lb.y | 0) - ph / 2 + bob;

      // ===== DROP SHADOW =====
      ctx.fillStyle = 'rgba(0,0,0,0.5)';
      ctx.fillRect(px + 1, py + 2, pw, ph);

      // ===== DARK BACKING =====
      ctx.fillStyle = 'rgba(5,9,19,0.92)';
      ctx.fillRect(px, py, pw, ph);

      // ===== ACCENT STRIPES (top + bottom, thicker — 1px each + 1px inner highlight) =====
      ctx.fillStyle = lb.color;
      ctx.fillRect(px, py,             pw, 1);
      ctx.fillRect(px, py + ph - 1,    pw, 1);
      // left+right accent dots (corner emphasis)
      ctx.fillRect(px,            py,             1, 1);
      ctx.fillRect(px + pw - 1,   py,             1, 1);
      ctx.fillRect(px,            py + ph - 1,    1, 1);
      ctx.fillRect(px + pw - 1,   py + ph - 1,    1, 1);

      // ===== TEXT =====
      ctx.fillStyle = lb.color;
      ctx.fillText(lb.text, lb.x, py + ph / 2 + 0.5);

      // ===== POINTER TRIANGLE below pill — anchored to sprite =====
      // 3px wide triangle tapering down for a proper visual "this is the thing" indicator
      ctx.fillStyle = 'rgba(5,9,19,0.92)';
      ctx.fillRect((lb.x | 0) - 2, py + ph,     5, 1);
      ctx.fillRect((lb.x | 0) - 1, py + ph + 1, 3, 1);
      ctx.fillRect((lb.x | 0),     py + ph + 2, 1, 1);
      // accent edges of the triangle (matches pill color)
      ctx.fillStyle = lb.color;
      ctx.fillRect((lb.x | 0) - 2, py + ph, 1, 1);
      ctx.fillRect((lb.x | 0) + 2, py + ph, 1, 1);
    }
    ctx.restore();
    ctx.textBaseline = 'alphabetic';
  }

  // NYC trash scraps — small dark/light/yellow rectangles fluttering horizontally
  // Each scrap tumbles: spin phase swaps width/height for landscape↔portrait flips,
  // bottom/right edges get a darker shadow, top edge gets a subtle highlight.
  function drawTrash() {
    if (!trashScraps.length) return;
    ctx.save();
    for (const ts of trashScraps) {
      const a = Math.min(1, ts.life / ts.max * 2);
      if (a <= 0) continue;
      const alpha = Math.max(0, a) * 0.85;
      ctx.globalAlpha = alpha;

      // Tumble: swap w/h based on flutter phase, simulating a flipping piece of paper
      const flipPhase = Math.sin(elapsed * 6 + ts.flutter);
      const portrait = flipPhase < 0;
      const w = portrait ? ts.h : ts.w;
      const h = portrait ? ts.w : ts.h;
      const ix = ts.x | 0;
      const iy = ts.y | 0;

      // Main body
      ctx.fillStyle = ts.shade;
      ctx.fillRect(ix, iy, w, h);

      // Bottom-right shadow edge (1px darker line for depth, only if scrap is big enough)
      if (w >= 2 && h >= 2) {
        ctx.fillStyle = 'rgba(0,0,0,0.4)';
        ctx.fillRect(ix + w - 1, iy, 1, h);   // right edge shadow
        ctx.fillRect(ix, iy + h - 1, w, 1);   // bottom edge shadow
        // Top-left highlight (catches light when "facing up")
        ctx.fillStyle = 'rgba(255,255,255,0.35)';
        ctx.fillRect(ix, iy, 1, 1);
      }
    }
    ctx.restore();
  }

  // Austin tumbleweeds — tangled dry-branch ball with radiating spikes
  function drawTumbleweeds() {
    if (!tumbleweeds.length) return;
    ctx.save();
    for (const tw of tumbleweeds) {
      const a = Math.min(1, tw.life / tw.max * 2);
      ctx.globalAlpha = Math.max(0, a);
      const cx = tw.x | 0;
      const cy = (tw.baseY + Math.sin(tw.rot * 2.5) * 2) | 0;
      const r = 6;

      // Core tangled mass — irregular silhouette via 3 layered rects
      ctx.fillStyle = '#5a3018';
      ctx.fillRect(cx - 4, cy - 4, 8, 1);   // top edge
      ctx.fillRect(cx - 5, cy - 3, 10, 7);  // wide middle
      ctx.fillRect(cx - 4, cy + 4, 8, 1);   // bottom edge

      // Lighter tangle highlights — dry-grass tone interlaced with the dark
      ctx.fillStyle = '#8a5028';
      ctx.fillRect(cx - 3, cy - 2, 1, 1);
      ctx.fillRect(cx + 2, cy - 2, 1, 1);
      ctx.fillRect(cx - 3, cy + 1, 1, 1);
      ctx.fillRect(cx + 1, cy + 2, 1, 1);
      ctx.fillRect(cx,     cy - 3, 1, 1);
      ctx.fillRect(cx + 3, cy,     1, 1);

      // Internal dark shadows for tangled depth
      ctx.fillStyle = '#3a2014';
      ctx.fillRect(cx - 2, cy - 1, 2, 2);
      ctx.fillRect(cx + 1, cy + 1, 2, 1);
      ctx.fillRect(cx - 4, cy + 2, 1, 1);
      ctx.fillRect(cx + 3, cy - 2, 1, 1);

      // 6 RADIATING TWIGS — irregular angles around the rim
      ctx.fillStyle = '#8a5028';
      for (let i = 0; i < 6; i++) {
        const ang = tw.rot + i * Math.PI / 3 + Math.sin(i * 1.2) * 0.4;
        const co = Math.cos(ang);
        const si = Math.sin(ang);
        const len = 3 + (i % 2);
        // draw the twig as a thin line of 1px dots
        for (let k = r; k < r + len; k++) {
          ctx.fillRect((cx + co * k) | 0, (cy + si * k) | 0, 1, 1);
        }
      }

      // 2 tiny lighter sprigs (looser, brighter) on the outside
      ctx.fillStyle = '#cdaa6a';
      const sa1 = tw.rot * 1.3;
      const sa2 = tw.rot * 1.3 + Math.PI;
      ctx.fillRect((cx + Math.cos(sa1) * (r + 1)) | 0, (cy + Math.sin(sa1) * (r + 1)) | 0, 1, 1);
      ctx.fillRect((cx + Math.cos(sa2) * (r + 1)) | 0, (cy + Math.sin(sa2) * (r + 1)) | 0, 1, 1);
    }
    ctx.restore();
  }

  // Leaf-style ambient particles — PNW leaves, Denver snowflakes, NOLA fireflies.
  // All share the leaves[] array; behavior is differentiated by lf.glow / lf.blink.
  function drawLeaves() {
    if (!leaves.length) return;
    ctx.save();
    for (const lf of leaves) {
      const a = Math.min(1, lf.life / lf.max * 1.8);
      if (a <= 0) continue;
      const px = lf.x | 0;
      const py = lf.y | 0;
      if (lf.glow) {
        // ===== FIREFLY — pulsing glow with double halo for bloom =====
        const pulse = 0.5 + Math.sin(elapsed * 3 + lf.blink) * 0.5;
        ctx.globalAlpha = Math.max(0, a) * pulse;
        // outer faint halo (gives a "lantern of light" feel in dark scenes)
        ctx.fillStyle = 'rgba(253,224,71,0.15)';
        ctx.fillRect(px - 2, py - 2, 6, 6);
        // inner halo
        ctx.fillStyle = 'rgba(253,224,71,0.32)';
        ctx.fillRect(px - 1, py - 1, 4, 4);
        // body
        ctx.fillStyle = lf.shade;
        ctx.fillRect(px,     py,     2, 2);
        // bright core
        ctx.fillStyle = '#fffbeb';
        ctx.fillRect(px,     py,     1, 1);
        // tiny trailing glint to the side (suggests motion)
        ctx.globalAlpha = Math.max(0, a) * pulse * 0.4;
        ctx.fillStyle = 'rgba(253,224,71,0.7)';
        ctx.fillRect(px - 2, py + 1, 1, 1);
      } else if (lf.gull) {
        // ===== SEAGULL — M-shape wing flap with darker tips + body bob =====
        ctx.globalAlpha = Math.max(0, a) * 0.9;
        const flapUp = Math.sin(elapsed * 7 + lf.flap) > 0;
        // tiny vertical bob (mirrors flap phase)
        const bob = flapUp ? 0 : 1;
        const py2 = py + bob;
        // body — center 2px (slightly bigger silhouette than before)
        ctx.fillStyle = lf.shade;
        ctx.fillRect(px, py2, 2, 1);
        // wings — V or ^ shape, longer (3 segments per wing for a real "M")
        if (flapUp) {
          ctx.fillRect(px - 2, py2 - 1, 2, 1);
          ctx.fillRect(px + 2, py2 - 1, 2, 1);
          ctx.fillRect(px - 3, py2 - 2, 1, 1);
          ctx.fillRect(px + 4, py2 - 2, 1, 1);
          // outer tip
          ctx.fillRect(px - 4, py2 - 3, 1, 1);
          ctx.fillRect(px + 5, py2 - 3, 1, 1);
        } else {
          // wings down — broader spread
          ctx.fillRect(px - 2, py2 + 1, 2, 1);
          ctx.fillRect(px + 2, py2 + 1, 2, 1);
          ctx.fillRect(px - 4, py2 + 2, 2, 1);
          ctx.fillRect(px + 4, py2 + 2, 2, 1);
        }
        // dark wing tips
        ctx.fillStyle = '#7a8aa8';
        if (flapUp) {
          ctx.fillRect(px - 4, py2 - 3, 1, 1);
          ctx.fillRect(px + 5, py2 - 3, 1, 1);
        } else {
          ctx.fillRect(px - 5, py2 + 2, 1, 1);
          ctx.fillRect(px + 6, py2 + 2, 1, 1);
        }
      } else {
        // ===== LEAF / SNOWFLAKE — diamond shape with center accent =====
        ctx.globalAlpha = Math.max(0, a);
        // Wobble: alternate between "wide" and "tall" orientation based on slow sin
        const wobble = Math.sin(elapsed * 2 + (lf.flap || lf.blink || 0));
        ctx.fillStyle = lf.shade;
        if (wobble > 0) {
          // wide / falling-leaf orientation
          ctx.fillRect(px,     py,     2, 1);
          ctx.fillRect(px - 1, py + 1, 4, 1);
          ctx.fillRect(px,     py + 2, 2, 1);
        } else {
          // narrow / fluttering-edge orientation
          ctx.fillRect(px,     py - 1, 2, 1);
          ctx.fillRect(px,     py,     2, 1);
          ctx.fillRect(px,     py + 1, 2, 1);
          ctx.fillRect(px,     py + 2, 2, 1);
        }
        // bright center / vein (1 px brighter highlight)
        ctx.fillStyle = 'rgba(255,255,255,0.4)';
        ctx.fillRect(px,     py + 1, 1, 1);
        // For snowflakes (light shades), add a tiny 4-point cross
        if (lf.shade === '#f4ead8' || lf.shade === '#fff' || lf.shade === '#e7decf') {
          ctx.fillStyle = 'rgba(255,255,255,0.7)';
          ctx.fillRect(px,     py - 1, 1, 1);
          ctx.fillRect(px + 1, py + 1, 1, 1);
          ctx.fillRect(px - 1, py + 1, 1, 1);
          ctx.fillRect(px,     py + 3, 1, 1);
        }
      }
    }
    ctx.restore();
  }

  // Per-city ambient weather overlay — drawn after gameplay, under HUD/labels.
  // Pure visual flavor, no gameplay effect. Animation driven by `elapsed`.
  function drawWeather() {
    const c = currentCity();
    ctx.save();
    switch (c.key) {
      case 'SF':  drawWeatherFog();     break;
      case 'SEA':
      case 'PDX': drawWeatherDrizzle(); break;
      case 'MIA': drawWeatherSunshine(); break;
      case 'NYC': drawWeatherSteam();    break;
      // LA — clear sunny day, no overlay
    }
    ctx.restore();
  }

  // SF — horizontal fog bands drifting east across the canvas
  function drawWeatherFog() {
    // ===== AMBIENT FOG TINT — slightly muted cool overall =====
    ctx.fillStyle = 'rgba(220,228,240,0.06)';
    ctx.fillRect(0, HUD_H, W, H - HUD_H);

    // ===== 6 FOG BANDS at different depths — fluffier, with edge feathering =====
    // Each band has 4 puff layers stacked at slightly different opacities
    // so the silhouette doesn't read as a hard rectangle.
    const bands = [
      { y: 40,  speed: 8,  op: 0.18, h: 14, len: 130, dir:  1 },
      { y: 90,  speed: 5,  op: 0.10, h: 10, len: 100, dir: -1 },
      { y: 150, speed: 14, op: 0.14, h: 18, len: 150, dir:  1 },
      { y: 220, speed: 11, op: 0.16, h: 12, len: 110, dir: -1 },
      { y: 290, speed: 9,  op: 0.12, h: 16, len: 140, dir:  1 },
      { y: 360, speed: 6,  op: 0.08, h: 10, len:  90, dir: -1 },
    ];
    for (const b of bands) {
      // bidirectional drift — alternates layers for parallax depth
      const driftRaw = (elapsed * b.speed * b.dir) % (W + b.len + 60);
      const drift = b.dir > 0
        ? driftRaw - b.len - 30
        : W + 30 + driftRaw - b.len;
      // 4-layer puff: core, top puff, bottom puff, trailing wisp
      ctx.fillStyle = `rgba(220,230,240,${b.op})`;
      ctx.fillRect(drift,            b.y,            b.len,      b.h);
      // top fluff
      ctx.fillStyle = `rgba(220,230,240,${b.op * 0.7})`;
      ctx.fillRect(drift + 20,       b.y - 4,        b.len - 40, b.h - 6);
      ctx.fillRect(drift + b.len / 2 - 20, b.y - 6,  40,         b.h - 8);
      // bottom fluff
      ctx.fillRect(drift + 10,       b.y + b.h - 2,  b.len - 20, 6);
      ctx.fillRect(drift + b.len / 2, b.y + b.h,     30,         4);
      // soft feather edges (left + right tails)
      ctx.fillStyle = `rgba(220,230,240,${b.op * 0.5})`;
      ctx.fillRect(drift - 12,       b.y + 4,        12, b.h - 8);
      ctx.fillRect(drift + b.len,    b.y + 4,        12, b.h - 8);
      // thin trailing wisps (1px streaks behind the band, suggesting motion)
      ctx.fillStyle = `rgba(220,230,240,${b.op * 0.35})`;
      const wispX = b.dir > 0 ? drift - 28 : drift + b.len + 16;
      ctx.fillRect(wispX,            b.y + Math.floor(b.h / 2), 16, 1);
      ctx.fillRect(wispX + (b.dir > 0 ? -8 : 8), b.y + b.h - 4,  10, 1);
    }

    // ===== HEADLIGHT CONE HINT — soft cool glow above the player =====
    // (Just a static glow — doesn't follow the player, but adds atmosphere)
    ctx.fillStyle = 'rgba(180,200,220,0.04)';
    ctx.fillRect(0, H - 80, W, 80);
  }

  // SEA / PDX — diagonal drizzle drops falling steadily + splash ring on impact
  function drawWeatherDrizzle() {
    // Cool blue-grey tint
    ctx.fillStyle = 'rgba(40,60,80,0.07)';
    ctx.fillRect(0, HUD_H, W, H - HUD_H);

    // ===== FALLING DROPS — diagonal slashes =====
    ctx.fillStyle = 'rgba(180,200,220,0.55)';
    const N = 38;
    // Where each drop "lands" — use a stable per-drop ground line so we can
    // draw matching splashes there. Each drop is on its own vertical band; the
    // ground-y is randomized once per cycle via the per-drop seed.
    const groundLine = (seed) => {
      // map seed into mid-to-lower canvas area, deterministic per drop index
      const r = ((seed * 17 + 31) & 0xff) / 255;
      return HUD_H + 60 + r * (H - HUD_H - 100);
    };
    const splashes = [];   // collect impact positions for second pass
    for (let i = 0; i < N; i++) {
      const baseX = (i * 47) % W;
      // Total fall path length is groundY - HUD_H (drop's "lifetime")
      const gy = groundLine(i);
      const pathLen = gy - HUD_H + 20;
      // Drop falls in a continuous cycle; phase=0 is just above the top, phase=pathLen is at ground.
      const phase = (elapsed * 240 + i * 23) % pathLen;
      const x = baseX;
      const y = HUD_H + phase - 15;
      // Only draw the slash while above ground
      if (y < gy - 4) {
        ctx.fillStyle = 'rgba(180,200,220,0.55)';
        ctx.fillRect(x,     y,     1, 6);
        ctx.fillRect(x + 1, y + 3, 1, 4);
      } else {
        // Drop just hit — schedule a splash with age = how far past ground
        const age = (phase - (gy - HUD_H - 4)) / 18;   // 0..1+ over ~18px of fall
        if (age >= 0 && age <= 1) splashes.push({ x: x + 1, y: gy, age });
      }
    }

    // ===== SPLASH RINGS — tiny expanding ripple where each drop lands =====
    for (const s of splashes) {
      const r = 1 + s.age * 3;
      const a = (1 - s.age) * 0.7;
      ctx.fillStyle = `rgba(220,230,240,${a})`;
      // 4-pixel ring around impact point
      ctx.fillRect(s.x - r, s.y, 1, 1);
      ctx.fillRect(s.x + r, s.y, 1, 1);
      ctx.fillRect(s.x,     s.y - 1, 1, 1);
      ctx.fillRect(s.x,     s.y + 1, 1, 1);
      // tiny droplet bounce-up at the impact center
      if (s.age < 0.3) {
        ctx.fillStyle = `rgba(220,230,240,${0.5 * (1 - s.age / 0.3)})`;
        ctx.fillRect(s.x, s.y - 2 - Math.floor(s.age * 4), 1, 1);
      }
    }
  }

  // MIA — warm sun shafts from upper right + visible sun + heat-shimmer haze
  function drawWeatherSunshine() {
    // Warm overall haze tint (slightly stronger than before)
    ctx.fillStyle = 'rgba(255,180,100,0.06)';
    ctx.fillRect(0, HUD_H, W, H - HUD_H);

    // ===== VISIBLE SUN in upper-right corner with halo =====
    const sunX = W - 28;
    const sunY = HUD_H + 18;
    const pulse = 1 + Math.sin(elapsed * 2) * 0.06;
    // Outer halo (very faint, large)
    ctx.fillStyle = 'rgba(255,228,140,0.18)';
    const haloR = 16 * pulse;
    ctx.fillRect(sunX - haloR,     sunY - haloR + 4, haloR * 2, haloR * 2 - 8);
    ctx.fillRect(sunX - haloR + 4, sunY - haloR,     haloR * 2 - 8, haloR * 2);
    // Inner halo
    ctx.fillStyle = 'rgba(255,228,140,0.3)';
    const halo2 = 10 * pulse;
    ctx.fillRect(sunX - halo2,     sunY - halo2 + 2, halo2 * 2, halo2 * 2 - 4);
    ctx.fillRect(sunX - halo2 + 2, sunY - halo2,     halo2 * 2 - 4, halo2 * 2);
    // Bright sun disc (almost-round via 3 rect rows)
    ctx.fillStyle = '#fde047';
    ctx.fillRect(sunX - 3, sunY - 5, 6, 1);
    ctx.fillRect(sunX - 5, sunY - 4, 10, 2);
    ctx.fillRect(sunX - 6, sunY - 2, 12, 4);
    ctx.fillRect(sunX - 5, sunY + 2, 10, 2);
    ctx.fillRect(sunX - 3, sunY + 4, 6, 1);
    // Bright core
    ctx.fillStyle = '#fef9c3';
    ctx.fillRect(sunX - 2, sunY - 2, 4, 4);
    ctx.fillStyle = '#fff';
    ctx.fillRect(sunX - 1, sunY - 1, 2, 2);

    // ===== SOFT SUN SHAFTS streaming from sun toward lower-left =====
    ctx.save();
    ctx.globalAlpha = 0.07;
    ctx.fillStyle = '#ffd564';
    for (let i = 0; i < 5; i++) {
      const sxOff = i * 24 + Math.sin(elapsed * 0.3 + i) * 6;
      const sx = sunX - sxOff;
      ctx.fillRect(sx - 80, 0, 90, H);
    }
    ctx.restore();

    // ===== HEAT-SHIMMER HORIZON LINE — wobbly distortion strip mid-canvas =====
    ctx.save();
    ctx.globalAlpha = 0.12;
    ctx.fillStyle = '#ffd564';
    for (let i = 0; i < 14; i++) {
      const sx = (i * 24 + Math.floor(elapsed * 30)) % (W + 24) - 24;
      const wob = Math.sin(elapsed * 5 + i * 0.6) * 1.2;
      ctx.fillRect(sx, H * 0.55 + Math.round(wob), 18, 1);
      ctx.fillRect(sx + 4, H * 0.58 + Math.round(-wob), 14, 1);
    }
    ctx.restore();

    // ===== SPARKLE GLINTS — 4 staggered flashes around the sun =====
    const glints = [
      { x: sunX - 14, y: sunY + 8,  phase: 0.0,  len: 0.15 },
      { x: sunX - 30, y: sunY + 28, phase: 0.5,  len: 0.15 },
      { x: sunX - 6,  y: sunY + 22, phase: 0.25, len: 0.12 },
      { x: sunX - 50, y: sunY + 4,  phase: 0.75, len: 0.12 },
    ];
    const glintBase = (elapsed * 1.4) % 1;
    for (const g of glints) {
      const t = (glintBase - g.phase + 1) % 1;
      if (t < g.len) {
        const fade = 1 - t / g.len;
        ctx.fillStyle = 'rgba(255,255,255,' + (0.85 * fade) + ')';
        ctx.fillRect(g.x, g.y, 2, 2);
        // tiny 4-point sparkle
        ctx.fillRect(g.x - 1, g.y + 0.5, 1, 1);
        ctx.fillRect(g.x + 2, g.y + 0.5, 1, 1);
        ctx.fillRect(g.x + 0.5, g.y - 1, 1, 1);
        ctx.fillRect(g.x + 0.5, g.y + 2, 1, 1);
      }
    }
  }

  // NYC — steam plumes rising from manholes in the road
  function drawWeatherSteam() {
    // 3 manholes spread across lanes — each has its own oscillation phase
    // so plumes don't pulse in sync.
    const plumes = [
      { x: ROAD_X + LANE_W * 0.5 + 8,         phase: 0,    drift: -1 },
      { x: ROAD_X + LANE_W * 1.5,             phase: 0.7,  drift:  1 },
      { x: ROAD_X + ROAD_W - LANE_W * 0.5 - 8, phase: 1.4,  drift: -1 },
    ];
    const manholeY = H * 0.62;
    // Unified wind direction (slight horizontal drift — same wind for all plumes)
    const windPhase = Math.sin(elapsed * 0.6) * 0.5;
    for (const p of plumes) {
      // ===== ROUND-ISH MANHOLE COVER with cast-iron grate pattern =====
      // Outer dark ring
      ctx.fillStyle = '#0a0a0a';
      ctx.fillRect(p.x - 7, manholeY,         14, 4);
      ctx.fillRect(p.x - 6, manholeY - 1,     12, 1);
      ctx.fillRect(p.x - 6, manholeY + 4,     12, 1);
      // Lighter inner disc (cast iron)
      ctx.fillStyle = '#2a2a2a';
      ctx.fillRect(p.x - 5, manholeY,         10, 4);
      // Subtle highlight on top edge (catches streetlight)
      ctx.fillStyle = '#4a4a4a';
      ctx.fillRect(p.x - 4, manholeY,         8, 1);
      // 3 grate slots venting steam
      ctx.fillStyle = '#0a0a0a';
      ctx.fillRect(p.x - 4, manholeY + 1,     2, 2);
      ctx.fillRect(p.x - 1, manholeY + 1,     2, 2);
      ctx.fillRect(p.x + 2, manholeY + 1,     2, 2);
      // Warm orange glow from underneath (steam pipe heat — NYC vibe)
      ctx.fillStyle = 'rgba(252,90,30,0.25)';
      ctx.fillRect(p.x - 4, manholeY + 1,     2, 2);
      ctx.fillRect(p.x - 1, manholeY + 1,     2, 2);
      ctx.fillRect(p.x + 2, manholeY + 1,     2, 2);

      // ===== STEAM PUFFS rising upward + warm glow at base =====
      // Base warm glow tint right above manhole — orange tinted by streetlight
      ctx.fillStyle = 'rgba(252,180,90,0.18)';
      ctx.fillRect(p.x - 4, manholeY - 6,     8, 6);

      // 7 puffs (was 6), each with size + sway + horizontal wind drift
      for (let i = 0; i < 7; i++) {
        const t = (elapsed * 0.55 + p.phase + i * 0.28) % 2;
        const py = manholeY - t * 80;
        const op = (1 - t / 2) * 0.5;
        if (op <= 0) continue;
        const size = 3 + i;   // grows as it rises
        // Sway from local turbulence + horizontal drift from "wind"
        const swayX = Math.sin(elapsed * 1.8 + i + p.phase) * 4 + windPhase * t * 6 + p.drift * t * 2;
        // Bottom puffs warm-tinted (still near the manhole heat),
        // upper puffs cool-grey (cooled steam) — gradient by t
        const warmth = Math.max(0, 1 - t * 1.5);
        const r = Math.round(200 + warmth * 50);
        const g = Math.round(210 + warmth * 10);
        const b = Math.round(220 - warmth * 20);
        ctx.fillStyle = `rgba(${r},${g},${b},${op})`;
        // Cloud body — irregular silhouette via 3 rects
        ctx.fillRect(p.x + swayX - size / 2,     py - size,         size,     size);
        ctx.fillRect(p.x + swayX - size / 2 - 1, py - size + 1,     1,        size - 2);
        ctx.fillRect(p.x + swayX + size / 2,     py - size + 1,     1,        size - 2);
        // top fluff (lighter)
        ctx.fillStyle = `rgba(${r},${g},${b},${op * 0.55})`;
        ctx.fillRect(p.x + swayX - size / 2 + 1, py - size - 1,     size - 2, 1);
        // bottom shadow
        ctx.fillStyle = `rgba(${r - 20},${g - 20},${b - 20},${op * 0.4})`;
        ctx.fillRect(p.x + swayX - size / 2 + 1, py,                size - 2, 1);
      }

      // ===== INITIAL JET — bright thin column right above the manhole =====
      // (high-pressure steam coming out before it diffuses)
      const jetA = 0.35 + Math.sin(elapsed * 8 + p.phase) * 0.10;
      ctx.fillStyle = `rgba(244,244,250,${jetA})`;
      ctx.fillRect(p.x - 1, manholeY - 8, 2, 8);
      ctx.fillRect(p.x,     manholeY - 12, 1, 4);
    }
  }

  // Welcome sign — modeled on real US highway "Welcome to X" boards:
  // earthy backing, double border in the city accent, posts on each side.
  function drawBanner() {
    if (bannerTimer <= 0 || !bannerCity) return;
    const c = bannerCity;
    const life = 2.6;
    const f = 1 - bannerTimer / life;   // 0..1 progress
    const a = f < 0.15 ? f / 0.15
            : f > 0.78 ? (1 - f) / 0.22
            : 1;
    ctx.save();
    ctx.globalAlpha = Math.max(0, Math.min(1, a));

    const bw = W - 28, bh = 48;
    const bx = (W - bw) / 2;
    // ===== SLIDE-IN ANIMATION — drop from above into final position =====
    const slideT = Math.min(1, f / 0.20);   // slide-in over first 20%
    const slideEase = 1 - Math.pow(1 - slideT, 3);   // ease-out-cubic
    const byBase = HUD_H + 22;
    const by = Math.round(byBase - (1 - slideEase) * 50);

    // ===== DROP SHADOW under the entire board (suggests it floats off canvas) =====
    ctx.fillStyle = 'rgba(0,0,0,0.45)';
    ctx.fillRect(bx + 2, by + 4, bw, bh);

    // wooden posts behind the board
    ctx.fillStyle = '#3a2818';
    ctx.fillRect(bx + 6,      by + bh - 2, 3, 10);
    ctx.fillRect(bx + bw - 9, by + bh - 2, 3, 10);
    // post highlight
    ctx.fillStyle = '#5a3a1c';
    ctx.fillRect(bx + 6,      by + bh - 2, 1, 10);
    ctx.fillRect(bx + bw - 9, by + bh - 2, 1, 10);

    // outer plank (warm brown — highway brown sign)
    ctx.fillStyle = '#4a2f1c';
    ctx.fillRect(bx, by, bw, bh);
    // plank top highlight (light from above)
    ctx.fillStyle = '#6b3a1c';
    ctx.fillRect(bx, by, bw, 1);
    // plank bottom shadow
    ctx.fillStyle = '#2a1a0c';
    ctx.fillRect(bx, by + bh - 1, bw, 1);

    // inner board (cream-ish field, like reflective sign face)
    ctx.fillStyle = '#f4ead8';
    ctx.fillRect(bx + 3, by + 3, bw - 6, bh - 6);
    // inner board top highlight (very subtle)
    ctx.fillStyle = '#fff8e8';
    ctx.fillRect(bx + 3, by + 3, bw - 6, 1);

    // double accent border (classic highway sign trim)
    ctx.fillStyle = c.accent;
    ctx.fillRect(bx + 3, by + 3, bw - 6, 1);
    ctx.fillRect(bx + 3, by + bh - 4, bw - 6, 1);
    ctx.fillRect(bx + 3, by + 3, 1, bh - 6);
    ctx.fillRect(bx + bw - 4, by + 3, 1, bh - 6);
    // inner pinstripe
    ctx.fillRect(bx + 5, by + 5, bw - 10, 1);
    ctx.fillRect(bx + 5, by + bh - 6, bw - 10, 1);

    // ===== CORNER BOLT RIVETS (real highway signs have these) =====
    ctx.fillStyle = c.accent;
    ctx.fillRect(bx + 7,         by + 7,        2, 2);
    ctx.fillRect(bx + bw - 9,    by + 7,        2, 2);
    ctx.fillRect(bx + 7,         by + bh - 9,   2, 2);
    ctx.fillRect(bx + bw - 9,    by + bh - 9,   2, 2);
    // rivet highlights (catches light)
    ctx.fillStyle = 'rgba(255,255,255,0.6)';
    ctx.fillRect(bx + 7,         by + 7,        1, 1);
    ctx.fillRect(bx + bw - 9,    by + 7,        1, 1);
    ctx.fillRect(bx + 7,         by + bh - 9,   1, 1);
    ctx.fillRect(bx + bw - 9,    by + bh - 9,   1, 1);

    // ===== SUN GLINT — sweeps left→right across the sign during hold phase =====
    // Only renders during the middle (hold) portion to suggest reflection
    if (f > 0.25 && f < 0.65) {
      const glintT = (f - 0.25) / 0.40;
      const gx = bx + 3 + Math.round(glintT * (bw - 16));
      ctx.fillStyle = 'rgba(255,255,255,0.35)';
      ctx.fillRect(gx, by + 4, 6, bh - 8);
      ctx.fillStyle = 'rgba(255,255,255,0.15)';
      ctx.fillRect(gx - 3, by + 4, 3, bh - 8);
      ctx.fillRect(gx + 6, by + 4, 3, bh - 8);
    }

    // "WELCOME TO" — small, brown, like the real signs
    ctx.fillStyle = '#4a2f1c';
    ctx.font = 'bold 7px ui-monospace, monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('WELCOME TO', bx + bw / 2, by + 12);

    // City name — big, accent-colored with drop shadow
    ctx.fillStyle = 'rgba(0,0,0,0.25)';
    ctx.font = 'bold 12px ui-monospace, monospace';
    ctx.fillText(c.name, bx + bw / 2 + 1, by + 26);
    ctx.fillStyle = c.accent;
    ctx.fillText(c.name, bx + bw / 2, by + 25);

    // Tagline — small italic at the bottom
    ctx.fillStyle = '#6b3a1c';
    ctx.font = 'italic 7px ui-monospace, monospace';
    ctx.fillText(c.tagline, bx + bw / 2, by + 38);

    ctx.textBaseline = 'alphabetic';
    ctx.restore();
  }

  let pickerRects = [];
  let retryRect = null;
  let repairRect = null;   // hit zone for the repair prompt during gameplay
  let shareRect = null;    // hit zone for COPY SCORE button on win screen
  let shareFlashT = 0;     // shows "COPIED!" feedback when share button used
  let backRect = null;     // hit zone for "BACK TO TESTS" exit on game-over/win

  // Navigate the top-level window back to DMVSOS practice tests. Works in BOTH
  // standalone (/break.html opened directly) and embedded modes (iframe inside
  // BreakButton overlay) since the iframe is same-origin with the parent app.
  // Falls back to dmvsos.com if for any reason top-level access throws.
  function exitToTests() {
    try {
      if (window.top && window.top !== window) {
        // Embedded: close the overlay if a parent listener exists, else navigate.
        try { window.parent.postMessage({ type: 'dmvsos:exit-game' }, '*'); } catch (_) {}
        window.top.location.href = '/';
      } else {
        window.location.href = '/';
      }
    } catch (_) {
      window.location.href = 'https://dmvsos.com/';
    }
  }

  // ===== WIN SCREEN — celebrates collecting all 5 LICENSES =====
  function drawWinScreen() {
    // golden backdrop (different from red game-over)
    ctx.fillStyle = '#1a0d08';
    ctx.fillRect(0, 0, W, H);
    // pulsing gold halo
    const haloPulse = 0.4 + Math.sin(elapsed * 3) * 0.2;
    ctx.fillStyle = `rgba(252,204,21,${haloPulse * 0.25})`;
    ctx.fillRect(0, 0, W, H);
    // scanlines for retro feel
    ctx.fillStyle = 'rgba(0,0,0,0.18)';
    for (let sy = 0; sy < H; sy += 3) ctx.fillRect(0, sy, W, 1);

    ctx.textAlign = 'center';

    // TROPHY 🏆 icon — pixel art at top
    const tcx = W / 2;
    const tcy = 60;
    // cup body
    ctx.fillStyle = '#fde047';
    ctx.fillRect(tcx - 12, tcy - 14, 24, 18);
    ctx.fillStyle = '#fef9c3';
    ctx.fillRect(tcx - 12, tcy - 14, 24, 4);   // shine top
    ctx.fillStyle = '#a16207';
    ctx.fillRect(tcx + 8,  tcy - 10, 4, 12);   // shadow side
    // handles
    ctx.fillStyle = '#facc15';
    ctx.fillRect(tcx - 16, tcy - 10, 4, 8);
    ctx.fillRect(tcx + 12, tcy - 10, 4, 8);
    // stem
    ctx.fillStyle = '#a16207';
    ctx.fillRect(tcx - 4, tcy + 4, 8, 4);
    // base
    ctx.fillStyle = '#fde047';
    ctx.fillRect(tcx - 10, tcy + 8, 20, 3);
    ctx.fillRect(tcx - 12, tcy + 11, 24, 2);

    // ===== TITLE "EXAM SKIPPER LICENSED!" — SoR3 style =====
    const titleT = Math.min(1, gameOverT / 0.5);
    const titleEase = 1 - Math.pow(1 - titleT, 4);
    const titleScale = 2.0 - 1.0 * titleEase;
    ctx.save();
    ctx.translate(W / 2, 100);
    ctx.scale(titleScale, titleScale);
    ctx.translate(-W / 2, -100);
    ctx.font = 'italic bold 18px ui-monospace, monospace';
    // black outline
    ctx.fillStyle = '#0a0000';
    [[-2,0],[2,0],[0,-2],[0,2]].forEach(([dx,dy]) => {
      ctx.fillText('YOU WIN, SKIPPER!', W / 2 + dx, 100 + dy);
    });
    // gold body
    ctx.fillStyle = '#fde047';
    ctx.fillText('YOU WIN, SKIPPER!', W / 2, 100);
    ctx.restore();

    // Subtitle
    const subT = Math.max(0, Math.min(1, (gameOverT - 0.5) / 0.3));
    if (subT > 0) {
      ctx.save();
      ctx.globalAlpha = subT;
      ctx.font = 'bold 10px ui-monospace, monospace';
      ctx.fillStyle = '#fff';
      ctx.fillText('5/5 LICENSES COLLECTED', W / 2, 124);
      ctx.fillStyle = '#fde047';
      ctx.font = 'italic 9px ui-monospace, monospace';
      ctx.fillText('· DMV CERTIFIED ·', W / 2, 138);
      ctx.restore();
    }

    // Final score chip + time-to-win
    ctx.font = '9px ui-monospace, monospace';
    ctx.fillStyle = '#7a8aa8';
    ctx.fillText('FINAL SCORE', W / 2, 162);
    ctx.font = 'bold 32px ui-monospace, monospace';
    ctx.fillStyle = COL_PICK;
    ctx.fillText(String(score), W / 2, 196);
    // time-to-win badge (small, italic, under score)
    const secs = Math.floor(elapsed);
    const mm = (secs / 60) | 0, ss = secs % 60;
    const timeStr = mm + ':' + String(ss).padStart(2, '0');
    ctx.font = 'italic bold 9px ui-monospace, monospace';
    ctx.fillStyle = '#fde047';
    ctx.fillText('WON IN ' + timeStr, W / 2, 210);

    // ===== HALL OF FAME — last 5 winners =====
    let winners = [];
    try { winners = JSON.parse(localStorage.getItem('chill.winners') || '[]'); } catch (_) {}
    const panelX = 16, panelY = 218, panelW = W - 32, panelH = 130;
    ctx.fillStyle = 'rgba(0,0,0,0.55)';
    ctx.fillRect(panelX + 2, panelY + 3, panelW, panelH);
    ctx.fillStyle = 'rgba(12,40,86,0.7)';
    ctx.fillRect(panelX, panelY, panelW, panelH);
    ctx.fillStyle = '#fde047';
    ctx.fillRect(panelX, panelY,             panelW, 1);
    ctx.fillRect(panelX, panelY + panelH - 1, panelW, 1);
    ctx.font = 'bold 9px ui-monospace, monospace';
    ctx.fillStyle = '#fde047';
    ctx.fillText('★ HALL OF FAME ★', W / 2, panelY + 12);
    if (winners.length === 0) {
      ctx.font = '8px ui-monospace, monospace';
      ctx.fillStyle = '#7a8aa8';
      ctx.fillText('YOU ARE THE FIRST!', W / 2, panelY + 30);
      ctx.fillText('SAVING TO HALL OF FAME...', W / 2, panelY + 44);
    } else {
      ctx.font = '7px ui-monospace, monospace';
      ctx.textAlign = 'left';
      let ly = panelY + 26;
      for (let i = 0; i < Math.min(5, winners.length); i++) {
        const w = winners[i];
        ctx.fillStyle = i === 0 ? '#facc15' : '#cfd8e8';
        ctx.fillText('#' + (i + 1) + ' ' + (w.name || 'ANON').slice(0, 14), panelX + 8, ly);
        // score (right) + time-to-win in parens
        ctx.textAlign = 'right';
        const scoreStr = String(w.score) + (w.time ? '  ' + w.time + 's' : '');
        ctx.fillText(scoreStr, panelX + panelW - 8, ly);
        ctx.textAlign = 'left';
        if (w.comment) {
          ctx.fillStyle = '#7a8aa8';
          ctx.font = 'italic 6px ui-monospace, monospace';
          ctx.fillText('"' + w.comment.slice(0, 32) + '"', panelX + 14, ly + 8);
          ctx.font = '7px ui-monospace, monospace';
          ly += 8;
        }
        ly += 12;
        if (ly > panelY + panelH - 10) break;
      }
      ctx.textAlign = 'center';
    }

    // RETRY button — moved up to leave room for SHARE below
    const rbw = 200, rbh = 38;
    const rbx = (W - rbw) / 2;
    const rby = H - 105;
    const pulse = 1 + Math.sin(elapsed * 4) * 0.03;
    ctx.save();
    ctx.translate(W / 2, rby + rbh / 2);
    ctx.scale(pulse, pulse);
    ctx.translate(-W / 2, -(rby + rbh / 2));
    ctx.fillStyle = 'rgba(0,0,0,0.55)';
    ctx.fillRect(rbx, rby + 3, rbw, rbh);
    ctx.fillStyle = '#fde047';
    ctx.fillRect(rbx, rby, rbw, rbh);
    ctx.fillStyle = '#fef9c3';
    ctx.fillRect(rbx, rby, rbw, 2);
    ctx.fillStyle = '#a16207';
    ctx.fillRect(rbx, rby + rbh - 3, rbw, 3);
    ctx.fillStyle = '#0a0000';
    ctx.font = 'bold 13px ui-monospace, monospace';
    ctx.fillText('PLAY AGAIN', W / 2, rby + 24);
    ctx.restore();
    retryRect = { x: rbx, y: rby, w: rbw, h: rbh };

    // SHARE / COPY SCORE button — secondary CTA below RETRY
    const sbw = 200, sbh = 32;
    const sbx = (W - sbw) / 2;
    const sby = H - 60;
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(sbx, sby + 2, sbw, sbh);
    ctx.fillStyle = '#1e40af';
    ctx.fillRect(sbx, sby, sbw, sbh);
    ctx.fillStyle = '#3b82f6';
    ctx.fillRect(sbx, sby, sbw, 2);
    ctx.fillStyle = '#0c2856';
    ctx.fillRect(sbx, sby + sbh - 2, sbw, 2);
    // border highlights
    ctx.fillStyle = '#fde047';
    ctx.fillRect(sbx, sby,           sbw, 1);
    ctx.fillRect(sbx, sby + sbh - 1, sbw, 1);
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 11px ui-monospace, monospace';
    // either "COPY SCORE" or "COPIED!" flash for 1.2s
    const shareLabel = shareFlashT > 0 ? '✓ COPIED!' : '📋 COPY SCORE';
    ctx.fillText(shareLabel, W / 2, sby + 20);
    shareRect = { x: sbx, y: sby, w: sbw, h: sbh };
    pickerRects = [];

    // BACK TO TESTS — small secondary exit below the share button so winners
    // can return to DMVSOS practice without hunting for a way out.
    const wBackW = 156, wBackH = 18;
    const wBackX = (W - wBackW) / 2;
    const wBackY = sby + sbh + 6;
    ctx.fillStyle = '#0f1d3a';
    ctx.fillRect(wBackX, wBackY, wBackW, wBackH);
    ctx.fillStyle = '#fde047';
    ctx.fillRect(wBackX, wBackY, wBackW, 1);
    ctx.fillRect(wBackX, wBackY + wBackH - 1, wBackW, 1);
    ctx.fillRect(wBackX, wBackY, 1, wBackH);
    ctx.fillRect(wBackX + wBackW - 1, wBackY, 1, wBackH);
    ctx.fillStyle = '#fde047';
    ctx.font = 'bold 9px ui-monospace, monospace';
    ctx.fillText('← BACK TO DMVSOS TESTS', W / 2, wBackY + 13);
    backRect = { x: wBackX, y: wBackY, w: wBackW, h: wBackH };

    // brand footer
    ctx.fillStyle = '#7a8aa8';
    ctx.font = '7px ui-monospace, monospace';
    ctx.fillText('DMVSOS · STUDY · SKIP · REPEAT', W / 2, H - 14);
    ctx.font = '6px ui-monospace, monospace';
    ctx.fillText('DMVSOS.COM · v1.0', W / 2, H - 6);
    ctx.textAlign = 'left';
  }

  function drawGameOver() {
    // If the player WON — render the celebration variant
    if (gameWon) { drawWinScreen(); return; }
    // dark backdrop
    ctx.fillStyle = 'rgba(5,9,19,0.92)';
    ctx.fillRect(0, 0, W, H);

    ctx.textAlign = 'center';

    // Death flash — bright red overlay that fades out in the first 0.35s
    if (gameOverT < 0.35) {
      const flashA = 1 - (gameOverT / 0.35);
      ctx.fillStyle = `rgba(220,38,38,${flashA * 0.5})`;
      ctx.fillRect(0, 0, W, H);
    }

    // SKIPPER CALLOUT — friendly "EY EXAM SKIPPER!" line above the title.
    // Fades in slightly delayed after the title slams.
    const calloutT = Math.max(0, Math.min(1, (gameOverT - 0.5) / 0.35));
    if (calloutT > 0) {
      ctx.save();
      ctx.globalAlpha = calloutT;
      ctx.font = 'bold 10px ui-monospace, monospace';
      ctx.textAlign = 'center';
      // drop shadow
      ctx.fillStyle = 'rgba(0,0,0,0.6)';
      ctx.fillText(skipperCallout, W / 2 + 1, 39);
      // accent yellow text (DMVSOS brand vibe)
      ctx.fillStyle = '#facc15';
      ctx.fillText(skipperCallout, W / 2, 38);
      ctx.restore();
    }

    // GAME OVER title — SoR3-style 5-layer slam-in with twist + chunky outlines
    const titleT = Math.min(1, gameOverT / 0.45);
    const titleEase = 1 - Math.pow(1 - titleT, 4);
    const titleScale = 2.5 - 1.5 * titleEase;
    const titleRot = (1 - titleEase) * -0.08;
    ctx.save();
    ctx.translate(W / 2, 78);
    ctx.scale(titleScale, titleScale);
    ctx.rotate(titleRot);
    ctx.translate(-W / 2, -78);
    ctx.font = 'italic bold 26px ui-monospace, monospace';
    ctx.textAlign = 'center';
    const gtx = W / 2;
    const gty = 78;
    // 1) Thick BLACK outline (8-direction)
    ctx.fillStyle = '#0a0000';
    [[-2,0],[2,0],[0,-2],[0,2],[-2,-2],[2,-2],[-2,2],[2,2]].forEach(([dx,dy]) => {
      ctx.fillText('GAME OVER', gtx + dx, gty + dy);
    });
    // 2) YELLOW border (4-direction)
    ctx.fillStyle = '#fde047';
    [[-1,0],[1,0],[0,-1],[0,1]].forEach(([dx,dy]) => {
      ctx.fillText('GAME OVER', gtx + dx, gty + dy);
    });
    // 3) DARK RED shadow
    ctx.fillStyle = '#7f1d1d';
    ctx.fillText('GAME OVER', gtx, gty + 1);
    // 4) RED main body
    ctx.fillStyle = '#dc2626';
    ctx.fillText('GAME OVER', gtx, gty);
    // 5) YELLOW top-strip highlight
    ctx.fillStyle = '#fde047';
    ctx.save();
    ctx.beginPath();
    ctx.rect(0, gty - 20, W, 8);
    ctx.clip();
    ctx.fillText('GAME OVER', gtx, gty);
    ctx.restore();
    ctx.restore();

    // STREAK badge — top-right "🔥 X-DAY STREAK" red pill, loss-aversion hook
    const streak = getStreak();
    if (streak.count >= 2) {
      ctx.save();
      ctx.font = 'bold 9px ui-monospace, monospace';
      ctx.textAlign = 'right';
      const stText = '🔥 ' + streak.count + '-DAY STREAK';
      const stTW = ctx.measureText(stText).width;
      const stPW = Math.ceil(stTW) + 14;
      const stPH = 16;
      const stPX = W - stPW - 6;
      const stPY = 6;
      // ember glow halo (red, pulses subtly to suggest "your streak is on fire")
      const emberA = 0.18 + Math.sin(elapsed * 3.5) * 0.08;
      ctx.fillStyle = `rgba(220,38,38,${emberA})`;
      ctx.fillRect(stPX - 3, stPY + 2,        stPW + 6, stPH - 4);
      ctx.fillRect(stPX - 1, stPY,            stPW + 2, stPH);
      // drop shadow
      ctx.fillStyle = 'rgba(0,0,0,0.55)';
      ctx.fillRect(stPX + 1, stPY + 2, stPW, stPH);
      // dark red pill
      ctx.fillStyle = '#7f1d1d';
      ctx.fillRect(stPX, stPY, stPW, stPH);
      // accent borders (thicker — 2px)
      ctx.fillStyle = '#dc2626';
      ctx.fillRect(stPX, stPY,            stPW, 2);
      ctx.fillRect(stPX, stPY + stPH - 2, stPW, 2);
      // top inner highlight (raised pill feel)
      ctx.fillStyle = 'rgba(255,255,255,0.3)';
      ctx.fillRect(stPX, stPY, stPW, 1);
      // text with subtle shadow
      ctx.fillStyle = 'rgba(0,0,0,0.5)';
      ctx.textBaseline = 'middle';
      ctx.fillText(stText, W - 12, stPY + stPH / 2 + 1.5);
      ctx.fillStyle = '#fff';
      ctx.fillText(stText, W - 13, stPY + stPH / 2 + 0.5);
      ctx.textBaseline = 'alphabetic';
      ctx.restore();
    }

    // FAIL stamp — appears with a brief delay + fade-in + rotation "thump"
    // Designed to look like a real ink rubber stamp: thick border, grunge gaps,
    // uneven ink density, larger pop-in scale for impact.
    const stampDelay = 0.45;
    const stampT = Math.max(0, Math.min(1, (gameOverT - stampDelay) / 0.25));
    if (stampT > 0) {
      const stampEase = 1 - Math.pow(1 - stampT, 4);
      ctx.save();
      ctx.globalAlpha = stampEase * 0.85;
      ctx.font = 'bold 9px ui-monospace, monospace';
      const ftW = ctx.measureText(failLine).width;
      const stampW = Math.min(W - 32, Math.ceil(ftW) + 30);
      const stampH = 18;
      const stampX = (W - stampW) / 2;
      const stampY = 100;
      // ===== STAMP SLAM — scale-in pops past 1.0× then settles =====
      const slamScale = stampEase < 1 ? 1 + (1 - stampEase) * 0.35 : 1;
      // slight rotation for stamp-slam feel
      const rot = (1 - stampEase) * 0.15 - 0.04;
      ctx.translate(W / 2, stampY + stampH / 2);
      ctx.rotate(rot);
      ctx.scale(slamScale, slamScale);
      ctx.translate(-W / 2, -(stampY + stampH / 2));

      // ===== THICK BORDER (2px on outer + 1px inner) =====
      ctx.fillStyle = COL_OBST;
      // outer 2px frame
      ctx.fillRect(stampX,                  stampY,              stampW, 2);
      ctx.fillRect(stampX,                  stampY + stampH - 2, stampW, 2);
      ctx.fillRect(stampX,                  stampY,              2,      stampH);
      ctx.fillRect(stampX + stampW - 2,     stampY,              2,      stampH);
      // inner 1px frame (creates double-border rubber stamp feel)
      ctx.fillRect(stampX + 3,              stampY + 3,          stampW - 6, 1);
      ctx.fillRect(stampX + 3,              stampY + stampH - 4, stampW - 6, 1);
      ctx.fillRect(stampX + 3,              stampY + 3,          1, stampH - 6);
      ctx.fillRect(stampX + stampW - 4,     stampY + 3,          1, stampH - 6);

      // ===== GRUNGE GAPS — punch small holes in the border (uneven ink) =====
      ctx.globalCompositeOperation = 'destination-out';
      ctx.fillStyle = '#fff';
      // 4 gaps along top, 4 along bottom, 2 each side
      ctx.fillRect(stampX + Math.floor(stampW * 0.18),  stampY,     2, 1);
      ctx.fillRect(stampX + Math.floor(stampW * 0.42),  stampY + 1, 3, 1);
      ctx.fillRect(stampX + Math.floor(stampW * 0.72),  stampY,     2, 1);
      ctx.fillRect(stampX + Math.floor(stampW * 0.25),  stampY + stampH - 1, 2, 1);
      ctx.fillRect(stampX + Math.floor(stampW * 0.55),  stampY + stampH - 2, 3, 1);
      ctx.fillRect(stampX + Math.floor(stampW * 0.85),  stampY + stampH - 1, 2, 1);
      ctx.fillRect(stampX,            stampY + Math.floor(stampH * 0.3), 1, 2);
      ctx.fillRect(stampX + stampW - 1, stampY + Math.floor(stampH * 0.7), 1, 2);
      ctx.globalCompositeOperation = 'source-over';

      // ===== TEXT with uneven ink density (slight shadow + main) =====
      ctx.textBaseline = 'middle';
      ctx.font = 'bold 9px ui-monospace, monospace';
      // ghost shadow (suggests ink offset)
      ctx.globalAlpha = stampEase * 0.4;
      ctx.fillStyle = COL_OBST;
      ctx.fillText(failLine, W / 2 + 1, stampY + stampH / 2 + 1);
      // main text
      ctx.globalAlpha = stampEase * 0.95;
      ctx.fillText(failLine, W / 2, stampY + stampH / 2);
      ctx.textBaseline = 'alphabetic';
      ctx.restore();
    }

    // RUN STATS — chips with stagger slide-in animation (from below, fade in)
    if (runStats) {
      ctx.save();
      ctx.font = '7px ui-monospace, monospace';
      ctx.textAlign = 'center';
      const chips = [
        { label: 'DODGED',   val: runStats.hazards,    c: '#cfd8e8' },
        { label: 'COINS',    val: runStats.coins,      c: '#facc15' },
        { label: '$',        val: runStats.cash || 0,  c: '#22c55e' },
        { label: 'PEAK ×',   val: runStats.maxCombo,   c: '#5ee08b' },
        { label: 'LIC',      val: licensesGot || 0,    c: '#3b82f6' },
        { label: '★',        val: runStats.jackpots,   c: '#f59e0b' },
      ];
      const chipW = (W - 20) / chips.length;
      for (let i = 0; i < chips.length; i++) {
        const chip = chips[i];
        const cx = 10 + chipW * (i + 0.5);
        // stagger delay 0.06s per chip, animate over 0.30s
        const delay = i * 0.06;
        const tRaw = Math.max(0, Math.min(1, (gameOverT - delay) / 0.30));
        const ease = 1 - Math.pow(1 - tRaw, 3);   // ease-out-cubic
        const offsetY = (1 - ease) * 30;
        ctx.globalAlpha = ease;
        ctx.fillStyle = '#7a8aa8';
        ctx.font = '7px ui-monospace, monospace';
        ctx.fillText(chip.label, cx, 124 + offsetY);
        ctx.font = 'bold 9px ui-monospace, monospace';
        ctx.fillStyle = chip.val > 0 ? chip.c : '#3a4a6a';
        ctx.fillText(String(chip.val), cx, 134 + offsetY);
      }
      ctx.restore();
    }

    // Staggered fade-in helper for the score-and-rank stack
    // Each line: small upward slide + alpha ramp, after the score count settles
    const stageIn = (delay, dur) => {
      const t = Math.max(0, Math.min(1, (gameOverT - delay) / dur));
      const ease = 1 - Math.pow(1 - t, 3);
      return { a: ease, dy: (1 - ease) * 8 };
    };

    // DAILY CHALLENGE line — fades in right after chips settle
    const daily = getDailyChallenge();
    if (daily) {
      const sDaily = stageIn(0.55, 0.25);
      if (sDaily.a > 0) {
        const beatNow = score >= daily.target;
        const wasAchieved = daily.achieved;
        let dailyText, dailyColor;
        if (wasAchieved) {
          dailyText = '✓ TODAY: BEAT ' + daily.target + ' · DONE';
          dailyColor = '#5ee08b';
        } else if (beatNow) {
          dailyText = '★ TODAY: BEAT ' + daily.target + ' · ' + score + ' ★';
          dailyColor = '#facc15';
        } else {
          dailyText = 'TODAY: BEAT ' + daily.target + '   (-' + (daily.target - score) + ')';
          dailyColor = '#cfd8e8';
        }
        ctx.save();
        ctx.globalAlpha = sDaily.a;
        ctx.font = 'bold 10px ui-monospace, monospace';
        ctx.fillStyle = dailyColor;
        ctx.fillText(dailyText, W / 2, 146 + sDaily.dy);
        ctx.restore();
      }
    }

    // SCORE label
    ctx.font = '10px ui-monospace, monospace';
    ctx.fillStyle = '#7a8aa8';
    ctx.fillText('SCORE', W / 2, 154);

    // score value (big, accent green) — counts up over the first 0.8s
    const countT = Math.min(1, gameOverT / 0.8);
    const easeCount = 1 - Math.pow(1 - countT, 3);
    const shownScore = Math.floor(score * easeCount);
    ctx.font = 'bold 30px ui-monospace, monospace';
    ctx.fillStyle = COL_PICK;
    ctx.fillText(String(shownScore), W / 2, 188);

    // NEW BEST badge OR plain BEST line — staggered fade-in after score settles
    const sBest = stageIn(0.85, 0.25);
    if (sBest.a > 0) {
      ctx.save();
      ctx.globalAlpha = sBest.a;
      if (score === best && best > 0) {
        // flashing celebration
        const onB = Math.floor(elapsed * 4) % 2 === 0;
        ctx.fillStyle = onB ? '#facc15' : COL_PICK;
        ctx.font = 'bold 11px ui-monospace, monospace';
        ctx.fillText('★ NEW BEST ★', W / 2, 208 + sBest.dy);
      } else {
        ctx.fillStyle = '#7a8aa8';
        ctx.font = '10px ui-monospace, monospace';
        ctx.fillText('BEST ' + String(best).padStart(4, '0'), W / 2, 208 + sBest.dy);
      }
      ctx.restore();
    }

    // RANK line — staggered fade-in after BEST
    const refScore = Math.max(score, best);
    const ri = rankIndexFor(refScore);
    const rank = RANKS[ri];
    const nextRank = ri < RANKS.length - 1 ? RANKS[ri + 1] : null;
    const sRank = stageIn(1.00, 0.25);
    if (sRank.a > 0) {
      ctx.save();
      ctx.globalAlpha = sRank.a;
      ctx.font = 'bold 10px ui-monospace, monospace';
      ctx.fillStyle = rank.color;
      if (nextRank) {
        const remaining = Math.max(0, nextRank.threshold - refScore);
        ctx.fillText('RANK: ' + rank.name + '  ·  ' + remaining + ' TO ' + nextRank.name,
                     W / 2, 226 + sRank.dy);
      } else {
        // max tier reached — flashing
        const onR = Math.floor(elapsed * 3) % 2 === 0;
        ctx.fillStyle = onR ? rank.color : '#fff';
        ctx.fillText('★ RANK: ' + rank.name + ' (MAX) ★', W / 2, 226 + sRank.dy);
      }
      ctx.restore();
    }

    // TOP-5 LEADERBOARD — staggered fade-in after RANK; fresh score highlighted gold
    const top5 = getTop5();
    const sTop = stageIn(1.15, 0.30);
    if (top5.length > 0 && sTop.a > 0) {
      ctx.save();
      ctx.globalAlpha = sTop.a;
      ctx.font = '7px ui-monospace, monospace';
      ctx.fillStyle = '#7a8aa8';
      ctx.fillText('TOP 5', W / 2, 244 + sTop.dy);
      ctx.font = 'bold 9px ui-monospace, monospace';
      const entryW = (W - 24) / 5;
      let highlighted = false;
      for (let i = 0; i < 5; i++) {
        const e = top5[i];
        const cx = 12 + entryW * (i + 0.5);
        if (e) {
          const isFresh = !highlighted && e.score === score && score > 0;
          if (isFresh) highlighted = true;
          ctx.fillStyle = isFresh ? '#facc15' : '#cfd8e8';
          ctx.fillText(String(e.score), cx, 256 + sTop.dy);
          ctx.font = '6px ui-monospace, monospace';
          ctx.fillStyle = isFresh ? '#facc15' : '#3a4a6a';
          ctx.fillText('#' + (i + 1), cx, 248 + sTop.dy);
          ctx.font = 'bold 9px ui-monospace, monospace';
        } else {
          ctx.fillStyle = '#3a4a6a';
          ctx.fillText('—', cx, 256 + sTop.dy);
        }
      }
      ctx.restore();
    }

    // PICK VEHICLE label
    ctx.font = '9px ui-monospace, monospace';
    ctx.fillStyle = '#7a8aa8';
    ctx.fillText('PICK VEHICLE', W / 2, 272);

    pickerRects = [];
    const slotW = 72, slotH = 70, gap = 10;
    const totalW = slotW * VKEYS.length + gap * (VKEYS.length - 1);
    let px = (W - totalW) / 2;
    const py = 284;
    VKEYS.forEach(k => {
      const v = VEHICLES[k];
      const locked = !isVehicleUnlocked(k);
      const selected = k === vehicleKey;

      // ===== DROP SHADOW behind selected tile (raised feel) =====
      if (selected) {
        ctx.fillStyle = 'rgba(0,0,0,0.5)';
        ctx.fillRect(px + 1, py + 2, slotW, slotH);
      }

      // slot bg
      ctx.fillStyle = selected ? '#0c2856' : locked ? '#08090e' : '#10141e';
      ctx.fillRect(px, py, slotW, slotH);

      // ===== SUBTLE GRADIENT — top of tile lighter, bottom darker (depth) =====
      if (!locked) {
        ctx.fillStyle = selected ? 'rgba(255,255,255,0.04)' : 'rgba(255,255,255,0.03)';
        ctx.fillRect(px, py, slotW, 8);
        ctx.fillStyle = 'rgba(0,0,0,0.18)';
        ctx.fillRect(px, py + slotH - 10, slotW, 10);
      }

      // border (thicker when selected)
      const bw = selected ? 2 : 1;
      ctx.fillStyle = selected ? COL_PICK : locked ? '#1a2030' : '#2a3550';
